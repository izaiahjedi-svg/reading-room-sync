<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Reading Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EFEAE0;
    --paper-raised:#F7F4EC;
    --ink:#26221D;
    --ink-soft:#6b6355;
    --line:#ddd6c5;
    --brass:#9C6B30;
    --brass-soft:#c69a5f;
    --danger:#a4453a;
    --shadow: 0 2px 10px rgba(38,34,29,0.08);
    --radius: 3px;
    --ribbon: var(--brass);
  }
  [data-theme="dark"]{
    --paper:#1B1B18;
    --paper-raised:#242420;
    --ink:#E8E3D8;
    --ink-soft:#9a9384;
    --line:#3a3833;
    --brass:#c69a5f;
    --brass-soft:#9C6B30;
    --shadow: 0 2px 14px rgba(0,0,0,0.4);
  }
  [data-theme="sepia"]{
    --paper:#E9DCC3;
    --paper-raised:#F1E6D0;
    --ink:#3b2f1e;
    --ink-soft:#7a6a4d;
    --line:#d3c19c;
    --brass:#8a5a2b;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    transition:background .25s ease, color .25s ease;
    overflow-x:hidden;
  }
  button, select, input{ font-family:inherit; }
  button{
    cursor:pointer;
    border:1px solid var(--line);
    background:var(--paper-raised);
    color:var(--ink);
    border-radius:var(--radius);
    padding:8px 12px;
    font-size:13px;
  }
  button:hover{ border-color:var(--brass); }
  button:focus-visible, select:focus-visible, input:focus-visible{
    outline:2px solid var(--brass);
    outline-offset:2px;
  }
  button.icon-btn{
    width:36px; height:36px; padding:0;
    display:flex; align-items:center; justify-content:center;
  }
  button.primary{
    background:var(--brass); color:#fff; border-color:var(--brass);
  }
  button.primary:hover{ background:var(--brass-soft); }
  button.subtle{ border-color:transparent; background:transparent; }
  button.subtle:hover{ background:var(--paper-raised); border-color:var(--line); }

  /* ---------- App shell ---------- */
  #app{ min-height:100%; display:flex; flex-direction:column; }

  .topbar{
    position:sticky; top:0; z-index:20;
    display:flex; align-items:center; justify-content:space-between;
    gap:10px;
    padding:12px 18px;
    background:var(--paper);
    border-bottom:1px solid var(--line);
  }
  .brand{
    display:flex; align-items:center; gap:10px;
    font-weight:600; letter-spacing:.02em;
  }
  .brand .mark{
    width:20px;height:20px; border-radius:2px;
    background:linear-gradient(160deg, var(--brass), var(--brass-soft));
    flex:none;
  }
  .topbar-actions{ display:flex; gap:8px; align-items:center; }

  main{ flex:1; width:100%; }

  /* ---------- Library ---------- */
  .library-wrap{ max-width:760px; margin:0 auto; padding:20px 18px 60px; }

  .continue-card{
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:6px;
    padding:16px 18px;
    margin-bottom:22px;
    box-shadow:var(--shadow);
    display:flex; align-items:center; justify-content:space-between; gap:14px;
    flex-wrap:wrap;
  }
  .continue-card .label{ font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--ink-soft); margin-bottom:4px;}
  .continue-card .title{ font-size:17px; font-weight:600; }
  .continue-card .pct{ font-size:12px; color:var(--ink-soft); margin-top:2px; }

  .toolrow{
    display:flex; gap:10px; align-items:center; margin-bottom:18px; flex-wrap:wrap;
  }
  .search-input{
    flex:1; min-width:160px;
    padding:9px 12px; border:1px solid var(--line); border-radius:var(--radius);
    background:var(--paper-raised); color:var(--ink); font-size:14px;
  }
  #fileInput{ display:none; }

  .chapter-list{ list-style:none; margin:0; padding:0; border-top:1px solid var(--line); }
  .chapter-list.nested{ border-top:none; }
  .volume-group{ border-top:1px solid var(--line); }
  .volume-group summary{
    padding:12px 4px; cursor:pointer; font-size:12px; font-weight:600;
    text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft);
    list-style:none; display:flex; align-items:center; gap:8px;
  }
  .volume-group summary::-webkit-details-marker{ display:none; }
  .volume-group summary::before{ content:'▸'; font-size:10px; }
  .volume-group[open] summary::before{ content:'▾'; }
  .volume-group .chapter-list{ padding-left:6px; }
  .chapter-row{
    display:flex; align-items:center; gap:14px;
    padding:13px 4px;
    border-bottom:1px solid var(--line);
    cursor:pointer;
  }
  .chapter-row:hover{ background:var(--paper-raised); }
  .chapter-num{
    flex:none; width:44px; text-align:right;
    font-size:12px; color:var(--ink-soft); font-variant-numeric:tabular-nums;
  }
  .chapter-main{ flex:1; min-width:0; }
  .chapter-title{
    font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .chapter-progress-track{
    height:3px; background:var(--line); border-radius:2px; margin-top:6px; overflow:hidden;
  }
  .chapter-progress-fill{ height:100%; background:var(--brass); }
  .chapter-done{ color:var(--ink-soft); }
  .chapter-del{
    flex:none; opacity:0; transition:opacity .15s;
  }
  .chapter-row:hover .chapter-del{ opacity:1; }

  .empty-state{
    text-align:center; padding:70px 20px; color:var(--ink-soft);
  }
  .empty-state .big{ font-size:16px; color:var(--ink); margin-bottom:8px; }

  /* ---------- Reader ---------- */
  .reader-shell{ max-width:760px; margin:0 auto; padding:0 18px 100px; position:relative; }

  .ribbon{
    position:fixed; top:0; right:26px; z-index:30;
    background:var(--ribbon); color:#fff;
    font-size:11px; font-weight:600; letter-spacing:.05em;
    padding:6px 10px 9px;
    border-radius:0 0 4px 4px;
    box-shadow:var(--shadow);
    clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 82%, 0 100%);
  }

  .reader-toolbar{
    position:sticky; top:0; z-index:20;
    background:var(--paper);
    border-bottom:1px solid var(--line);
    padding:10px 18px;
    display:flex; gap:14px; align-items:center; flex-wrap:wrap;
  }
  .reader-toolbar .grp{ display:flex; align-items:center; gap:6px; }
  .reader-toolbar label{ font-size:11px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.06em; }
  .reader-toolbar select{
    padding:6px 8px; border:1px solid var(--line); border-radius:var(--radius);
    background:var(--paper-raised); color:var(--ink); font-size:13px;
  }
  .stepper{ display:flex; align-items:center; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; }
  .stepper button{ border:none; border-radius:0; }
  .stepper span{ padding:0 10px; font-size:12px; min-width:26px; text-align:center; }
  .theme-swatches{ display:flex; gap:6px; }
  .swatch{
    width:26px;height:26px;border-radius:50%;border:2px solid var(--line);cursor:pointer;
  }
  .swatch.active{ border-color:var(--brass); }

  .chapter-heading{
    padding:34px 0 6px;
    font-size:12px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.1em;
  }
  .chapter-heading h1{
    font-size:26px; margin:6px 0 0; color:var(--ink); letter-spacing:-.01em;
  }

  .reader-content{ padding:14px 0 40px; }
  .reader-content p{ margin:0 0 1em; }

  .reader-nav{
    position:sticky; bottom:0; z-index:20;
    display:flex; justify-content:space-between; gap:10px;
    padding:12px 18px; background:var(--paper); border-top:1px solid var(--line);
  }
  .reader-nav button{ flex:1; max-width:200px; }
  .reader-nav .center-btn{ flex:none; }

  .side-drawer{
    position:fixed; top:0; left:0; bottom:0; width:280px; max-width:82vw; z-index:50;
    background:var(--paper-raised); border-right:1px solid var(--line);
    box-shadow:var(--shadow); overflow-y:auto; padding:14px;
    transform:translateX(-100%); transition:transform .2s ease;
  }
  .side-drawer.open{ transform:translateX(0); }
  .side-drawer-backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:45;
    display:none;
  }
  .side-drawer-backdrop.open{ display:block; }
  .side-drawer h2{ font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft); margin:0 0 10px; }
  .side-drawer .chapter-row{ padding:9px 4px; }
  .side-drawer .chapter-row.current{ background:var(--paper); border-left:2px solid var(--brass); }
  .side-drawer .volume-group summary{ padding:9px 4px; }

  .visually-hidden{
    position:absolute; width:1px;height:1px; overflow:hidden; clip:rect(0 0 0 0);
  }

  @media (max-width:520px){
    .topbar{ padding:10px 14px; }
    .reader-toolbar{ padding:8px 12px; gap:10px; }
    .ribbon{ right:14px; }
    .reader-nav .center-btn{ display:none; }
  }
</style>
</head>
<body data-theme="light">
<div id="app">

  <!-- ===================== TOPBAR ===================== -->
  <div class="topbar" id="topbar">
    <div class="brand"><span class="mark"></span><span id="brandTitle">Reading Room</span></div>
    <div class="topbar-actions" id="topbarActions"></div>
  </div>

  <main id="main"></main>

  <input type="file" id="fileInput" accept=".txt" multiple />
  <input type="file" id="folderInput" webkitdirectory directory multiple />
  <input type="file" id="importInput" accept=".json,application/json" />
</div>

<script>
(function(){

  // ---------------------------------------------------------------
  // Storage backend: use IndexedDB for larger payloads and chunk big
  // values so chapter uploads don't hit localStorage quota limits.
  // ---------------------------------------------------------------
  const PREFIX = 'reading-room:';
  const DB_NAME = 'reading-room-db';
  const STORE_NAME = 'items';
  const CHUNK_SIZE = 256 * 1024;
  let dbPromise = null;
  const memoryCache = {};

  function openDatabase(){
    if (!window.indexedDB) return Promise.reject(new Error('IndexedDB unavailable'));
    if (dbPromise) return dbPromise;

    dbPromise = new Promise((resolve, reject) => {
      const request = window.indexedDB.open(DB_NAME, 2);
      request.onupgradeneeded = (event) => {
        const db = event.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) {
          db.createObjectStore(STORE_NAME, { keyPath: 'key' });
        }
      };
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error || new Error('IndexedDB unavailable'));
    });

    return dbPromise;
  }

  async function getFromDb(key){
    const db = await openDatabase();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readonly');
      tx.onabort = () => reject(tx.error || new Error('Read aborted'));
      tx.onerror = () => reject(tx.error || new Error('Read failed'));
      const store = tx.objectStore(STORE_NAME);
      const request = store.get(key);
      request.onsuccess = () => resolve(request.result ? request.result.value : null);
      request.onerror = () => reject(request.error || new Error('Read failed'));
    });
  }

  async function setInDb(key, value){
    const db = await openDatabase();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.onabort = () => reject(tx.error || new Error('Write aborted'));
      tx.onerror = () => reject(tx.error || new Error('Write failed'));
      const store = tx.objectStore(STORE_NAME);
      const request = store.put({ key, value });
      request.onsuccess = () => resolve({ key, value, shared:false });
      request.onerror = () => reject(request.error || new Error('Write failed'));
    });
  }

  async function deleteFromDb(key){
    const db = await openDatabase();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.onabort = () => reject(tx.error || new Error('Delete aborted'));
      tx.onerror = () => reject(tx.error || new Error('Delete failed'));
      const store = tx.objectStore(STORE_NAME);
      const request = store.delete(key);
      request.onsuccess = () => resolve({ key, deleted:true, shared:false });
      request.onerror = () => reject(request.error || new Error('Delete failed'));
    });
  }

  async function listFromDb(prefix){
    const db = await openDatabase();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readonly');
      tx.onabort = () => reject(tx.error || new Error('List aborted'));
      tx.onerror = () => reject(tx.error || new Error('List failed'));
      const store = tx.objectStore(STORE_NAME);
      const request = store.openCursor();
      const keys = [];
      request.onsuccess = () => {
        const cursor = request.result;
        if (cursor) {
          const key = cursor.key;
          if (!prefix || key.startsWith(prefix)) keys.push(key.slice(PREFIX.length));
          cursor.continue();
        } else {
          resolve({ keys, prefix, shared:false });
        }
      };
      request.onerror = () => reject(request.error || new Error('List failed'));
    });
  }

  async function setChunkedValue(fullKey, value){
    const chunks = [];
    for (let offset = 0; offset < value.length; offset += CHUNK_SIZE) {
      chunks.push(value.slice(offset, offset + CHUNK_SIZE));
    }

    const meta = { kind: 'chunked', chunkCount: chunks.length, chunkKeys: chunks.map((_, index) => fullKey + ':chunk:' + index) };
    await setInDb(fullKey, JSON.stringify(meta));
    for (let i = 0; i < chunks.length; i++) {
      await setInDb(meta.chunkKeys[i], chunks[i]);
    }
    memoryCache[fullKey] = value;
    return { key: fullKey, value, shared:false };
  }

  async function getChunkedValue(fullKey){
    const metaRaw = await getFromDb(fullKey);
    if (!metaRaw) return null;
    try {
      const meta = JSON.parse(metaRaw);
      if (!meta || meta.kind !== 'chunked') return metaRaw;
      const chunks = [];
      for (const chunkKey of meta.chunkKeys || []) {
        const chunk = await getFromDb(chunkKey);
        if (chunk === null || chunk === undefined) return null;
        chunks.push(chunk);
      }
      const value = chunks.join('');
      memoryCache[fullKey] = value;
      return value;
    } catch (e) {
      return metaRaw;
    }
  }

  async function deleteChunkedValue(fullKey){
    const metaRaw = await getFromDb(fullKey);
    if (metaRaw) {
      try {
        const meta = JSON.parse(metaRaw);
        if (meta && meta.kind === 'chunked') {
          for (const chunkKey of meta.chunkKeys || []) {
            await deleteFromDb(chunkKey);
          }
        }
      } catch (e) {}
    }
    await deleteFromDb(fullKey);
    delete memoryCache[fullKey];
    return { key: fullKey, deleted:true, shared:false };
  }

  async function migrateLegacyStorage(){
    if (!window.localStorage) return;
    const legacyKeys = [];
    for (let i = 0; i < window.localStorage.length; i++) {
      const fullKey = window.localStorage.key(i);
      if (fullKey && fullKey.startsWith(PREFIX)) legacyKeys.push(fullKey);
    }
    for (const fullKey of legacyKeys) {
      try {
        const raw = window.localStorage.getItem(fullKey);
        if (raw != null) await setInDb(fullKey, raw);
      } catch (e) {
        console.warn('Could not migrate legacy storage entry', fullKey, e);
      }
    }
  }

  window.storage = {
    async get(key){
      const fullKey = PREFIX + key;
      if (memoryCache[fullKey] !== undefined) return { key, value: memoryCache[fullKey], shared:false };
      try {
        const raw = await getChunkedValue(fullKey);
        if (raw !== null) return { key, value: raw, shared:false };
      } catch (e) {
        console.warn('IndexedDB read failed, falling back to localStorage', e);
      }
      if (window.localStorage) {
        const raw = window.localStorage.getItem(fullKey);
        return raw === null ? null : { key, value: raw, shared:false };
      }
      return null;
    },
    async set(key, value){
      const fullKey = PREFIX + key;
      try {
        if (typeof value === 'string' && value.length > CHUNK_SIZE) {
          return await setChunkedValue(fullKey, value);
        }
        await setInDb(fullKey, value);
        memoryCache[fullKey] = value;
        return { key, value, shared:false };
      } catch (e) {
        console.warn('IndexedDB write failed, falling back to localStorage', e);
        if (window.localStorage && typeof value === 'string' && value.length < 5 * 1024 * 1024) {
          window.localStorage.setItem(fullKey, value);
          memoryCache[fullKey] = value;
          return { key, value, shared:false };
        }
        throw e;
      }
    },
    async delete(key){
      const fullKey = PREFIX + key;
      try {
        return await deleteChunkedValue(fullKey);
      } catch (e) {
        console.warn('IndexedDB delete failed, falling back to localStorage', e);
        if (window.localStorage) {
          window.localStorage.removeItem(fullKey);
          delete memoryCache[fullKey];
          return { key, deleted:true, shared:false };
        }
        throw e;
      }
    },
    async list(prefix){
      try {
        return await listFromDb(PREFIX + (prefix || ''));
      } catch (e) {
        console.warn('IndexedDB list failed, falling back to localStorage', e);
        const keys = [];
        if (window.localStorage) {
          for (let i = 0; i < window.localStorage.length; i++) {
            const k = window.localStorage.key(i);
            if (k && k.startsWith(PREFIX)) {
              const bare = k.slice(PREFIX.length);
              if (!prefix || bare.startsWith(prefix)) keys.push(bare);
            }
          }
        }
        return { keys, prefix, shared:false };
      }
    }
  };

  migrateLegacyStorage().catch(() => {});

  // ---------------------------------------------------------------
  // Storage helpers
  // ---------------------------------------------------------------
  async function storageGet(key){
    try{
      const r = await window.storage.get(key, false);
      return r ? JSON.parse(r.value) : null;
    }catch(e){ return null; }
  }
  async function storageSet(key, value, attempts=3){
    for (let i=0; i<attempts; i++){
      try{
        const r = await window.storage.set(key, JSON.stringify(value), false);
        if (r) return true;
      }catch(e){
        console.error('storage set failed (attempt ' + (i+1) + ')', key, e);
      }
      if (i < attempts-1) await new Promise(res => setTimeout(res, 500 * (i+1)));
    }
    return false;
  }
  async function storageDelete(key){
    try{ await window.storage.delete(key, false); }catch(e){}
  }

  // ---------------------------------------------------------------
  // State
  // ---------------------------------------------------------------
  let index = [];              // [{id, title, num, addedAt}]
  let progress = { lastChapterId:null, percents:{} };
  let settings = { font:'Georgia, "Iowan Old Style", serif', fontSize:19, lineHeight:1.7, theme:'light' };
  let view = { mode:'library', chapterId:null, search:'' };
  let saveTimer = null;

  const FONT_OPTIONS = [
    { label:'Serif (Georgia)', value:'Georgia, "Iowan Old Style", serif' },
    { label:'Serif (Palatino)', value:'"Palatino Linotype", Palatino, serif' },
    { label:'Serif (Charter)', value:'Charter, "Bitstream Charter", serif' },
    { label:'Sans (system)', value:'-apple-system, "Segoe UI", Roboto, sans-serif' },
    { label:'Sans (Verdana)', value:'Verdana, sans-serif' },
    { label:'Monospace', value:'ui-monospace, "SFMono-Regular", Menlo, monospace' },
    { label:'Patrick Hand (dyslexia-friendly)', value:'"Patrick Hand", cursive' },
  ];

  const app = document.getElementById('app');
  const main = document.getElementById('main');
  const topbarActions = document.getElementById('topbarActions');
  const brandTitle = document.getElementById('brandTitle');
  const fileInput = document.getElementById('fileInput');
  const folderInput = document.getElementById('folderInput');
  const importInput = document.getElementById('importInput');
  let syncKey = '';
  const SYNC_KEY_STORAGE_KEY = 'reading-room:sync-key';
  const SYNC_ENDPOINT = '/api/library';

  function esc(s){
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function applyTheme(){
    document.body.setAttribute('data-theme', settings.theme);
  }

  function getSyncKeyFromUrl(){
    const params = new URLSearchParams(window.location.search);
    return (params.get('sync') || '').trim();
  }

  function getStoredSyncKey(){
    try { return (window.localStorage.getItem(SYNC_KEY_STORAGE_KEY) || '').trim(); }
    catch (e) { return ''; }
  }

  function setSyncKey(key){
    syncKey = (key || '').trim();
    try {
      if (syncKey) window.localStorage.setItem(SYNC_KEY_STORAGE_KEY, syncKey);
      else window.localStorage.removeItem(SYNC_KEY_STORAGE_KEY);
    } catch (e) {}
    return syncKey;
  }

  async function buildLibraryPayload(options){
    const progressOnly = !!(options && options.progressOnly);
    if (progressOnly) {
      return {
        version: 1,
        exportedAt: Date.now(),
        progress,
        settings,
      };
    }
    const chapters = {};
    for (const ch of index){
      const data = await storageGet('chapter:' + ch.id);
      if (data) chapters[ch.id] = data;
    }
    return { version:1, exportedAt:Date.now(), index, chapters, progress, settings };
  }

  async function loadRemoteLibrary(){
    if (!syncKey) return null;
    try {
      const url = new URL(SYNC_ENDPOINT, window.location.origin);
      url.searchParams.set('key', syncKey);
      const res = await fetch(url.toString());
      if (!res.ok) return null;
      const payload = await res.json();
      return payload && payload.data ? payload.data : null;
    } catch (e) {
      console.warn('Remote sync load failed', e);
      return null;
    }
  }

  async function pushRemoteLibrary(options){
    const progressOnly = !!(options && options.progressOnly);
    if (!syncKey) return false;
    try {
      const payload = await buildLibraryPayload({ progressOnly });
      const res = await fetch(SYNC_ENDPOINT, {
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'x-sync-key': syncKey,
          ...(progressOnly ? { 'x-sync-partial': 'progress' } : {}),
        },
        body: JSON.stringify(payload)
      });
      return res.ok;
    } catch (e) {
      console.warn('Remote sync save failed', e);
      return false;
    }
  }

  async function syncFromRemote(){
    if (!syncKey) return false;
    const remote = await loadRemoteLibrary();
    if (!remote || !Array.isArray(remote.index)) return false;
    index = remote.index || [];
    progress = remote.progress || { lastChapterId:null, percents:{} };
    if (remote.settings) settings = Object.assign(settings, remote.settings);
    for (const ch of index){
      const data = remote.chapters && remote.chapters[ch.id];
      if (data) await storageSet('chapter:' + ch.id, data);
    }
    await storageSet('chapters-index', index);
    await storageSet('progress', progress);
    await storageSet('settings', settings);
    applyTheme();
    render();
    return true;
  }

  async function configureSyncKey(forcePrompt){
    const nextKey = forcePrompt
      ? prompt('Enter a sync key for this library', syncKey || 'my-library')
      : (getSyncKeyFromUrl() || getStoredSyncKey());
    if (nextKey === null) return false;
    setSyncKey(nextKey || '');
    if (syncKey) {
      await syncFromRemote();
      await pushRemoteLibrary();
    }
    renderTopbar();
    return !!syncKey;
  }

  // ---------------------------------------------------------------
  // Init
  // ---------------------------------------------------------------
  async function init(){
    const [idx, prog, sett] = await Promise.all([
      storageGet('chapters-index'),
      storageGet('progress'),
      storageGet('settings'),
    ]);
    index = idx || [];
    progress = prog || { lastChapterId:null, percents:{} };
    if (sett) settings = Object.assign(settings, sett);
    applyTheme();
    setSyncKey(getSyncKeyFromUrl() || getStoredSyncKey());
    if (syncKey) {
      await syncFromRemote();
    }
    renderTopbar();
    render();
  }

  // ---------------------------------------------------------------
  // Upload handling
  // ---------------------------------------------------------------
  fileInput.addEventListener('change', (e) => handleUpload(e.target.files, fileInput));
  folderInput.addEventListener('change', (e) => handleUpload(e.target.files, folderInput));

  async function handleUpload(fileList, inputEl){
    const files = Array.from(fileList || []).filter(f => /\.txt$/i.test(f.name));
    if (!files.length){ inputEl.value = ''; return; }

    const failed = [];
    let addedCount = 0;
    const progressLabel = view.mode === 'library' ? showUploadProgress(files.length) : null;

    for (let i=0; i<files.length; i++){
      const file = files[i];
      if (progressLabel) progressLabel(i+1, files.length, file.name);
      const text = await file.text();
      const stem = file.name.replace(/\.txt$/i, '');
      const match = stem.match(/(\d{1,6})/);
      const num = match ? parseInt(match[1], 10) : null;
      const volume = detectVolume(file);
      const id = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()+Math.random()));
      const ok = await storageSet('chapter:' + id, { title: stem, content: text });
      if (!ok){
        failed.push(file.name);
        continue;
      }
      index.push({ id, title: stem, num, volume, addedAt: Date.now() });
      addedCount++;
      // small pacing gap helps avoid rate-limit errors on large batches
      if (files.length > 10) await new Promise(res => setTimeout(res, 120));
    }

    if (addedCount){
      index.sort(sortChapters);
      const indexOk = await storageSet('chapters-index', index);
      if (!indexOk){
        alert('Chapters were saved individually, but the library list failed to update. Try refreshing the page — your chapters should still be there — and if the list looks incomplete, add the missing ones again.');
      }
    }
    if (syncKey) {
      await pushRemoteLibrary({ progressOnly:true });
    }
    if (progressLabel) progressLabel(null);
    inputEl.value = '';
    render();

    if (failed.length){
      alert('Saved ' + addedCount + ' of ' + files.length + ' chapters.\n\n' +
        'These failed to save (likely a temporary connection issue) — try adding them again:\n' +
        failed.slice(0, 20).join('\n') + (failed.length > 20 ? '\n…and ' + (failed.length-20) + ' more' : ''));
    }
  }

  function showUploadProgress(total){
    const el = document.createElement('div');
    el.style.cssText = 'position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:40;background:var(--paper-raised);border:1px solid var(--line);border-radius:6px;padding:10px 16px;font-size:13px;box-shadow:var(--shadow);color:var(--ink);';
    document.body.appendChild(el);
    return function(current, tot, name){
      if (current === null){ el.remove(); return; }
      el.textContent = 'Saving chapter ' + current + ' of ' + tot + '… (' + name + ')';
    };
  }

  function detectVolume(file){
    // webkitRelativePath looks like "MyNovel/Volume 1/003.txt" when picked via folder upload,
    // or "MyNovel/003.txt" for a flat folder. Only treat it as a volume if there's a real subfolder.
    const rel = file.webkitRelativePath;
    if (!rel) return null;
    const parts = rel.split('/');
    if (parts.length >= 3) return parts[1];
    return null;
  }

  function volumeSortNum(name){
    const m = (name || '').match(/(\d{1,4})/);
    return m ? parseInt(m[1], 10) : null;
  }

  function sortChapters(a, b){
    const av = a.volume || '', bv = b.volume || '';
    if (av !== bv){
      const an = volumeSortNum(av), bn = volumeSortNum(bv);
      if (an != null && bn != null && an !== bn) return an - bn;
      return av.localeCompare(bv);
    }
    if (a.num != null && b.num != null) return a.num - b.num;
    if (a.num != null) return -1;
    if (b.num != null) return 1;
    return a.addedAt - b.addedAt;
  }

  async function deleteChapter(id, evt){
    if (evt) evt.stopPropagation();
    if (!confirm('Remove this chapter from your library? This cannot be undone.')) return;
    index = index.filter(c => c.id !== id);
    await storageSet('chapters-index', index);
    await storageDelete('chapter:' + id);
    if (progress.percents[id] != null) delete progress.percents[id];
    if (progress.lastChapterId === id) progress.lastChapterId = null;
    await storageSet('progress', progress);
    if (syncKey) await pushRemoteLibrary({ progressOnly:true });
    render();
  }

  // ---------------------------------------------------------------
  // Export / Import (manual transfer between devices)
  // ---------------------------------------------------------------
  async function exportLibrary(){
    const btn = document.getElementById('exportBtn');
    if (btn){ btn.disabled = true; btn.textContent = 'Preparing…'; }
    try{
      const chapters = {};
      for (const ch of index){
        const data = await storageGet('chapter:' + ch.id);
        if (data) chapters[ch.id] = data;
      }
      const payload = { version:1, exportedAt: Date.now(), index, chapters, progress, settings };
      const blob = new Blob([JSON.stringify(payload)], { type:'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'reading-room-library.json';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }catch(e){
      alert('Export failed: ' + e.message);
    }
    if (btn){ btn.disabled = false; btn.textContent = 'Export library'; }
  }

  importInput.addEventListener('change', async (e) => {
    const file = e.target.files && e.target.files[0];
    importInput.value = '';
    if (!file) return;
    let payload;
    try{
      payload = JSON.parse(await file.text());
    }catch(e){
      alert('That file doesn\'t look like a valid library export.');
      return;
    }
    if (!payload || !Array.isArray(payload.index) || !payload.chapters){
      alert('That file doesn\'t look like a valid library export.');
      return;
    }
    const mode = confirm(
      'Import ' + payload.index.length + ' chapter(s).\n\n' +
      'Press OK to MERGE with your current library (existing chapters kept, new ones added).\n' +
      'Press Cancel to REPLACE your current library entirely.'
    ) ? 'merge' : 'replace';

    if (mode === 'replace') { index = []; progress = { lastChapterId:null, percents:{} }; }

    const existingTitles = new Set(index.map(c => c.volume + '::' + c.title));
    let added = 0;
    for (const entry of payload.index){
      if (mode === 'merge' && existingTitles.has((entry.volume||'') + '::' + entry.title)) continue;
      const newId = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()+Math.random()));
      const data = payload.chapters[entry.id];
      if (!data) continue;
      await storageSet('chapter:' + newId, data);
      index.push({ id:newId, title:entry.title, num:entry.num, volume:entry.volume||null, addedAt:Date.now() });
      if (payload.progress && payload.progress.percents && payload.progress.percents[entry.id] != null){
        progress.percents[newId] = payload.progress.percents[entry.id];
        if (payload.progress.lastChapterId === entry.id) progress.lastChapterId = newId;
      }
      added++;
    }
    index.sort(sortChapters);
    await storageSet('chapters-index', index);
    await storageSet('progress', progress);
    if (payload.settings){
      settings = Object.assign(settings, payload.settings);
      await storageSet('settings', settings);
      applyTheme();
    }
    if (syncKey) await pushRemoteLibrary({ progressOnly:true });
    view.transferOpen = false;
    render();
    alert('Imported ' + added + ' chapter(s).');
  });

  // ---------------------------------------------------------------
  // Topbar
  // ---------------------------------------------------------------

  function renderTopbar(){
    topbarActions.innerHTML = '';
    if (view.mode === 'library'){
      brandTitle.textContent = 'Reading Room';
      const addFolderBtn = document.createElement('button');
      addFolderBtn.className = 'subtle';
      addFolderBtn.textContent = '+ Add folder';
      addFolderBtn.onclick = () => folderInput.click();
      const addBtn = document.createElement('button');
      addBtn.className = 'primary';
      addBtn.textContent = '+ Add files';
      addBtn.onclick = () => fileInput.click();
      const moreBtn = document.createElement('button');
      moreBtn.className = 'icon-btn subtle';
      moreBtn.title = 'Export or import your library';
      moreBtn.textContent = '⇅';
      moreBtn.onclick = () => { view.transferOpen = !view.transferOpen; render(); };
      const syncBtn = document.createElement('button');
      syncBtn.className = 'subtle';
      syncBtn.textContent = syncKey ? 'Sync ✓' : 'Sync';
      syncBtn.onclick = async () => {
        const ok = await configureSyncKey(true);
        if (ok) {
          alert('Sync key set. Open this same site on your phone with ?sync=' + syncKey + ' to pull the library over.');
        }
      };
      topbarActions.append(moreBtn, syncBtn, addFolderBtn, addBtn);
    } else {
      brandTitle.textContent = '← Library';
      brandTitle.style.cursor = 'pointer';

      const listBtn = document.createElement('button');
      listBtn.className = 'icon-btn subtle';
      listBtn.title = 'Chapter list';
      listBtn.textContent = '☰';
      listBtn.onclick = () => { view.sidebarOpen = !view.sidebarOpen; renderSidebar(); };
      const settingsBtn = document.createElement('button');
      settingsBtn.className = 'icon-btn subtle';
      settingsBtn.title = 'Reading settings';
      settingsBtn.textContent = 'Aa';
      settingsBtn.onclick = () => { view.settingsOpen = !view.settingsOpen; render(); };
      topbarActions.append(listBtn, settingsBtn);
    }
  }

  // ---------------------------------------------------------------
  // Render dispatch
  // ---------------------------------------------------------------
  function render(){
    if (view.mode !== 'reader' && typeof view._cleanupScroll === 'function'){
      view._cleanupScroll();
      view._cleanupScroll = null;
    }
    renderTopbar();
    if (view.mode === 'library') renderLibrary();
    else renderReader();
  }

  // ---------------------------------------------------------------
  // Library view
  // ---------------------------------------------------------------
  function renderLibrary(){
    main.innerHTML = '';
    const wrap = document.createElement('div');
    wrap.className = 'library-wrap';

    if (!index.length){
      wrap.innerHTML = `
        <div class="empty-state">
          <div class="big">Your library is empty</div>
          <div>Add the .txt chapter files from your computer to get started — pick individual files or a whole folder at once. They stay saved here — open this same page on your phone and they'll be waiting for you.</div>
          <div style="margin-top:18px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
            <button class="subtle" id="emptyAddFolderBtn">+ Add folder</button>
            <button class="primary" id="emptyAddBtn">+ Add files</button>
          </div>
        </div>`;
      main.appendChild(wrap);
      document.getElementById('emptyAddBtn').onclick = () => fileInput.click();
      document.getElementById('emptyAddFolderBtn').onclick = () => folderInput.click();
      return;
    }

    // Continue reading card
    if (progress.lastChapterId && index.find(c => c.id === progress.lastChapterId)){
      const ch = index.find(c => c.id === progress.lastChapterId);
      const pct = Math.round(progress.percents[ch.id] || 0);
      const card = document.createElement('div');
      card.className = 'continue-card';
      card.innerHTML = `
        <div>
          <div class="label">Continue reading</div>
          <div class="title">${esc(ch.title)}</div>
          <div class="pct">${pct}% through this chapter</div>
        </div>
        <button class="primary">Resume →</button>`;
      card.querySelector('button').onclick = () => openChapter(ch.id, true);
      wrap.appendChild(card);
    }

    // toolrow: search
    const toolrow = document.createElement('div');
    toolrow.className = 'toolrow';
    toolrow.innerHTML = `<input class="search-input" placeholder="Filter chapters…" value="${esc(view.search||'')}" />`;
    const searchInput = toolrow.querySelector('input');
    searchInput.oninput = (e) => { view.search = e.target.value; renderChapterList(list); };
    wrap.appendChild(toolrow);

    if (view.transferOpen){
      const panel = document.createElement('div');
      panel.className = 'continue-card';
      panel.innerHTML = `
        <div>
          <div class="label">Move library to another device</div>
          <div style="font-size:13px;color:var(--ink-soft);max-width:46ch;">
            Export everything to one file here, then open this same reader on your other device and import it there.
          </div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button id="exportBtn">Export library</button>
          <button id="importBtn" class="primary">Import library</button>
        </div>`;
      wrap.appendChild(panel);
      panel.querySelector('#exportBtn').onclick = exportLibrary;
      panel.querySelector('#importBtn').onclick = () => importInput.click();
    }

    const list = document.createElement('div');
    list.id = 'chapterListContainer';
    wrap.appendChild(list);
    renderChapterList(list);

    main.appendChild(wrap);
  }

  function buildChapterRow(ch, opts){
    opts = opts || {};
    const pct = Math.round(progress.percents[ch.id] || 0);
    const li = document.createElement('li');
    li.className = 'chapter-row' + (opts.current ? ' current' : '');
    li.innerHTML = `
      <div class="chapter-num">${ch.num != null ? ch.num : '—'}</div>
      <div class="chapter-main">
        <div class="chapter-title ${pct>=98?'chapter-done':''}">${esc(ch.title)}</div>
        <div class="chapter-progress-track"><div class="chapter-progress-fill" style="width:${pct}%"></div></div>
      </div>
      ${opts.deletable !== false ? '<button class="chapter-del icon-btn subtle" title="Remove">✕</button>' : ''}`;
    li.onclick = () => { if (opts.onClick) opts.onClick(ch); else openChapter(ch.id, false); };
    const delBtn = li.querySelector('.chapter-del');
    if (delBtn) delBtn.onclick = (e) => deleteChapter(ch.id, e);
    return li;
  }

  function renderChapterList(list){
    const q = (view.search || '').toLowerCase().trim();
    const items = index.filter(c => !q || c.title.toLowerCase().includes(q));
    list.innerHTML = '';
    if (!items.length){
      list.innerHTML = `<div style="padding:24px 4px;color:var(--ink-soft);">No chapters match "${esc(view.search)}".</div>`;
      return;
    }
    const volumes = [...new Set(items.map(c => c.volume || ''))];
    if (volumes.length <= 1){
      const ul = document.createElement('ul');
      ul.className = 'chapter-list';
      items.forEach(ch => ul.appendChild(buildChapterRow(ch)));
      list.appendChild(ul);
      return;
    }
    volumes.forEach(vol => {
      const groupItems = items.filter(c => (c.volume || '') === vol);
      const details = document.createElement('details');
      details.className = 'volume-group';
      details.open = true;
      const summary = document.createElement('summary');
      summary.textContent = vol || 'Chapters';
      details.appendChild(summary);
      const ul = document.createElement('ul');
      ul.className = 'chapter-list nested';
      groupItems.forEach(ch => ul.appendChild(buildChapterRow(ch)));
      details.appendChild(ul);
      list.appendChild(details);
    });
  }

  function renderSidebar(){
    const bd = document.querySelector('.side-drawer-backdrop');
    const dr = document.getElementById('sideDrawer');
    if (!bd || !dr) return;
    bd.classList.toggle('open', !!view.sidebarOpen);
    dr.classList.toggle('open', !!view.sidebarOpen);
    dr.innerHTML = '<h2>Chapters</h2>';
    const currentId = view.chapterId;
    const volumes = [...new Set(index.map(c => c.volume || ''))];
    const wrapList = (items) => {
      const ul = document.createElement('ul');
      ul.className = 'chapter-list';
      items.forEach(ch => ul.appendChild(buildChapterRow(ch, {
        current: ch.id === currentId,
        deletable: false,
        onClick: (c) => { view.sidebarOpen = false; openChapter(c.id, false); }
      })));
      return ul;
    };
    if (volumes.length <= 1){
      dr.appendChild(wrapList(index));
    } else {
      volumes.forEach(vol => {
        const groupItems = index.filter(c => (c.volume || '') === vol);
        const details = document.createElement('details');
        details.className = 'volume-group';
        details.open = groupItems.some(c => c.id === currentId) || volumes.length < 4;
        const summary = document.createElement('summary');
        summary.textContent = vol || 'Chapters';
        details.append(summary, wrapList(groupItems));
        dr.appendChild(details);
      });
    }
  }

  // ---------------------------------------------------------------
  // Reader view
  // ---------------------------------------------------------------
  async function openChapter(id, resume){
    view.mode = 'reader';
    view.chapterId = id;
    view.resume = !!resume;
    view.sidebarOpen = false;
    render();
  }

  async function renderReader(){
    if (typeof view._cleanupScroll === 'function'){
      view._cleanupScroll();
      view._cleanupScroll = null;
    }
    const meta = index.find(c => c.id === view.chapterId);
    main.innerHTML = '<div style="padding:40px;color:var(--ink-soft);">Loading…</div>';
    if (!meta) { view.mode='library'; render(); return; }

    const data = await storageGet('chapter:' + meta.id) || { title: meta.title, content: '(missing content)' };

    const wrap = document.createElement('div');
    wrap.className = 'reader-shell';

    const pct = Math.round(progress.percents[meta.id] || 0);
    const ribbon = document.createElement('div');
    ribbon.className = 'ribbon';
    ribbon.textContent = pct + '%';

    const toolbar = buildToolbar();

    const heading = document.createElement('div');
    heading.className = 'chapter-heading';
    const idx = index.findIndex(c => c.id === meta.id);
    heading.innerHTML = `<div>Chapter ${meta.num != null ? meta.num : (idx+1)}</div><h1>${esc(data.title)}</h1>`;

    const content = document.createElement('div');
    content.className = 'reader-content';
    applyReaderStyles(content);
    const paras = (data.content || '').split(/\n\s*\n/).map(p => p.trim()).filter(Boolean);
    (paras.length ? paras : [data.content || '']).forEach(p => {
      const pEl = document.createElement('p');
      pEl.textContent = p;
      content.appendChild(pEl);
    });

    const nav = document.createElement('div');
    nav.className = 'reader-nav';
    const prevMeta = index[idx-1];
    const nextMeta = index[idx+1];
    const prevBtn = document.createElement('button');
    prevBtn.textContent = '← Previous';
    prevBtn.disabled = !prevMeta;
    prevBtn.onclick = () => openChapter(prevMeta.id, false);
    const centerBtn = document.createElement('button');
    centerBtn.className = 'center-btn subtle';
    centerBtn.textContent = 'Library';
    centerBtn.onclick = () => { view.mode='library'; render(); };
    const nextBtn = document.createElement('button');
    nextBtn.textContent = 'Next →';
    nextBtn.className = 'primary';
    nextBtn.disabled = !nextMeta;
    nextBtn.onclick = () => openChapter(nextMeta.id, false);
    nav.append(prevBtn, centerBtn, nextBtn);

    wrap.append(ribbon, toolbar, heading, content, nav);
    main.innerHTML = '';
    main.appendChild(wrap);

    // sidebar drawer for quick chapter jumping
    const backdrop = document.createElement('div');
    backdrop.className = 'side-drawer-backdrop';
    backdrop.onclick = () => { view.sidebarOpen = false; renderSidebar(); };
    const drawer = document.createElement('div');
    drawer.className = 'side-drawer';
    drawer.id = 'sideDrawer';
    document.body.append(backdrop, drawer);
    view._cleanupDrawer = () => { backdrop.remove(); drawer.remove(); };
    renderSidebar();

    // keyboard navigation (left/right arrows), ignored while typing in a control
    function onKeydown(e){
      const tag = (document.activeElement && document.activeElement.tagName) || '';
      if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
      if (e.key === 'ArrowRight' && !nextBtn.disabled) nextBtn.click();
      else if (e.key === 'ArrowLeft' && !prevBtn.disabled) prevBtn.click();
      else if (e.key === 'Escape' && view.sidebarOpen){ view.sidebarOpen = false; renderSidebar(); }
    }
    document.addEventListener('keydown', onKeydown);

    // scroll tracking
    const scroller = window;
    function computePct(){
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      if (docHeight <= 0) return 100;
      return Math.min(100, Math.max(0, (window.scrollY / docHeight) * 100));
    }
    function onScroll(){
      const p = computePct();
      ribbon.textContent = Math.round(p) + '%';
      clearTimeout(saveTimer);
      saveTimer = setTimeout(async () => {
        progress.lastChapterId = meta.id;
        progress.percents[meta.id] = p;
        await storageSet('progress', progress);
        if (syncKey) await pushRemoteLibrary({ progressOnly:true });
      }, 700);
    }
    window.addEventListener('scroll', onScroll, { passive:true });
    view._cleanupScroll = () => {
      window.removeEventListener('scroll', onScroll);
      document.removeEventListener('keydown', onKeydown);
      if (typeof view._cleanupDrawer === 'function'){ view._cleanupDrawer(); view._cleanupDrawer = null; }
    };

    // restore scroll position on resume or normal open
    requestAnimationFrame(() => {
      const savedPct = progress.percents[meta.id];
      if (savedPct){
        const docHeight = document.documentElement.scrollHeight - window.innerHeight;
        window.scrollTo(0, (savedPct/100) * docHeight);
      } else {
        window.scrollTo(0,0);
      }
    });
  }

  function applyReaderStyles(el){
    el.style.fontFamily = settings.font;
    el.style.fontSize = settings.fontSize + 'px';
    el.style.lineHeight = settings.lineHeight;
    el.style.maxWidth = '66ch';
    el.style.margin = '0 auto';
  }

  function buildToolbar(){
    const bar = document.createElement('div');
    bar.className = 'reader-toolbar';
    if (!view.settingsOpen) { bar.style.display = 'none'; return bar; }

    // font family
    const fontGrp = document.createElement('div');
    fontGrp.className = 'grp';
    fontGrp.innerHTML = '<label for="fontSel">Font</label>';
    const sel = document.createElement('select');
    sel.id = 'fontSel';
    FONT_OPTIONS.forEach(f => {
      const o = document.createElement('option');
      o.value = f.value; o.textContent = f.label;
      if (f.value === settings.font) o.selected = true;
      sel.appendChild(o);
    });
    sel.onchange = async () => { settings.font = sel.value; await storageSet('settings', settings); render(); };
    fontGrp.appendChild(sel);

    // font size
    const sizeGrp = document.createElement('div');
    sizeGrp.className = 'grp';
    sizeGrp.innerHTML = '<label>Size</label>';
    const sizeStep = document.createElement('div');
    sizeStep.className = 'stepper';
    sizeStep.innerHTML = `<button aria-label="Decrease font size">−</button><span>${settings.fontSize}</span><button aria-label="Increase font size">+</button>`;
    sizeStep.children[0].onclick = async () => { settings.fontSize = Math.max(13, settings.fontSize-1); await storageSet('settings', settings); render(); };
    sizeStep.children[2].onclick = async () => { settings.fontSize = Math.min(30, settings.fontSize+1); await storageSet('settings', settings); render(); };
    sizeGrp.appendChild(sizeStep);

    // line height
    const lineGrp = document.createElement('div');
    lineGrp.className = 'grp';
    lineGrp.innerHTML = '<label>Line spacing</label>';
    const lineStep = document.createElement('div');
    lineStep.className = 'stepper';
    lineStep.innerHTML = `<button aria-label="Decrease line spacing">−</button><span>${settings.lineHeight.toFixed(1)}</span><button aria-label="Increase line spacing">+</button>`;
    lineStep.children[0].onclick = async () => { settings.lineHeight = Math.max(1.2, +(settings.lineHeight-0.1).toFixed(1)); await storageSet('settings', settings); render(); };
    lineStep.children[2].onclick = async () => { settings.lineHeight = Math.min(2.4, +(settings.lineHeight+0.1).toFixed(1)); await storageSet('settings', settings); render(); };
    lineGrp.appendChild(lineStep);

    // theme
    const themeGrp = document.createElement('div');
    themeGrp.className = 'grp';
    themeGrp.innerHTML = '<label>Theme</label>';
    const swatches = document.createElement('div');
    swatches.className = 'theme-swatches';
    const themes = [
      { key:'light', bg:'#EFEAE0' },
      { key:'sepia', bg:'#E9DCC3' },
      { key:'dark', bg:'#1B1B18' },
    ];
    themes.forEach(t => {
      const sw = document.createElement('div');
      sw.className = 'swatch' + (settings.theme===t.key ? ' active' : '');
      sw.style.background = t.bg;
      sw.title = t.key;
      sw.onclick = async () => { settings.theme = t.key; applyTheme(); await storageSet('settings', settings); render(); };
      swatches.appendChild(sw);
    });
    themeGrp.appendChild(swatches);

    bar.append(fontGrp, sizeGrp, lineGrp, themeGrp);
    return bar;
  }

  init();
})();
</script>
</body>
</html>
