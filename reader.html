<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Reading Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EFEAE0;
    --paper-raised:#F7F4EC;
    --ink:#26221D;
    --ink-soft:#6b6355;
    --line:#ddd6c5;
    --brass:#9C6B30;
    --brass-soft:#c69a5f;
    --danger:#a4453a;
    --shadow: 0 2px 10px rgba(38,34,29,0.08);
    --radius: 3px;
    --ribbon: var(--brass);
    --book-folder-bg:#e2dac8;
  }
  [data-theme="dark"]{
    --paper:#1B1B18;
    --paper-raised:#242420;
    --ink:#E8E3D8;
    --ink-soft:#9a9384;
    --line:#3a3833;
    --brass:#c69a5f;
    --brass-soft:#9C6B30;
    --shadow: 0 2px 14px rgba(0,0,0,0.4);
    --book-folder-bg:#2d2b25;
  }
  [data-theme="sepia"]{
    --paper:#E9DCC3;
    --paper-raised:#F1E6D0;
    --ink:#3b2f1e;
    --ink-soft:#7a6a4d;
    --line:#d3c19c;
    --brass:#8a5a2b;
    --book-folder-bg:#ddccaa;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    transition:background .25s ease, color .25s ease;
    overflow-x:hidden;
  }
  button, select, input{ font-family:inherit; }
  button{
    cursor:pointer;
    border:1px solid var(--line);
    background:var(--paper-raised);
    color:var(--ink);
    border-radius:var(--radius);
    padding:8px 12px;
    font-size:13px;
  }
  button:hover{ border-color:var(--brass); }
  button:focus-visible, select:focus-visible, input:focus-visible{
    outline:2px solid var(--brass);
    outline-offset:2px;
  }
  button.icon-btn{
    width:36px; height:36px; padding:0;
    display:flex; align-items:center; justify-content:center;
  }
  button.primary{
    background:var(--brass); color:#fff; border-color:var(--brass);
  }
  button.primary:hover{ background:var(--brass-soft); }
  button.subtle{ border-color:transparent; background:transparent; }
  button.subtle:hover{ background:var(--paper-raised); border-color:var(--line); }

  /* ---------- App shell ---------- */
  #app{ min-height:100%; display:flex; flex-direction:column; }

  .topbar{
    position:sticky; top:0; z-index:20;
    display:flex; align-items:center; justify-content:space-between;
    gap:10px;
    padding:12px 18px;
    background:var(--paper);
    border-bottom:1px solid var(--line);
  }
  .brand{
    display:flex; align-items:center; gap:10px;
    font-weight:600; letter-spacing:.02em;
  }
  .brand .mark{
    width:20px;height:20px; border-radius:2px;
    background:linear-gradient(160deg, var(--brass), var(--brass-soft));
    flex:none;
  }
  .topbar-actions{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .sync-chip{ font-size:12px; }
  .sync-chip.syncing{ color:var(--ink-soft); }
  .sync-chip.synced{ color:#2f8f4e; }
  .sync-chip.failed{ color:var(--danger); }
  .version-badge{
    position:fixed;
    right:12px;
    bottom:12px;
    z-index:30;
    padding:4px 8px;
    border:1px solid var(--line);
    border-radius:999px;
    background:rgba(255,255,255,0.72);
    color:var(--ink-soft);
    font-size:11px;
    line-height:1;
    letter-spacing:.04em;
    box-shadow:var(--shadow);
    pointer-events:none;
    backdrop-filter:blur(6px);
  }
  [data-theme="dark"] .version-badge{ background:rgba(27,27,24,0.82); }
  .profile-switcher{ display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .profile-chip{ padding:6px 10px; border-radius:999px; font-size:12px; }
  .profile-chip.active{ background:var(--brass); color:#fff; border-color:var(--brass); }
  .profile-select{
    min-width:120px;
    padding:7px 10px;
    border:1px solid var(--line);
    border-radius:999px;
    background:var(--paper-raised);
    color:var(--ink);
    font-size:12px;
  }

  main{ flex:1; width:100%; }

  /* ---------- Library ---------- */
  .library-wrap{ max-width:760px; margin:0 auto; padding:20px 18px 60px; }

  .continue-card{
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:6px;
    padding:16px 18px;
    margin-bottom:22px;
    box-shadow:var(--shadow);
    display:flex; align-items:center; justify-content:space-between; gap:14px;
    flex-wrap:wrap;
  }
  .continue-card .label{ font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--ink-soft); margin-bottom:4px;}
  .continue-card .title{ font-size:17px; font-weight:600; }
  .continue-card .pct{ font-size:12px; color:var(--ink-soft); margin-top:2px; }

  .toolrow{
    display:flex; gap:10px; align-items:center; margin-bottom:18px; flex-wrap:wrap;
  }
  .toolrow .inline-actions{ display:flex; gap:8px; flex-wrap:wrap; }
  .search-input{
    flex:1; min-width:160px;
    padding:9px 12px; border:1px solid var(--line); border-radius:var(--radius);
    background:var(--paper-raised); color:var(--ink); font-size:14px;
  }
  #fileInput{ display:none; }
  #folderInput{ display:none; }
  #importInput{ display:none; }
  #coverInput{ display:none; }

  .add-modal-note{
    font-size:12px;
    color:var(--ink-soft);
    margin-top:4px;
  }

  .book-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:12px;
    margin-bottom:20px;
  }
  .book-card{
    border:1px solid var(--line);
    border-radius:6px;
    background:var(--paper-raised);
    overflow:hidden;
    box-shadow:var(--shadow);
    display:flex;
    flex-direction:column;
  }
  .book-cover{
    width:100%;
    aspect-ratio:3 / 4;
    object-fit:cover;
    background:linear-gradient(135deg, var(--paper), var(--paper-raised));
  }
  .book-cover-fallback{
    width:100%;
    aspect-ratio:3 / 4;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:32px;
    color:var(--ink-soft);
    background:linear-gradient(135deg, var(--paper), var(--paper-raised));
  }
  .book-meta{ padding:10px; }
  .book-title{
    font-size:13px;
    font-weight:600;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    margin-bottom:8px;
  }
  .book-sub{ font-size:11px; color:var(--ink-soft); margin-bottom:10px; }
  .book-actions{ display:flex; gap:6px; }
  .book-actions button{ flex:1; padding:6px 8px; font-size:12px; }

  .book-page-header{
    border:1px solid var(--line);
    border-radius:6px;
    background:var(--paper-raised);
    box-shadow:var(--shadow);
    padding:12px;
    margin-bottom:14px;
    display:flex;
    gap:12px;
    align-items:flex-start;
  }
  .book-page-cover,
  .book-page-cover-fallback{
    width:96px;
    aspect-ratio:3 / 4;
    border-radius:4px;
    border:1px solid var(--line);
    background:linear-gradient(135deg, var(--paper), var(--paper-raised));
    flex:none;
  }
  .book-page-cover{ object-fit:cover; }
  .book-page-cover-fallback{
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    color:var(--ink-soft);
  }
  .book-page-meta{ min-width:0; flex:1; }
  .book-page-title{ font-size:18px; font-weight:700; margin-bottom:4px; }
  .book-page-sub{ font-size:12px; color:var(--ink-soft); margin-bottom:10px; }
  .book-page-actions{ display:flex; gap:8px; flex-wrap:wrap; }

  .chapter-list{ list-style:none; margin:0; padding:0; border-top:1px solid var(--line); }
  .chapter-list.two-col{
    display:grid;
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:0 14px;
  }
  .chapter-list.nested{ border-top:none; }
  .volume-group{ border-top:1px solid var(--line); }
  .book-group{ border-top:none; margin-top:10px; }
  .book-group > summary{
    background:var(--book-folder-bg);
    color:var(--ink);
    border:1px solid var(--line);
    border-radius:4px;
    padding:10px 10px;
  }
  .volume-group summary{
    padding:12px 4px; cursor:pointer; font-size:12px; font-weight:600;
    text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft);
    list-style:none; display:flex; align-items:center; gap:8px;
    flex-wrap:wrap;
  }
  .volume-group summary::-webkit-details-marker{ display:none; }
  .volume-group summary::before{ content:'▸'; font-size:10px; }
  .volume-group[open] summary::before{ content:'▾'; }
  .volume-group .chapter-list{ padding-left:6px; }
  .volume-summary-text{ flex:1; min-width:120px; }
  .volume-progress{
    flex:none;
    width:min(160px, 100%);
    height:6px;
    border-radius:999px;
    background:var(--line);
    overflow:hidden;
    border:1px solid color-mix(in srgb, var(--line) 60%, transparent);
  }
  .volume-progress-fill{
    display:block;
    height:100%;
    background:var(--brass);
    border-radius:inherit;
  }
  .volume-progress-wrap{
    display:flex;
    align-items:center;
    gap:6px;
    min-width:180px;
  }
  .volume-progress-label{
    font-size:11px;
    color:var(--ink-soft);
    min-width:34px;
    text-align:right;
  }
  .chapter-row{
    display:flex; align-items:center; gap:14px;
    padding:13px 4px;
    border-bottom:1px solid var(--line);
    cursor:pointer;
  }
  .chapter-row:hover{ background:var(--paper-raised); }
  .chapter-main{ flex:1; min-width:0; }
  .chapter-title{
    font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .chapter-progress-track{
    height:3px; background:var(--line); border-radius:2px; margin-top:6px; overflow:hidden;
  }
  .chapter-progress-fill{ height:100%; background:var(--brass); }
  .chapter-done{ color:var(--ink-soft); }
  .chapter-del{
    flex:none; opacity:0; transition:opacity .15s;
  }
  .chapter-row:hover .chapter-del{ opacity:1; }

  /* ---------- Edit Modal ---------- */
  .modal-backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:60; display:none;
  }
  .modal-backdrop.open{ display:block; }
  .modal-dialog{
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:70;
    background:var(--paper-raised); border:1px solid var(--line); border-radius:6px;
    padding:20px; max-width:420px; width:90%; box-shadow:var(--shadow);
    display:none;
  }
  .modal-dialog.open{ display:block; }
  .modal-dialog h3{ margin:0 0 14px; font-size:16px; }
  .modal-dialog .form-group{
    margin-bottom:12px; display:flex; flex-direction:column; gap:4px;
  }
  .modal-dialog label{ font-size:12px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.06em; }
  .modal-dialog input{
    padding:9px 12px; border:1px solid var(--line); border-radius:var(--radius);
    background:var(--paper); color:var(--ink); font-size:14px;
  }
  .modal-dialog select{
    padding:9px 12px; border:1px solid var(--line); border-radius:var(--radius);
    background:var(--paper); color:var(--ink); font-size:14px;
  }
  .cover-preview{
    width:100%;
    max-width:180px;
    aspect-ratio:3 / 4;
    object-fit:cover;
    border:1px solid var(--line);
    border-radius:6px;
    background:var(--paper);
  }
  .cover-placeholder{
    width:100%;
    max-width:180px;
    aspect-ratio:3 / 4;
    border:1px dashed var(--line);
    border-radius:6px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--ink-soft);
    font-size:12px;
    text-align:center;
    padding:12px;
  }
  .modal-dialog .button-group{
    display:flex; gap:8px; justify-content:flex-end; margin-top:16px;
  }
  .modal-dialog button{ margin:0; }

  .empty-state{
    text-align:center; padding:70px 20px; color:var(--ink-soft);
  }
  .empty-state .big{ font-size:16px; color:var(--ink); margin-bottom:8px; }

  /* ---------- Reader ---------- */
  .reader-shell{ max-width:760px; margin:0 auto; padding:0 18px 100px; position:relative; }

  .ribbon{
    position:fixed; top:0; right:26px; z-index:30;
    background:var(--ribbon); color:#fff;
    font-size:11px; font-weight:600; letter-spacing:.05em;
    padding:6px 10px 9px;
    border-radius:0 0 4px 4px;
    box-shadow:var(--shadow);
    clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 82%, 0 100%);
  }

  .reader-toolbar{
    position:sticky; top:0; z-index:20;
    background:var(--paper);
    border-bottom:1px solid var(--line);
    padding:10px 18px;
    display:flex; gap:14px; align-items:center; flex-wrap:wrap;
  }
  .reader-toolbar button.settings-collapse-btn{
    margin-left:auto;
    white-space:nowrap;
  }
  .reader-toolbar .grp{ display:flex; align-items:center; gap:6px; }
  .reader-toolbar label{ font-size:11px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.06em; }
  .reader-toolbar select{
    padding:6px 8px; border:1px solid var(--line); border-radius:var(--radius);
    background:var(--paper-raised); color:var(--ink); font-size:13px;
  }
  .stepper{ display:flex; align-items:center; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; }
  .stepper button{ border:none; border-radius:0; }
  .stepper span{ padding:0 10px; font-size:12px; min-width:26px; text-align:center; }
  .theme-swatches{ display:flex; gap:6px; }
  .swatch{
    width:26px;height:26px;border-radius:50%;border:2px solid var(--line);cursor:pointer;
  }
  .swatch.active{ border-color:var(--brass); }

  .chapter-heading{
    padding:34px 0 6px;
    font-size:12px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.1em;
  }
  .chapter-heading h1{
    font-size:26px; margin:6px 0 0; color:var(--ink); letter-spacing:-.01em;
  }

  .reader-content{ padding:14px 0 40px; }
  .reader-content p{ margin:0 0 1em; }

  .reader-nav{
    position:sticky; bottom:0; z-index:20;
    display:flex; justify-content:space-between; gap:10px;
    padding:12px 18px; background:var(--paper); border-top:1px solid var(--line);
    transition:transform .2s ease, opacity .2s ease;
  }
  .reader-nav button{ flex:1; max-width:200px; }
  .reader-nav .center-btn{ flex:none; }

  .mobile-chrome-toggle{
    position:fixed;
    right:12px;
    bottom:calc(env(safe-area-inset-bottom, 0px) + 14px);
    z-index:85;
    border-radius:999px;
    padding:9px 12px;
    font-size:12px;
    box-shadow:var(--shadow);
  }

  body.reader-mobile-chrome-collapsed .topbar{
    transform:translateY(-110%);
    opacity:0;
    pointer-events:none;
  }
  body.reader-mobile-chrome-collapsed .reader-nav{
    transform:translateY(calc(100% + 12px));
    opacity:0;
    pointer-events:none;
  }

  .side-drawer{
    position:fixed; top:0; left:0; bottom:0; width:280px; max-width:82vw; z-index:50;
    background:var(--paper-raised); border-right:1px solid var(--line);
    box-shadow:var(--shadow); overflow-y:auto; padding:14px;
    transform:translateX(-100%); transition:transform .2s ease;
  }
  .side-drawer.open{ transform:translateX(0); }
  .side-drawer-backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:45;
    display:none;
  }
  .side-drawer-backdrop.open{ display:block; }
  .side-drawer h2{ font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft); margin:0 0 10px; }
  .side-drawer .chapter-row{ padding:9px 4px; }
  .side-drawer .chapter-row.current{ background:var(--paper); border-left:2px solid var(--brass); }
  .side-drawer .volume-group summary{ padding:9px 4px; }

  .visually-hidden{
    position:absolute; width:1px;height:1px; overflow:hidden; clip:rect(0 0 0 0);
  }

  @media (max-width:520px){
    .topbar{
      padding:10px 12px;
      align-items:flex-start;
      flex-wrap:wrap;
    }
    .brand{ font-size:14px; }
    .topbar-actions{
      width:100%;
      gap:6px;
      overflow-x:auto;
      flex-wrap:nowrap;
      padding-bottom:2px;
    }
    .topbar-actions button{ white-space:nowrap; }
    .library-wrap{ padding:14px 12px 42px; }
    .continue-card{ padding:12px 14px; margin-bottom:16px; }
    .toolrow{ gap:8px; align-items:stretch; }
    .toolrow .inline-actions{ width:100%; }
    .toolrow .inline-actions button{ flex:1; }
    .book-grid{ grid-template-columns:repeat(2, minmax(0, 1fr)); gap:10px; }
    .book-title{ white-space:normal; }
    .book-page-header{ padding:10px; gap:10px; }
    .book-page-cover,
    .book-page-cover-fallback{ width:78px; }
    .book-page-title{ font-size:16px; }
    .chapter-row{ gap:10px; padding:10px 4px; }
    .chapter-del{ opacity:1; }
    .reader-shell{ padding:0 12px 84px; }
    .reader-toolbar{
      padding:8px 12px;
      gap:8px;
      align-items:stretch;
    }
    .reader-toolbar .grp{
      width:100%;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    .reader-toolbar select{ width:100%; }
    .stepper{ width:100%; justify-content:space-between; }
    .chapter-heading{ padding-top:24px; }
    .chapter-heading h1{ font-size:22px; }
    .ribbon{ right:14px; }
    .reader-nav .center-btn{ display:none; }
  }
  @media (max-width:760px){
    .topbar{ transition:transform .2s ease, opacity .2s ease; }
    .chapter-list.two-col{ grid-template-columns:1fr; }
  }
  @media (min-width:761px){
    .mobile-chrome-toggle{ display:none !important; }
  }
</style>
</head>
<body data-theme="light">
<div id="app">

  <!-- ===================== TOPBAR ===================== -->
  <div class="topbar" id="topbar">
    <div class="brand"><span class="mark"></span><span id="brandTitle">Reading Room</span></div>
    <div class="topbar-actions" id="topbarActions"></div>
  </div>

  <main id="main"></main>

  <input type="file" id="fileInput" accept=".txt" multiple />
  <input type="file" id="folderInput" webkitdirectory directory multiple />
  <input type="file" id="importInput" accept=".json,application/json" />
  <input type="file" id="coverInput" accept="image/*" />

  <div class="modal-backdrop" id="editModalBackdrop"></div>
  <div class="modal-dialog" id="editModal">
    <h3>Edit Chapter</h3>
    <div class="form-group">
      <label for="editBook">Book</label>
      <input type="text" id="editBook" placeholder="e.g., Harry Potter" />
    </div>
    <div class="form-group">
      <label for="editVolume">Volume</label>
      <input type="text" id="editVolume" placeholder="e.g., Volume 1" />
    </div>
    <div class="form-group">
      <label for="editTitle">Chapter Title</label>
      <input type="text" id="editTitle" placeholder="e.g., The Boy Who Lived" />
    </div>
    <div class="button-group">
      <button id="editModalCancelBtn">Cancel</button>
      <button class="primary" id="editModalSaveBtn">Save</button>
    </div>
  </div>

  <div class="modal-backdrop" id="bookModalBackdrop"></div>
  <div class="modal-dialog" id="bookModal">
    <h3>Manage Book</h3>
    <div class="form-group">
      <label for="bookPicker">Book</label>
      <select id="bookPicker"></select>
    </div>
    <div class="form-group">
      <label for="bookTitleInput">Book Title</label>
      <input type="text" id="bookTitleInput" placeholder="e.g., My Book" />
    </div>
    <div class="form-group">
      <label>Cover</label>
      <div id="bookCoverPreviewWrap"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;">
        <button id="bookPickCoverBtn" type="button">Upload cover</button>
        <button id="bookClearCoverBtn" type="button">Remove cover</button>
      </div>
    </div>
    <div class="form-group">
      <label for="bookSortSelect">Chapter Sort</label>
      <select id="bookSortSelect">
        <option value="book-volume-added">Book/Volume/Added</option>
        <option value="book-volume-title">Book/Volume/Title</option>
        <option value="title">Title A-Z</option>
        <option value="recent">Recently Added</option>
      </select>
    </div>
    <div class="form-group">
      <label for="volumeRenameFromSelect">Rename Volume Folder</label>
      <select id="volumeRenameFromSelect"></select>
      <input type="text" id="volumeRenameToInput" placeholder="New volume name" />
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;">
        <button id="renameVolumeBtn" type="button">Rename volume</button>
      </div>
    </div>
    <div class="button-group" style="justify-content:space-between;">
      <button id="bookUploadChaptersBtn" type="button">+ Add Chapters</button>
      <div style="display:flex;gap:8px;">
        <button id="bookDeleteBtn" type="button">Delete book</button>
        <button id="bookModalCancelBtn" type="button">Close</button>
        <button class="primary" id="bookModalSaveBtn" type="button">Save</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="addModalBackdrop"></div>
  <div class="modal-dialog" id="addModal">

<script>
(function(){

  // ---------------------------------------------------------------
  // Storage backend: use IndexedDB for larger payloads and chunk big
  // values so chapter uploads don't hit localStorage quota limits.
  // ---------------------------------------------------------------
  const PREFIX = 'reading-room:';
  const DB_NAME = 'reading-room-db';
  const STORE_NAME = 'items';
  const CHUNK_SIZE = 256 * 1024;
  let dbPromise = null;
  const memoryCache = {};

  function openDatabase(){
    if (!window.indexedDB) return Promise.reject(new Error('IndexedDB unavailable'));
    if (dbPromise) return dbPromise;

    dbPromise = new Promise((resolve, reject) => {
      const request = window.indexedDB.open(DB_NAME, 2);
      request.onupgradeneeded = (event) => {
        const db = event.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) {
          db.createObjectStore(STORE_NAME, { keyPath: 'key' });
        }
      };
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error || new Error('IndexedDB unavailable'));
    });

    return dbPromise;
  }

  async function getFromDb(key){
    const db = await openDatabase();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readonly');
      tx.onabort = () => reject(tx.error || new Error('Read aborted'));
      tx.onerror = () => reject(tx.error || new Error('Read failed'));
      const store = tx.objectStore(STORE_NAME);
      const request = store.get(key);
      request.onsuccess = () => resolve(request.result ? request.result.value : null);
      request.onerror = () => reject(request.error || new Error('Read failed'));
    });
  }

  async function setInDb(key, value){
    const db = await openDatabase();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.onabort = () => reject(tx.error || new Error('Write aborted'));
      tx.onerror = () => reject(tx.error || new Error('Write failed'));
      const store = tx.objectStore(STORE_NAME);
      const request = store.put({ key, value });
      request.onsuccess = () => resolve({ key, value, shared:false });
      request.onerror = () => reject(request.error || new Error('Write failed'));
    });
  }

  async function deleteFromDb(key){
    const db = await openDatabase();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.onabort = () => reject(tx.error || new Error('Delete aborted'));
      tx.onerror = () => reject(tx.error || new Error('Delete failed'));
      const store = tx.objectStore(STORE_NAME);
      const request = store.delete(key);
      request.onsuccess = () => resolve({ key, deleted:true, shared:false });
      request.onerror = () => reject(request.error || new Error('Delete failed'));
    });
  }

  async function listFromDb(prefix){
    const db = await openDatabase();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readonly');
      tx.onabort = () => reject(tx.error || new Error('List aborted'));
      tx.onerror = () => reject(tx.error || new Error('List failed'));
      const store = tx.objectStore(STORE_NAME);
      const request = store.openCursor();
      const keys = [];
      request.onsuccess = () => {
        const cursor = request.result;
        if (cursor) {
          const key = cursor.key;
          if (!prefix || key.startsWith(prefix)) keys.push(key.slice(PREFIX.length));
          cursor.continue();
        } else {
          resolve({ keys, prefix, shared:false });
        }
      };
      request.onerror = () => reject(request.error || new Error('List failed'));
    });
  }

  async function setChunkedValue(fullKey, value){
    const previousMetaRaw = await getFromDb(fullKey);
    let previousChunkKeys = [];
    if (previousMetaRaw) {
      try {
        const previousMeta = JSON.parse(previousMetaRaw);
        if (previousMeta && previousMeta.kind === 'chunked' && Array.isArray(previousMeta.chunkKeys)) {
          previousChunkKeys = previousMeta.chunkKeys;
        }
      } catch (e) {}
    }

    const chunks = [];
    for (let offset = 0; offset < value.length; offset += CHUNK_SIZE) {
      chunks.push(value.slice(offset, offset + CHUNK_SIZE));
    }

    const meta = { kind: 'chunked', chunkCount: chunks.length, chunkKeys: chunks.map((_, index) => fullKey + ':chunk:' + index) };
    await setInDb(fullKey, JSON.stringify(meta));
    for (let i = 0; i < chunks.length; i++) {
      await setInDb(meta.chunkKeys[i], chunks[i]);
    }

    // Delete old chunk fragments that are no longer part of this key.
    const nextChunkKeySet = new Set(meta.chunkKeys);
    for (const oldKey of previousChunkKeys) {
      if (!nextChunkKeySet.has(oldKey)) {
        await deleteFromDb(oldKey);
      }
    }

    memoryCache[fullKey] = value;
    return { key: fullKey, value, shared:false };
  }

  async function getChunkedValue(fullKey){
    const metaRaw = await getFromDb(fullKey);
    if (!metaRaw) return null;
    try {
      const meta = JSON.parse(metaRaw);
      if (!meta || meta.kind !== 'chunked') return metaRaw;
      const chunks = [];
      for (const chunkKey of meta.chunkKeys || []) {
        const chunk = await getFromDb(chunkKey);
        if (chunk === null || chunk === undefined) return null;
        chunks.push(chunk);
      }
      const value = chunks.join('');
      memoryCache[fullKey] = value;
      return value;
    } catch (e) {
      return metaRaw;
    }
  }

  async function deleteChunkedValue(fullKey){
    const metaRaw = await getFromDb(fullKey);
    if (metaRaw) {
      try {
        const meta = JSON.parse(metaRaw);
        if (meta && meta.kind === 'chunked') {
          for (const chunkKey of meta.chunkKeys || []) {
            await deleteFromDb(chunkKey);
          }
        }
      } catch (e) {}
    }
    await deleteFromDb(fullKey);
    delete memoryCache[fullKey];
    return { key: fullKey, deleted:true, shared:false };
  }

  async function migrateLegacyStorage(){
    if (!window.localStorage) return;
    const legacyKeys = [];
    for (let i = 0; i < window.localStorage.length; i++) {
      const fullKey = window.localStorage.key(i);
      if (fullKey && fullKey.startsWith(PREFIX)) legacyKeys.push(fullKey);
    }
    for (const fullKey of legacyKeys) {
      try {
        const raw = window.localStorage.getItem(fullKey);
        if (raw != null) await setInDb(fullKey, raw);
      } catch (e) {
        console.warn('Could not migrate legacy storage entry', fullKey, e);
      }
    }
  }

  window.storage = {
    async get(key){
      const fullKey = PREFIX + key;
      if (memoryCache[fullKey] !== undefined) return { key, value: memoryCache[fullKey], shared:false };
      try {
        const raw = await getChunkedValue(fullKey);
        if (raw !== null) return { key, value: raw, shared:false };
      } catch (e) {
        console.warn('IndexedDB read failed, falling back to localStorage', e);
      }
      if (window.localStorage) {
        const raw = window.localStorage.getItem(fullKey);
        return raw === null ? null : { key, value: raw, shared:false };
      }
      return null;
    },
    async set(key, value){
      const fullKey = PREFIX + key;
      try {
        if (typeof value === 'string' && value.length > CHUNK_SIZE) {
          return await setChunkedValue(fullKey, value);
        }

        // If this key used to be chunked, remove old chunk artifacts first.
        await deleteChunkedValue(fullKey);
        await setInDb(fullKey, value);
        memoryCache[fullKey] = value;
        return { key, value, shared:false };
      } catch (e) {
        console.warn('IndexedDB write failed, falling back to localStorage', e);
        if (window.localStorage && typeof value === 'string' && value.length < 5 * 1024 * 1024) {
          window.localStorage.setItem(fullKey, value);
          memoryCache[fullKey] = value;
          return { key, value, shared:false };
        }
        throw e;
      }
    },
    async delete(key){
      const fullKey = PREFIX + key;
      try {
        return await deleteChunkedValue(fullKey);
      } catch (e) {
        console.warn('IndexedDB delete failed, falling back to localStorage', e);
        if (window.localStorage) {
          window.localStorage.removeItem(fullKey);
          delete memoryCache[fullKey];
          return { key, deleted:true, shared:false };
        }
        throw e;
      }
    },
    async list(prefix){
      try {
        return await listFromDb(PREFIX + (prefix || ''));
      } catch (e) {
        console.warn('IndexedDB list failed, falling back to localStorage', e);
        const keys = [];
        if (window.localStorage) {
          for (let i = 0; i < window.localStorage.length; i++) {
            const k = window.localStorage.key(i);
            if (k && k.startsWith(PREFIX)) {
              const bare = k.slice(PREFIX.length);
              if (!prefix || bare.startsWith(prefix)) keys.push(bare);
            }
          }
        }
        return { keys, prefix, shared:false };
      }
    }
  };

  migrateLegacyStorage().catch(() => {});

        if (r) return true;
      }catch(e){
        console.error('storage set failed (attempt ' + (i+1) + ')', key, e);
      }
      if (i < attempts-1) await new Promise(res => setTimeout(res, 500 * (i+1)));
    }
    return false;
  }

  async function migrateScopedLibraryToGlobal(scopeSlug){
    if (!scopeSlug) return;
    const existingGlobalIndex = await storageGet('chapters-index');
    if (Array.isArray(existingGlobalIndex) && existingGlobalIndex.length) return;

    const scopedIndex = await getScopedStorageValue('chapters-index', scopeSlug);
    if (!Array.isArray(scopedIndex) || !scopedIndex.length) return;

    const scopedBooksMeta = await getScopedStorageValue('books-meta', scopeSlug);
    const scopedProfiles = await getScopedStorageValue('profiles-data', scopeSlug);
    const scopedProfileState = await getScopedStorageValue('profile-state', scopeSlug);
    const scopedProgress = await getScopedStorageValue('progress', scopeSlug);
    const scopedSettings = await getScopedStorageValue('settings', scopeSlug);

    await storageSet('chapters-index', scopedIndex);
    if (scopedBooksMeta && typeof scopedBooksMeta === 'object') await storageSet('books-meta', scopedBooksMeta);
    if (scopedProfiles && typeof scopedProfiles === 'object') await storageSet('profiles-data', scopedProfiles);
    if (scopedProfileState && typeof scopedProfileState === 'object') await storageSet('profile-state', scopedProfileState);
    if (scopedProgress && typeof scopedProgress === 'object') await storageSet('progress', scopedProgress);
    if (scopedSettings && typeof scopedSettings === 'object') await storageSet('settings', scopedSettings);

    for (const entry of scopedIndex) {
      if (!entry || !entry.id) continue;
      const chapter = await getScopedStorageValue('chapter:' + entry.id, scopeSlug);
      if (chapter) await storageSet('chapter:' + entry.id, chapter);
    }
  }

  function slugifyBookName(name){
    return (name || '')
      .toString()
      .trim()
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-+|-+$/g, '');
  }

  function buildBookReaderPath(bookName){
    const slug = slugifyBookName(bookName);
    const search = window.location.search || '';
    return '/' + slug + '/reader.html' + search;

  function getRouteBookName(){
    if (!routeBookSlug) return '';
    const books = getAllBookNames();
    const matched = books.find((name) => slugifyBookName(name) === routeBookSlug);
    if (matched) return matched;
    return routeBookSlug
      .split('-')
      .filter(Boolean)
      .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
      .join(' ');
  }

  function formatSyncTime(ts){
    if (!ts) return '';
    try {
      return new Date(ts).toLocaleTimeString([], { hour:'numeric', minute:'2-digit' });
    } catch (e) {
      return '';
    }
  }

  function formatBytes(bytes){
    const n = Number(bytes) || 0;
    if (n < 1024) return n + ' B';
    if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
    return (n / (1024 * 1024)).toFixed(2) + ' MB';
  }

    if (syncStatus.state === 'failed') return syncStatus.message || 'Sync failed';
    if (syncStatus.state === 'synced') {
      const at = formatSyncTime(syncStatus.at);
      return at ? ('Synced ' + at) : 'Synced';
    }
    return 'Sync ready';
  }

    return [...merged].sort((a, b) => getBookLabel(a).localeCompare(getBookLabel(b)));

    const keys = (keysRes && keysRes.keys) ? keysRes.keys : [];
    const scopedKeys = keys.filter((k) => /^book:[^:]+:/.test(k));
    const globalKeys = keys.filter((k) => !/^book:[^:]+:/.test(k));
    const chunkKeys = keys.filter((k) => k.includes(':chunk:'));
    const globalLogicalKeys = globalKeys.filter((k) => !k.includes(':chunk:'));
    let missingChapterCount = 0;
    for (const ch of (payload.index || [])) {
      if (!ch || !ch.id) continue;
      const local = await storageGet('chapter:' + ch.id);
      if (!local) missingChapterCount++;
    }
    return {
      books: getAllBookNames(index).length,
      chapters: index.length,
      payloadBytes: payloadJson.length,
      chapterBodies: index.length - missingChapterCount,
      missingChapterCount,
      browserRole: missingChapterCount === 0 && index.length > 0
        ? 'source browser'
        : (missingChapterCount >= index.length && index.length > 0 ? 'receiver browser' : 'mixed browser'),
      backfillPercent: index.length ? Math.round(((index.length - missingChapterCount) / index.length) * 100) : 0,
      keysTotal: keys.length,
      keysScoped: scopedKeys.length,
      keysGlobal: globalKeys.length,
      keysChunk: chunkKeys.length,
      keysGlobalLogical: globalLogicalKeys.length,
      backfill: Object.assign({}, backfillDebug),
      scopedCleanup: Object.assign({}, scopedCleanupDebug),
      events: syncEvents.slice(0, 12),
    };
  }

  function hashString(str){
    let h = 2166136261;
    for (let i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h += (h << 1) + (h << 4) + (h << 7) + (h << 8) + (h << 24);
    }
    return (h >>> 0).toString(16);
  }

  function payloadSignatureFromJson(jsonText){
    return String(jsonText.length) + ':' + hashString(jsonText);
  }

  function payloadSignatureFromPayload(payload){
    // exportedAt changes every build and should not force a fresh sync by itself.
    const stable = Object.assign({}, payload, { exportedAt: 0 });
    return payloadSignatureFromJson(JSON.stringify(stable));
  }

  function compactBooksMetaForSync(source){
    const input = (source && typeof source === 'object') ? source : {};
    const out = {};
    for (const key of Object.keys(input)) {

      out[key] = {

      };
    }
    return out;
  }

  function resolveCoverSrc(bookName, meta){

    return '';
  }

  async function backfillCoverPathsToRemote(){
    if (!syncKey) return false;
    const source = (booksMeta && typeof booksMeta === 'object') ? booksMeta : {};
    let changed = false;
    for (const bookName of Object.keys(source)) {
      const meta = source[bookName] && typeof source[bookName] === 'object' ? source[bookName] : null;
      if (!meta || meta.coverPath || !meta.coverDataUrl) continue;
      const uploaded = await uploadCoverToServer(bookName, meta.coverDataUrl);
      if (uploaded.ok && uploaded.coverPath) {
        meta.coverPath = uploaded.coverPath;
        meta.coverDataUrl = '';
        changed = true;
      }
    }
    if (changed) {
      await persistBooksMeta();
      addSyncEvent('cover-backfill', 'Uploaded local-only covers for cross-device access');
    }
    return changed;
  }

  function scheduleBackfillContinuation(delayMs){
    if (routeBookSlug || !syncKey) return;
    if (chapterBackfillTimer) return;
    chapterBackfillTimer = setTimeout(() => {
      chapterBackfillTimer = null;
      backfillRemoteChapters().catch((e) => {
        console.warn('Scheduled chapter backfill failed', e);
        addSyncEvent('backfill-fail', 'Scheduled chapter backfill failed');
      });
    }, Math.max(250, delayMs || 1000));
  }

  function scheduleScopedCleanupContinuation(delayMs){
    if (routeBookSlug) return;
    if (scopedCleanupTimer) return;
    scopedCleanupTimer = setTimeout(() => {
      scopedCleanupTimer = null;
      cleanupLegacyScopedKeys().catch((e) => {
        console.warn('Scheduled scoped cleanup failed', e);
        addSyncEvent('cleanup-fail', 'Scheduled scoped cleanup failed');

  async function cleanupLegacyScopedKeys(){
    if (routeBookSlug || scopedCleanupInFlight) return;
    scopedCleanupInFlight = true;
    scopedCleanupDebug.active = true;
    scopedCleanupDebug.message = 'Scoped key cleanup running';
    try {
      const keysRes = await window.storage.list('');
      const keys = (keysRes && keysRes.keys) ? keysRes.keys : [];
      const scopedKeys = keys.filter((k) => /^book:[^:]+:/.test(k));
      scopedCleanupDebug.total = scopedKeys.length;
      scopedCleanupDebug.remaining = scopedKeys.length;

      if (!scopedKeys.length) {
        scopedCleanupDebug.complete = true;
        scopedCleanupDebug.lastRunAt = Date.now();
        scopedCleanupDebug.message = 'No legacy scoped keys found';
        return;
      }

      const maxDeletesPerRun = 800;
      let deletedNow = 0;
      for (let i = 0; i < scopedKeys.length && deletedNow < maxDeletesPerRun; i++) {
        const key = scopedKeys[i];
        try {
          await window.storage.delete(key, false);
          deletedNow++;
        } catch (e) {
          // Keep going; a few failed deletes should not block cleanup.
        }
      }

      scopedCleanupDebug.runs += 1;
      scopedCleanupDebug.deleted += deletedNow;
      scopedCleanupDebug.remaining = Math.max(0, scopedKeys.length - deletedNow);
      scopedCleanupDebug.complete = scopedCleanupDebug.remaining === 0;
      scopedCleanupDebug.lastRunAt = Date.now();
      scopedCleanupDebug.message = scopedCleanupDebug.complete
        ? 'Scoped key cleanup complete'
        : ('Scoped key cleanup partial (' + deletedNow + '/' + scopedKeys.length + ' this run)');
      addSyncEvent('cleanup', 'Deleted ' + deletedNow + ' scoped key(s), remaining ~' + scopedCleanupDebug.remaining);

      if (!scopedCleanupDebug.complete) {
        scheduleScopedCleanupContinuation(900);
      }
    } finally {
      scopedCleanupDebug.active = false;
      scopedCleanupInFlight = false;
    }
  }

  async function backfillRemoteChapters(){
    if (!syncKey || routeBookSlug || chapterBackfillInFlight) return;
    const ids = (Array.isArray(index) ? index : []).map((ch) => ch && ch.id).filter(Boolean);
    if (!ids.length) return;

    // If this browser has no local chapter bodies, it cannot seed remote chapter blobs.
    let hasAnyLocalChapter = false;
    for (const id of ids) {
      const local = await storageGet('chapter:' + id);
      if (local && typeof local.content === 'string' && local.content.length) {
        hasAnyLocalChapter = true;
        break;
      }
    }
    if (!hasAnyLocalChapter) {
      backfillDebug.message = 'No local chapter bodies to seed remote';
      addSyncEvent('backfill-skip', backfillDebug.message);
      return;
    }

    const signature = hashString(ids.join('|'));
    const prev = readChapterBackfillState();
    const sameSig = !!(prev && prev.sig === signature);
    if (sameSig && prev.complete) {
      backfillDebug.complete = true;
      backfillDebug.message = 'Backfill already complete';
      return;
    }

    chapterBackfillInFlight = true;
    backfillDebug.active = true;
    backfillDebug.total = ids.length;
    backfillDebug.message = 'Backfill running';
    try {
      const start = (sameSig && Number.isInteger(prev.cursor)) ? Math.max(0, prev.cursor) : 0;
      const scannedSoFar = (sameSig && Number.isInteger(prev.scanned)) ? Math.max(0, prev.scanned) : 0;
      const maxChecksPerRun = 220;
      let checks = 0;
      let uploaded = 0;
      let failed = 0;

      for (let offset = 0; offset < ids.length && checks < maxChecksPerRun; offset++) {
        const idxPos = (start + offset) % ids.length;
        const chapterId = ids[idxPos];
        checks++;

        const local = await storageGet('chapter:' + chapterId);
        if (!local || typeof local.content !== 'string' || !local.content.length) continue;

        const remote = await loadChapterFromRemote(chapterId);
        if (remote && typeof remote.content === 'string' && remote.content.length) continue;

        const ok = await pushChapterToRemote(chapterId, {
          title: local.title || '',
          content: local.content,
        });
        if (ok) uploaded++;
        else failed++;
      }

      const nextCursor = (start + checks) % ids.length;
      const scanned = Math.min(ids.length, scannedSoFar + checks);
      const complete = scanned >= ids.length;
      backfillDebug.runs += 1;
      backfillDebug.checked = checks;
      backfillDebug.uploaded = uploaded;
      backfillDebug.failed = failed;
      backfillDebug.scanned = scanned;
      backfillDebug.cursor = nextCursor;
      backfillDebug.complete = complete;
      backfillDebug.lastRunAt = Date.now();
      backfillDebug.message = complete
        ? (uploaded > 0 ? 'Backfill complete' : 'Backfill complete (nothing new to upload)')
        : ('Backfill partial (' + scanned + '/' + ids.length + ' scanned)');
      writeChapterBackfillState({
        sig: signature,
        cursor: nextCursor,
        scanned,
        complete,
        updatedAt: Date.now(),
      });

      addSyncEvent('backfill', 'Scanned ' + scanned + '/' + ids.length + ', uploaded ' + uploaded + ', failed ' + failed);
      if (uploaded > 0 && syncStatus.state !== 'syncing') {
        syncStatus = {
          state: 'synced',
          at: Date.now(),
          message: 'Backfilled ' + uploaded + ' chapter(s) to server',
        };
        updateSyncStatusChip();
      }

      // Keep healing in the background until all chapters have been scanned once.
      if (!complete) {
        const waitMs = failed > 0 ? 3000 : 700;
        scheduleBackfillContinuation(waitMs);
      } else {
        addSyncEvent('backfill-done', backfillDebug.message);
      }
    } finally {
      backfillDebug.active = false;
      chapterBackfillInFlight = false;
    }
  }

  function normalizeProgressState(raw){
    const src = (raw && typeof raw === 'object') ? raw : {};
    const percents = {};
    const srcPercents = (src.percents && typeof src.percents === 'object') ? src.percents : {};
    for (const chapterId of Object.keys(srcPercents)) {
      const n = Number(srcPercents[chapterId]);
      if (!Number.isFinite(n)) continue;
      percents[chapterId] = Math.max(0, Math.min(100, n));
    }
    const lastChapterId = (typeof src.lastChapterId === 'string' && src.lastChapterId)
      ? src.lastChapterId
      : null;
    return { lastChapterId, percents };
  }

  function progressEntryCount(progress){
    if (!progress || typeof progress !== 'object' || !progress.percents || typeof progress.percents !== 'object') return 0;
    return Object.keys(progress.percents).length;
  }

  function hasMeaningfulProgress(progress){
    if (!progress || typeof progress !== 'object') return false;
    if (progress.lastChapterId) return true;
    return progressEntryCount(progress) > 0;
  }

  function mergeProgressState(localProgressRaw, remoteProgressRaw){
    const localProgress = normalizeProgressState(localProgressRaw);
    const remoteProgress = normalizeProgressState(remoteProgressRaw);
    const mergedPercents = Object.assign({}, localProgress.percents);
    for (const chapterId of Object.keys(remoteProgress.percents)) {
      const remotePct = Number(remoteProgress.percents[chapterId]);
      const localPct = Number(mergedPercents[chapterId] || 0);
      mergedPercents[chapterId] = Math.max(localPct, remotePct);
    }

    let lastChapterId = localProgress.lastChapterId || null;
    if (!lastChapterId && remoteProgress.lastChapterId) {
      lastChapterId = remoteProgress.lastChapterId;
    } else if (remoteProgress.lastChapterId) {
      const localLastPct = Number(mergedPercents[localProgress.lastChapterId] || 0);
      const remoteLastPct = Number(mergedPercents[remoteProgress.lastChapterId] || 0);
      if (remoteLastPct > localLastPct) lastChapterId = remoteProgress.lastChapterId;
    }

    return { lastChapterId, percents: mergedPercents };
  }

  async function loadRemoteState(profileId){
    if (!syncKey) return null;
    try {
      const pid = (profileId || activeProfileId || 'izaiah').toString().trim().toLowerCase();
      const url = new URL(STATE_ENDPOINT, window.location.origin);
      url.searchParams.set('key', syncKey);
      url.searchParams.set('profile', pid);
      const res = await fetch(url.toString());
      if (!res.ok) return null;
      const payload = await res.json();
      if (!payload || typeof payload !== 'object' || !payload.data || typeof payload.data !== 'object') return null;
      const exportedAt = Number(payload.exportedAt || payload.data.exportedAt || 0) || 0;
      return { data: payload.data, exportedAt };
    } catch (e) {
      console.warn('Remote state load failed', e);
      return null;
    }
  }

  async function pushRemoteState(profileId){
    if (!syncKey) return false;
    try {
      const pid = (profileId || activeProfileId || 'izaiah').toString().trim().toLowerCase();
      const state = profileState[pid] || getActiveProfileState();
      const body = {
        version: 1,
        exportedAt: Date.now(),
        progress: normalizeProgressState(state.progress),
        settings: state.settings || {},
      };
      const res = await fetch(STATE_ENDPOINT, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-sync-key': syncKey,
          'x-profile-id': pid,
        },
        body: JSON.stringify(body),
      });
      return !!res.ok;
    } catch (e) {
      console.warn('Remote state save failed', e);
      return false;
    }
  }

  function getProgressSyncEntry(profileId){
    const pid = (profileId || activeProfileId || 'izaiah').toString().trim().toLowerCase();
    if (!progressSyncState[pid]) {
      progressSyncState[pid] = { sig:'', lastAttemptAt:0 };
    }
    return progressSyncState[pid];
  }

  function progressSignatureForProfile(profileId){
    const pid = (profileId || activeProfileId || 'izaiah').toString().trim().toLowerCase();
    const state = profileState[pid] || { progress:{ lastChapterId:null, percents:{} } };
    return JSON.stringify(normalizeProgressState(state.progress));
  }

  async function syncProgressStateThrottled(reason){
    if (!syncKey) return false;
    const pid = (activeProfileId || 'izaiah').toString().trim().toLowerCase();
    const entry = getProgressSyncEntry(pid);
    const nextSig = progressSignatureForProfile(pid);
    const elapsed = Date.now() - Number(entry.lastAttemptAt || 0);
    if (entry.sig === nextSig && elapsed < PROGRESS_SYNC_MIN_INTERVAL_MS) {
      return true;
    }

    if (progressSyncTimer) return true;
    const waitMs = Math.max(0, PROGRESS_SYNC_MIN_INTERVAL_MS - elapsed);
    progressSyncTimer = setTimeout(async () => {
      progressSyncTimer = null;
      entry.lastAttemptAt = Date.now();
      const ok = await pushRemoteLibrary({ progressOnly:true });
      if (ok) {
        entry.sig = progressSignatureForProfile(pid);
      } else {
        addSyncEvent('state-push-throttled', 'Deferred profile state push failed (' + (reason || 'progress') + ')');
      }
    }, waitMs);
    return true;
  }

  async function syncStateFromRemote(profileId){
    const pid = (profileId || activeProfileId || 'izaiah').toString().trim().toLowerCase();
    const remoteEnvelope = await loadRemoteState(pid);
    if (!remoteEnvelope || typeof remoteEnvelope !== 'object') return false;
    const remoteState = remoteEnvelope.data;
    if (!remoteState || typeof remoteState !== 'object') return false;
    if (!profileState[pid]) {
      profileState[pid] = {
        progress: { lastChapterId:null, percents:{} },
        settings: getDefaultProfileSettings()
      };
    }

    const localProgress = normalizeProgressState(profileState[pid].progress);
    const remoteProgress = normalizeProgressState(remoteState.progress);
    const localHasProgress = hasMeaningfulProgress(localProgress);
    const remoteHasProgress = hasMeaningfulProgress(remoteProgress);

    if (remoteHasProgress && !localHasProgress) {
      profileState[pid].progress = remoteProgress;
      addSyncEvent('state-pull', 'Profile ' + pid + ': loaded remote progress');
    } else if (remoteHasProgress && localHasProgress) {
      profileState[pid].progress = mergeProgressState(localProgress, remoteProgress);
      addSyncEvent('state-merge', 'Profile ' + pid + ': merged local/remote progress');
    } else if (!remoteHasProgress && localHasProgress) {
      profileState[pid].progress = localProgress;
      addSyncEvent('state-keep', 'Profile ' + pid + ': kept local progress (remote empty)');
      const repaired = await pushRemoteState(pid);
      addSyncEvent(repaired ? 'state-repair' : 'state-repair-fail', repaired
        ? ('Profile ' + pid + ': repaired remote progress from local')
        : ('Profile ' + pid + ': remote progress repair failed'));
    } else {
      profileState[pid].progress = localProgress;
    }

    if (remoteState.settings) Object.assign(profileState[pid].settings, remoteState.settings);
    await storageSet('profile-state', profileState);
    return true;
  }

  async function refreshActiveProfileStateFromRemote(reason){
    if (!syncKey || profileStateRefreshInFlight) return false;
    profileStateRefreshInFlight = true;
    try {
      const before = JSON.stringify(normalizeProgressState(getProgress()));
      const ok = await syncStateFromRemote(activeProfileId);
      if (!ok) return false;
      const after = JSON.stringify(normalizeProgressState(getProgress()));
      if (before !== after) {
        addSyncEvent('state-refresh', 'Profile ' + activeProfileId + ': refreshed progress from remote (' + (reason || 'sync') + ')');
        render();
      }
      return true;
    } finally {
      profileStateRefreshInFlight = false;
    }
  }

  async function loadRemoteLibrary(options){
    if (!syncKey) return null;
    const url = new URL(SYNC_ENDPOINT, window.location.origin);
    url.searchParams.set('key', syncKey);
    if (options && options.metaOnly) url.searchParams.set('meta', '1');
    if (routeBookSlug) url.searchParams.set('book', routeBookSlug);

    async function fetchOnce(timeoutMs){
      let timeoutId = null;
      try {
        const controller = new AbortController();
        timeoutId = setTimeout(() => controller.abort(), timeoutMs);
        const res = await fetch(url.toString(), { signal: controller.signal });
        if (!res.ok) return null;
        const payload = await res.json();
        return payload && payload.data ? payload.data : null;
      } finally {
        if (timeoutId) clearTimeout(timeoutId);
      }
    }

    try {
      const first = await fetchOnce(45000);
      if (first) return first;
      // One quick retry helps when the host is waking from inactivity.
      await new Promise((res) => setTimeout(res, 1200));
      return await fetchOnce(45000);
    } catch (e) {
      console.warn('Remote sync load failed', e);
      return null;
    }
  }

  async function canPrimeScopedSyncFromRemote(){
    if (!syncKey || !routeBookSlug) return false;
    try {
      const url = new URL(SYNC_ENDPOINT, window.location.origin);
      url.searchParams.set('key', syncKey);
      url.searchParams.set('book', routeBookSlug);
      const res = await fetch(url.toString());
      if (!res.ok) return false;
      const payload = await res.json();
      const data = payload && Object.prototype.hasOwnProperty.call(payload, 'data') ? payload.data : null;
      if (data && !Array.isArray(data.index)) return false;
      remoteSyncPrimed = true;
      return true;
    } catch (e) {
      return false;
    }
  }

  async function pushRemoteLibrary(options){
    const forceReplace = !!(options && options.forceReplace);
    const progressOnly = !!(options && options.progressOnly);
    if (progressOnly) {
      const ok = await pushRemoteState(activeProfileId);
      syncStatus = {
        state: ok ? 'synced' : 'failed',
        at: Date.now(),
        message: ok ? 'Profile state synced' : 'Profile state sync failed',
      };
      updateSyncStatusChip();
      return ok;
    }
    if (!syncKey) return false;
    if (syncInFlight) {
      syncPending = true;
      if (forceReplace) syncPendingReplace = true;
      return true;
    }

    syncInFlight = true;
    if (forceReplace) syncPendingReplace = true;
    let overallOk = true;
    let recoveryAttempted = false;
    try {
      if (!progressOnly) {
        await backfillCoverPathsToRemote();
      }
      do {
        syncPending = false;
        const replaceThisCycle = !!syncPendingReplace;
        syncPendingReplace = false;

        if (!progressOnly && routeBookSlug && !remoteSyncPrimed) {
          // Avoid destructive scoped overwrite if this route has not pulled remote data yet.
          const pulled = await syncFromRemote();
          if (!pulled) {
            const primed = await canPrimeScopedSyncFromRemote();
            if (!primed) {
              syncDebug.failures++;
              syncDebug.lastReason = 'Scoped sync blocked until remote data loads';
              syncDebug.lastAt = Date.now();
              syncStatus = { state:'failed', at:Date.now(), message:'Scoped sync blocked until remote data loads' };
              updateSyncStatusChip();
              return false;
            }
          }
        }

        const payload = await buildLibraryPayload({ progressOnly });
        const payloadJson = JSON.stringify(payload);
        const payloadSig = payloadSignatureFromPayload(payload);
        syncDebug.lastPayloadBytes = payloadJson.length;

        if (payloadSig === lastSyncedPayloadSig) {
          syncDebug.lastReason = 'Already synced';
          syncDebug.lastAt = Date.now();
          syncStatus = { state:'synced', at:Date.now(), message:'Already synced' };
          updateSyncStatusChip();
          continue;
        }

        syncStatus = { state:'syncing', at:Date.now(), message:'Sync in progress' };
        updateSyncStatusChip();

        const startedAt = Date.now();
        syncDebug.attempts++;
        const res = await fetch(SYNC_ENDPOINT, {
          method:'POST',
          headers:{
            'Content-Type':'application/json',
            'x-sync-key': syncKey,
            ...(progressOnly ? { 'x-sync-partial': 'progress' } : {}),
            ...(!progressOnly && routeBookSlug ? { 'x-book-slug': routeBookSlug } : {}),
            ...(replaceThisCycle ? { 'x-sync-replace': '1' } : {}),
          },
          body: payloadJson
        });
        syncDebug.lastDurationMs = Date.now() - startedAt;

        const ok = !!res.ok;
        overallOk = overallOk && ok;
        if (ok) {
          lastSyncedPayloadSig = payloadSig;
          syncDebug.successes++;
          syncDebug.lastReason = 'Last sync saved to server';
        } else {
          syncDebug.failures++;
          syncDebug.lastReason = 'Server rejected sync (' + res.status + ')';
        }
        syncDebug.lastAt = Date.now();
        syncStatus = {
          state: ok ? 'synced' : 'failed',
          at: Date.now(),
          message: ok ? 'Last sync saved to server' : 'Server rejected sync',
        };
        updateSyncStatusChip();
        addSyncEvent(ok ? 'push-ok' : 'push-fail', ok
          ? ('Saved metadata (' + (payload.index || []).length + ' chapters)')
          : ('Server rejected sync (' + res.status + ')'));
      } while (syncPending);

      return overallOk;
    } catch (e) {
      console.warn('Remote sync save failed', e);
      syncDebug.failures++;
      syncDebug.lastReason = 'Sync failed: ' + e.message;
      syncDebug.lastError = e && e.stack ? e.stack : String(e);
      syncDebug.lastAt = Date.now();
      syncStatus = { state:'failed', at:Date.now(), message:'Sync failed: ' + e.message };
      updateSyncStatusChip();
      addSyncEvent('push-fail', 'Sync failed: ' + e.message);
      return false;
    } finally {
      syncInFlight = false;
    }
  }

  async function syncFromRemote(options){
    if (!syncKey) {
      syncStatus = { state:'failed', at:Date.now(), message:'Missing sync key' };
      updateSyncStatusChip();
      addSyncEvent('pull-fail', 'Missing sync key');
      return false;
    }
    syncStatus = { state:'syncing', at:Date.now(), message:'Loading latest data from server' };
    updateSyncStatusChip();
    addSyncEvent('pull-start', 'Loading latest data from server');
    const remote = await loadRemoteLibrary(options);
    if (!remote || !Array.isArray(remote.index)) {
      syncStatus = { state:'failed', at:Date.now(), message:'Remote library unavailable' };
      updateSyncStatusChip();
      addSyncEvent('pull-fail', 'Remote library unavailable');
      return false;
    }
    const isMetaOnly = !!(options && options.metaOnly);
    if (routeBookSlug) {
      const currentIndex = Array.isArray(index) ? index : [];
      const currentBooksMeta = (booksMeta && typeof booksMeta === 'object') ? booksMeta : {};
      const remoteIds = new Set(remote.index.map((ch) => ch && ch.id).filter(Boolean));
      const mergedIndex = currentIndex.filter((ch) => !ch || !slugifyBookName(ch.book) || slugifyBookName(ch.book) !== routeBookSlug);
      remote.index.forEach((entry) => {
        if (entry && entry.id) {
          const existingPos = mergedIndex.findIndex((ch) => ch && ch.id === entry.id);
          if (existingPos >= 0) mergedIndex[existingPos] = entry;
          else mergedIndex.push(entry);
        }
      });
      index = mergedIndex;
      booksMeta = Object.assign({}, currentBooksMeta, remote.booksMeta || {});
      for (const ch of remote.index) {
        if (!ch || !ch.id) continue;
        const local = await storageGet('chapter:' + ch.id);
        if (!local) {
          const data = await loadChapterFromRemote(ch.id);
          if (data) await storageSet('chapter:' + ch.id, data);
        }
      }
      await storageSet('chapters-index', index);
      await storageSet('books-meta', booksMeta);
    } else {
      const localIndex = Array.isArray(index) ? index : [];
      const shouldBlockEmptyMetaOverwrite = isMetaOnly && localIndex.length > 0 && remote.index.length === 0;
      if (shouldBlockEmptyMetaOverwrite) {
        if (!attemptedRemoteBootstrap) {
          attemptedRemoteBootstrap = true;
          syncStatus = { state:'syncing', at:Date.now(), message:'Remote empty, uploading local library' };
          updateSyncStatusChip();
          const seeded = await pushRemoteLibrary();
          syncStatus = {
            state: seeded ? 'synced' : 'failed',
            at: Date.now(),
            message: seeded ? 'Remote repaired from local library' : 'Remote metadata empty, kept local library',
          };
          updateSyncStatusChip();
          addSyncEvent(seeded ? 'repair-ok' : 'repair-fail', syncStatus.message);
          return seeded;
        }
        syncStatus = { state:'failed', at:Date.now(), message:'Remote metadata empty, kept local library' };
        updateSyncStatusChip();
        addSyncEvent('pull-fail', 'Remote metadata empty, kept local library');
        return false;
      }
      attemptedRemoteBootstrap = false;
      // Root pulls are non-destructive: merge remote into local so transient
      // server or scope issues never wipe local chapters.
      const remoteIndex = Array.isArray(remote.index) ? remote.index : [];
      const remoteIds = new Set(remoteIndex.map((entry) => entry && entry.id).filter(Boolean));
      const byId = new Map();
      const merged = [];
      let prunedLocalOnlyMissing = 0;
      for (const entry of localIndex) {
        const id = entry && entry.id;
        if (id && !byId.has(id)) {
          if (!remoteIds.has(id)) {
            const localChapter = await storageGet('chapter:' + id);
            const hasLocalBody = !!(localChapter && typeof localChapter.content === 'string' && localChapter.content.length);
            if (!hasLocalBody) {
              prunedLocalOnlyMissing++;
              continue;
            }
          }
          byId.set(id, merged.length);
          merged.push(entry);
        } else if (!id) {
          merged.push(entry);
        }
      }
      for (const entry of remoteIndex) {
        const id = entry && entry.id;
        if (id && byId.has(id)) {
          merged[byId.get(id)] = entry;
        } else {
          if (id) byId.set(id, merged.length);
          merged.push(entry);
        }
      }
      index = merged;
      if (prunedLocalOnlyMissing > 0) {
        addSyncEvent('pull-prune', 'Pruned ' + prunedLocalOnlyMissing + ' stale local chapter reference(s) with missing content');
      }
      booksMeta = (remote.booksMeta && typeof remote.booksMeta === 'object')
        ? Object.assign({}, booksMeta || {}, remote.booksMeta)
        : (booksMeta || {});
      await storageSet('chapters-index', index);
      await storageSet('books-meta', booksMeta);
    }
    await storageSet('profile-state', profileState);
    syncStatus = { state:'synced', at:Date.now(), message:'Pulled latest library from server' };
    remoteSyncPrimed = true;
    lastSyncedPayloadSig = '';
    updateSyncStatusChip();
    addSyncEvent('pull-ok', 'Pulled latest library from server (' + (remote.index || []).length + ' chapters)');
    if (!routeBookSlug) {
      setTimeout(() => {
        backfillRemoteChapters().catch((e) => {
          console.warn('Background chapter backfill failed', e);
          addSyncEvent('backfill-fail', 'Background chapter backfill failed');
        });
      }, 0);
      setTimeout(() => {
        cleanupLegacyScopedKeys().catch((e) => {
          console.warn('Background scoped cleanup failed', e);
          addSyncEvent('cleanup-fail', 'Background scoped cleanup failed');
        });
      }, 120);
    }
    applyTheme();
    render();
    return true;
  }

  async function configureSyncKey(forcePrompt){
    const nextKey = forcePrompt
      ? prompt('Enter a sync key for this library', syncKey || 'my-library')
      : (getSyncKeyFromUrl() || getStoredSyncKey());
    if (nextKey === null) return false;
    setSyncKey(nextKey || '');
    if (syncKey) {
      if (routeBookSlug) {
        await syncFromRemote();
        await pushRemoteLibrary();
      } else {
        await syncFromRemote({ metaOnly:true });
      }
      await syncStateFromRemote(activeProfileId);
    }
    renderTopbar();
    return !!syncKey;
  }

      storageGet('chapters-index'),

      storageGet('books-meta'),
    ]);
    index = idx || [];

    const defaults = getDefaultProfiles();
    profiles = (profilesData && typeof profilesData === 'object')
      ? Object.assign({}, defaults, profilesData)
      : defaults;
    if (profileStateData && typeof profileStateData === 'object') {
      profileState = profileStateData;
    }
    // Ensure all profiles have state
    Object.keys(profiles).forEach(id => {
      if (!profileState[id]) {
        profileState[id] = {
          progress: { lastChapterId:null, percents:{} },
          settings: getDefaultProfileSettings()
        };
      }
    });
    const storedProfileId = getStoredActiveProfileId();
    activeProfileId = profiles[storedProfileId] ? storedProfileId : 'izaiah';

    });

    if (syncKey) {
      const syncTask = routeBookSlug ? syncFromRemote() : syncFromRemote({ metaOnly:true });

        console.warn('Initial remote sync failed', e);
      });
      const stateTask = syncStateFromRemote(activeProfileId);
      stateTask.catch((e) => {

    window.addEventListener('focus', () => {

      if (document.visibilityState === 'visible' && syncKey) {

    if (!routeBookSlug) {
      setTimeout(() => {
        cleanupLegacyScopedKeys().catch((e) => {
          console.warn('Initial scoped cleanup failed', e);
          addSyncEvent('cleanup-fail', 'Initial scoped cleanup failed');
        });

  async function handleUpload(fileList, inputEl){
    const files = Array.from(fileList || []).filter(f => /\.txt$/i.test(f.name));
    if (!files.length){ inputEl.value = ''; return; }

    const failed = [];
    let addedCount = 0;
    const progressLabel = view.mode === 'library' ? showUploadProgress(files.length) : null;

    for (let i=0; i<files.length; i++){
      const file = files[i];
      if (progressLabel) progressLabel(i+1, files.length, file.name);
      const text = await file.text();
      const stem = file.name.replace(/\.txt$/i, '');
      const requestedTitle = pendingChapterTitle && files.length === 1 ? pendingChapterTitle : '';
      const title = (requestedTitle || stem).trim() || stem;
      const detectedBook = detectBook(file);
      const book = pendingUploadBook || detectedBook || null;
      const volume = detectVolume(file) || pendingUploadVolume || null;
      const id = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()+Math.random()));
      const ok = await storageSet('chapter:' + id, { title, content: text });
      if (!ok){
        failed.push(file.name);
        continue;
      }
      if (syncKey) {
        await pushChapterToRemote(id, { title, content: text });
      }
      index.push({ id, title, book, volume, addedAt: Date.now() });
      addedCount++;
      // small pacing gap helps avoid rate-limit errors on large batches
      if (files.length > 10) await new Promise(res => setTimeout(res, 120));
    }

    if (addedCount){
      index.sort(sortChapters);
      const indexOk = await storageSet('chapters-index', index);
      if (!indexOk){
        alert('Chapters were saved individually, but the library list failed to update. Try refreshing the page — your chapters should still be there — and if the list looks incomplete, add the missing ones again.');
      }
    }
    if (syncKey) {
      await pushRemoteLibrary();
    }
    if (progressLabel) progressLabel(null);
    pendingChapterTitle = '';
    pendingUploadBook = '';
    pendingUploadVolume = '';
    inputEl.value = '';
    render();

    if (failed.length){
      alert('Saved ' + addedCount + ' of ' + files.length + ' chapters.\n\n' +
        'These failed to save (likely a temporary connection issue) — try adding them again:\n' +
        failed.slice(0, 20).join('\n') + (failed.length > 20 ? '\n…and ' + (failed.length-20) + ' more' : ''));
    }
  }

  function readFileAsDataUrl(file){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = () => reject(reader.error);
      reader.readAsDataURL(file);
    });
  }

  async function readCoverAsDataUrl(file){
    const sourceDataUrl = await readFileAsDataUrl(file);
    let image;
    try {
      image = await new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error('Invalid image file'));
        img.src = sourceDataUrl;
      });
    } catch (e) {
      return sourceDataUrl;
    }

    const maxWidth = 720;
    const maxHeight = 1080;
    const scale = Math.min(1, maxWidth / image.width, maxHeight / image.height);
    const targetWidth = Math.max(1, Math.round(image.width * scale));
    const targetHeight = Math.max(1, Math.round(image.height * scale));

    const canvas = document.createElement('canvas');
    canvas.width = targetWidth;
    canvas.height = targetHeight;
    const ctx = canvas.getContext('2d');
    if (!ctx) return sourceDataUrl;

    ctx.drawImage(image, 0, 0, targetWidth, targetHeight);

    const jpeg = canvas.toDataURL('image/jpeg', 0.82);
    if (typeof jpeg === 'string' && jpeg.length > 1000) return jpeg;
    return sourceDataUrl;
  }

  function showUploadProgress(total){
    const el = document.createElement('div');
    el.style.cssText = 'position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:40;background:var(--paper-raised);border:1px solid var(--line);border-radius:6px;padding:10px 16px;font-size:13px;box-shadow:var(--shadow);color:var(--ink);';

  function detectVolume(file){
    // webkitRelativePath looks like "MyNovel/Volume 1/003.txt" when picked via folder upload,
    // or "MyNovel/003.txt" for a flat folder. Only treat it as a volume if there's a real subfolder.
    const rel = file.webkitRelativePath;
    if (!rel) return null;
    const parts = rel.split('/');
    if (parts.length >= 3) return parts[1];
    if (parts.length >= 2 && pendingUploadBook) return parts[0];
    return null;
  }

  function detectBook(file){
    // webkitRelativePath looks like "MyNovel/Volume 1/003.txt"
    // Extract the root folder as the book name
    const rel = file.webkitRelativePath;
    if (!rel) return null;
    const parts = rel.split('/');
    if (parts.length >= 1) return parts[0];
    return null;
  }

  function volumeSortNum(name){
    const m = (name || '').match(/(\d{1,4})/);
    return m ? parseInt(m[1], 10) : null;
  }

  function bookSortNum(name){
    const m = (name || '').match(/(\d{1,4})/);
    return m ? parseInt(m[1], 10) : null;
  }

  function sortChapters(a, b){
    // Sort by book, then volume, then chapter number
    const ab = a.book || '', bb = b.book || '';
    if (ab !== bb){
      const an = bookSortNum(ab), bn = bookSortNum(bb);
      if (an != null && bn != null && an !== bn) return an - bn;
      return ab.localeCompare(bb);
    }
    const av = a.volume || '', bv = b.volume || '';
    if (av !== bv){
      const an = volumeSortNum(av), bn = volumeSortNum(bv);
      if (an != null && bn != null && an !== bn) return an - bn;
      return av.localeCompare(bv);
    }
    return a.addedAt - b.addedAt;
  }

  async function exportLibrary(){
    const btn = document.getElementById('exportBtn');
    if (btn){ btn.disabled = true; btn.textContent = 'Preparing…'; }
    try{
      const chapters = {};
      for (const ch of index){
        const data = await storageGet('chapter:' + ch.id);
        if (data) chapters[ch.id] = data;
      }
      const payload = {
        version:1,
        exportedAt: Date.now(),
        index,
        chapters,
        progress: getProgress(),
        settings: getSettings(),
        booksMeta,
      };
      const blob = new Blob([JSON.stringify(payload)], { type:'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'reading-room-library.json';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }catch(e){
      alert('Export failed: ' + e.message);
    }
    if (btn){ btn.disabled = false; btn.textContent = 'Export library'; }
  }

  importInput.addEventListener('change', async (e) => {
    const file = e.target.files && e.target.files[0];
    importInput.value = '';
    if (!file) return;
    let payload;
    try{
      payload = JSON.parse(await file.text());
    }catch(e){
      alert('That file doesn\'t look like a valid library export.');
      return;
    }
    if (!payload || !Array.isArray(payload.index) || !payload.chapters){
      alert('That file doesn\'t look like a valid library export.');
      return;
    }
    const mode = confirm(
      'Import ' + payload.index.length + ' chapter(s).\n\n' +
      'Press OK to MERGE with your current library (existing chapters kept, new ones added).\n' +
      'Press Cancel to REPLACE your current library entirely.'
    ) ? 'merge' : 'replace';

    const progress = getProgress();
    if (mode === 'replace') { index = []; progress.lastChapterId = null; progress.percents = {}; }
    if (mode === 'replace') booksMeta = {};

    const existingKey = (c) => (c.book || '') + '::' + (c.volume || '') + '::' + c.title;
    const existingTitles = new Set(index.map(existingKey));
    let added = 0;
    for (const entry of payload.index){
      const entryKey = (entry.book || '') + '::' + (entry.volume || '') + '::' + entry.title;
      if (mode === 'merge' && existingTitles.has(entryKey)) continue;
      const newId = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()+Math.random()));
      const data = payload.chapters[entry.id];
      if (!data) continue;
      await storageSet('chapter:' + newId, data);
      index.push({ id:newId, title:entry.title, book:entry.book||null, volume:entry.volume||null, addedAt:Date.now() });
      if (payload.progress && payload.progress.percents && payload.progress.percents[entry.id] != null){
        progress.percents[newId] = payload.progress.percents[entry.id];
        if (payload.progress.lastChapterId === entry.id) progress.lastChapterId = newId;
      }
      added++;
    }
    if (payload.booksMeta && typeof payload.booksMeta === 'object') {
      booksMeta = mode === 'merge' ? Object.assign({}, booksMeta, payload.booksMeta) : payload.booksMeta;
      await persistBooksMeta();
    }
    index.sort(sortChapters);
    await storageSet('chapters-index', index);
    if (payload.settings){
      const settings = getSettings();
      Object.assign(settings, payload.settings);
      applyTheme();
    }
    await persistProfileState();
    if (syncKey) await pushRemoteLibrary(mode === 'replace' ? { forceReplace:true } : undefined);
    view.transferOpen = false;
    render();
    alert('Imported ' + added + ' chapter(s).');
  });

  function getDisplaySortedChapters(items){
    const list = [...items];
    const mode = view.chapterSort || 'book-volume-added';
    if (mode === 'title'){
      list.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
      return list;
    }
    if (mode === 'recent'){
      list.sort((a, b) => (b.addedAt || 0) - (a.addedAt || 0));
      return list;
    }
    if (mode === 'book-volume-title'){
      list.sort((a, b) => {
        const byBook = sortChapters(a, b);
        if ((a.book || '') !== (b.book || '') || (a.volume || '') !== (b.volume || '')) return byBook;
        return (a.title || '').localeCompare(b.title || '');
      });
      return list;
    }
    list.sort(sortChapters);
    return list;
  }
