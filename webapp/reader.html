<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Reading Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EFEAE0;
    --paper-raised:#F7F4EC;
    --ink:#26221D;
    --ink-soft:#6b6355;
    --line:#ddd6c5;
    --brass:#9C6B30;
    --brass-soft:#c69a5f;
    --danger:#a4453a;
    --shadow: 0 2px 10px rgba(38,34,29,0.08);
    --radius: 3px;
    --ribbon: var(--brass);
  }
  [data-theme="dark"]{
    --paper:#1B1B18;
    --paper-raised:#242420;
    --ink:#E8E3D8;
    --ink-soft:#9a9384;
    --line:#3a3833;
    --brass:#c69a5f;
    --brass-soft:#9C6B30;
    --shadow: 0 2px 14px rgba(0,0,0,0.4);
  }
  [data-theme="sepia"]{
    --paper:#E9DCC3;
    --paper-raised:#F1E6D0;
    --ink:#3b2f1e;
    --ink-soft:#7a6a4d;
    --line:#d3c19c;
    --brass:#8a5a2b;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    transition:background .25s ease, color .25s ease;
    overflow-x:hidden;
  }
  button, select, input{ font-family:inherit; }
  button{
    cursor:pointer;
    border:1px solid var(--line);
    background:var(--paper-raised);
    color:var(--ink);
    border-radius:var(--radius);
    padding:8px 12px;
    font-size:13px;
  }
  button:hover{ border-color:var(--brass); }
  button:focus-visible, select:focus-visible, input:focus-visible{
    outline:2px solid var(--brass);
    outline-offset:2px;
  }
  button.icon-btn{
    width:36px; height:36px; padding:0;
    display:flex; align-items:center; justify-content:center;
  }
  button.primary{
    background:var(--brass); color:#fff; border-color:var(--brass);
  }
  button.primary:hover{ background:var(--brass-soft); }
  button.subtle{ border-color:transparent; background:transparent; }
  button.subtle:hover{ background:var(--paper-raised); border-color:var(--line); }
  #app{ min-height:100%; display:flex; flex-direction:column; }
  .topbar{
    position:sticky; top:0; z-index:20;
    display:flex; align-items:center; justify-content:space-between;
    gap:10px;
    padding:12px 18px;
    background:var(--paper);
    border-bottom:1px solid var(--line);
  }
  .brand{ display:flex; align-items:center; gap:10px; font-weight:600; letter-spacing:.02em; }
  .brand .mark{ width:20px;height:20px; border-radius:2px; background:linear-gradient(160deg, var(--brass), var(--brass-soft)); flex:none; }
  .topbar-actions{ display:flex; gap:8px; align-items:center; }
  main{ flex:1; width:100%; }
  .library-wrap{ max-width:760px; margin:0 auto; padding:20px 18px 60px; }
  .continue-card{ background:var(--paper-raised); border:1px solid var(--line); border-radius:6px; padding:16px 18px; margin-bottom:22px; box-shadow:var(--shadow); display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; }
  .continue-card .label{ font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--ink-soft); margin-bottom:4px;}
  .continue-card .title{ font-size:17px; font-weight:600; }
  .continue-card .pct{ font-size:12px; color:var(--ink-soft); margin-top:2px; }
  .toolrow{ display:flex; gap:10px; align-items:center; margin-bottom:18px; flex-wrap:wrap; }
  .search-input{ flex:1; min-width:160px; padding:9px 12px; border:1px solid var(--line); border-radius:var(--radius); background:var(--paper-raised); color:var(--ink); font-size:14px; }
  #fileInput{ display:none; }
  .chapter-list{ list-style:none; margin:0; padding:0; border-top:1px solid var(--line); }
  .chapter-list.nested{ border-top:none; }
  .volume-group{ border-top:1px solid var(--line); }
  .volume-group summary{ padding:12px 4px; cursor:pointer; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft); list-style:none; display:flex; align-items:center; gap:8px; }
  .volume-group summary::-webkit-details-marker{ display:none; }
  .volume-group summary::before{ content:'▸'; font-size:10px; }
  .volume-group[open] summary::before{ content:'▾'; }
  .volume-group .chapter-list{ padding-left:6px; }
  .chapter-row{ display:flex; align-items:center; gap:14px; padding:13px 4px; border-bottom:1px solid var(--line); cursor:pointer; }
  .chapter-row:hover{ background:var(--paper-raised); }
  .chapter-num{ flex:none; width:44px; text-align:right; font-size:12px; color:var(--ink-soft); font-variant-numeric:tabular-nums; }
  .chapter-main{ flex:1; min-width:0; }
  .chapter-title{ font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .chapter-progress-track{ height:3px; background:var(--line); border-radius:2px; margin-top:6px; overflow:hidden; }
  .chapter-progress-fill{ height:100%; background:var(--brass); }
  .chapter-done{ color:var(--ink-soft); }
  .chapter-del{ flex:none; opacity:0; transition:opacity .15s; }
  .chapter-row:hover .chapter-del{ opacity:1; }
  .empty-state{ text-align:center; padding:70px 20px; color:var(--ink-soft); }
  .empty-state .big{ font-size:16px; color:var(--ink); margin-bottom:8px; }
  .reader-shell{ max-width:760px; margin:0 auto; padding:0 18px 100px; position:relative; }
  .ribbon{ position:fixed; top:0; right:26px; z-index:30; background:var(--ribbon); color:#fff; font-size:11px; font-weight:600; letter-spacing:.05em; padding:6px 10px 9px; border-radius:0 0 4px 4px; box-shadow:var(--shadow); clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 82%, 0 100%); }
  .reader-toolbar{ position:sticky; top:0; z-index:20; background:var(--paper); border-bottom:1px solid var(--line); padding:10px 18px; display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
  .reader-toolbar .grp{ display:flex; align-items:center; gap:6px; }
  .reader-toolbar label{ font-size:11px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.06em; }
  .reader-toolbar select{ padding:6px 8px; border:1px solid var(--line); border-radius:var(--radius); background:var(--paper-raised); color:var(--ink); font-size:13px; }
  .stepper{ display:flex; align-items:center; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; }
  .stepper button{ border:none; border-radius:0; }
  .stepper span{ padding:0 10px; font-size:12px; min-width:26px; text-align:center; }
  .theme-swatches{ display:flex; gap:6px; }
  .swatch{ width:26px;height:26px;border-radius:50%;border:2px solid var(--line);cursor:pointer; }
  .swatch.active{ border-color:var(--brass); }
  .chapter-heading{ padding:34px 0 6px; font-size:12px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.1em; }
  .chapter-heading h1{ font-size:26px; margin:6px 0 0; color:var(--ink); letter-spacing:-.01em; }
  .reader-content{ padding:14px 0 40px; }
  .reader-content p{ margin:0 0 1em; }
  .reader-nav{ position:sticky; bottom:0; z-index:20; display:flex; justify-content:space-between; gap:10px; padding:12px 18px; background:var(--paper); border-top:1px solid var(--line); }
  .reader-nav button{ flex:1; max-width:200px; }
  .reader-nav .center-btn{ flex:none; }
  .side-drawer{ position:fixed; top:0; left:0; bottom:0; width:280px; max-width:82vw; z-index:50; background:var(--paper-raised); border-right:1px solid var(--line); box-shadow:var(--shadow); overflow-y:auto; padding:14px; transform:translateX(-100%); transition:transform .2s ease; }
  .side-drawer.open{ transform:translateX(0); }
  .side-drawer-backdrop{ position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:45; display:none; }
  .side-drawer-backdrop.open{ display:block; }
  .side-drawer h2{ font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft); margin:0 0 10px; }
  .side-drawer .chapter-row{ padding:9px 4px; }
  .side-drawer .chapter-row.current{ background:var(--paper); border-left:2px solid var(--brass); }
  .side-drawer .volume-group summary{ padding:9px 4px; }
  .visually-hidden{ position:absolute; width:1px;height:1px; overflow:hidden; clip:rect(0 0 0 0); }
  @media (max-width:520px){ .topbar{ padding:10px 14px; } .reader-toolbar{ padding:8px 12px; gap:10px; } .ribbon{ right:14px; } .reader-nav .center-btn{ display:none; } }
</style>
</head>
<body data-theme="light">
<div id="app">
  <div class="topbar" id="topbar">
    <div class="brand"><span class="mark"></span><span id="brandTitle">Reading Room</span></div>
    <div class="topbar-actions" id="topbarActions"></div>
  </div>
  <main id="main"></main>
  <input type="file" id="fileInput" accept=".txt" multiple />
  <input type="file" id="folderInput" webkitdirectory directory multiple />
  <input type="file" id="importInput" accept=".json,application/json" />
</div>
<script>
(function(){
  const PREFIX = 'reading-room:';
  const DB_NAME = 'reading-room-db';
  const STORE_NAME = 'items';
  const CHUNK_SIZE = 256 * 1024;
  let dbPromise = null;
  const memoryCache = {};
  function openDatabase(){ if (!window.indexedDB) return Promise.reject(new Error('IndexedDB unavailable')); if (dbPromise) return dbPromise; dbPromise = new Promise((resolve, reject) => { const request = window.indexedDB.open(DB_NAME, 2); request.onupgradeneeded = (event) => { const db = event.target.result; if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME, { keyPath: 'key' }); }; request.onsuccess = () => resolve(request.result); request.onerror = () => reject(request.error || new Error('IndexedDB unavailable')); }); return dbPromise; }
  async function getFromDb(key){ const db = await openDatabase(); return new Promise((resolve, reject) => { const tx = db.transaction(STORE_NAME, 'readonly'); tx.onabort = () => reject(tx.error || new Error('Read aborted')); tx.onerror = () => reject(tx.error || new Error('Read failed')); const store = tx.objectStore(STORE_NAME); const request = store.get(key); request.onsuccess = () => resolve(request.result ? request.result.value : null); request.onerror = () => reject(request.error || new Error('Read failed')); }); }
  async function setInDb(key, value){ const db = await openDatabase(); return new Promise((resolve, reject) => { const tx = db.transaction(STORE_NAME, 'readwrite'); tx.onabort = () => reject(tx.error || new Error('Write aborted')); tx.onerror = () => reject(tx.error || new Error('Write failed')); const store = tx.objectStore(STORE_NAME); const request = store.put({ key, value }); request.onsuccess = () => resolve({ key, value, shared:false }); request.onerror = () => reject(request.error || new Error('Write failed')); }); }
  async function deleteFromDb(key){ const db = await openDatabase(); return new Promise((resolve, reject) => { const tx = db.transaction(STORE_NAME, 'readwrite'); tx.onabort = () => reject(tx.error || new Error('Delete aborted')); tx.onerror = () => reject(tx.error || new Error('Delete failed')); const store = tx.objectStore(STORE_NAME); const request = store.delete(key); request.onsuccess = () => resolve({ key, deleted:true, shared:false }); request.onerror = () => reject(request.error || new Error('Delete failed')); }); }
  async function listFromDb(prefix){ const db = await openDatabase(); return new Promise((resolve, reject) => { const tx = db.transaction(STORE_NAME, 'readonly'); tx.onabort = () => reject(tx.error || new Error('List aborted')); tx.onerror = () => reject(tx.error || new Error('List failed')); const store = tx.objectStore(STORE_NAME); const request = store.openCursor(); const keys = []; request.onsuccess = () => { const cursor = request.result; if (cursor) { const key = cursor.key; if (!prefix || key.startsWith(prefix)) keys.push(key.slice(PREFIX.length)); cursor.continue(); } else { resolve({ keys, prefix, shared:false }); } }; request.onerror = () => reject(request.error || new Error('List failed')); }); }
  async function setChunkedValue(fullKey, value){ const chunks = []; for (let offset = 0; offset < value.length; offset += CHUNK_SIZE) chunks.push(value.slice(offset, offset + CHUNK_SIZE)); const meta = { kind: 'chunked', chunkCount: chunks.length, chunkKeys: chunks.map((_, index) => fullKey + ':chunk:' + index) }; await setInDb(fullKey, JSON.stringify(meta)); for (let i = 0; i < chunks.length; i++) await setInDb(meta.chunkKeys[i], chunks[i]); memoryCache[fullKey] = value; return { key: fullKey, value, shared:false }; }
  async function getChunkedValue(fullKey){ const metaRaw = await getFromDb(fullKey); if (!metaRaw) return null; try { const meta = JSON.parse(metaRaw); if (!meta || meta.kind !== 'chunked') return metaRaw; const chunks = []; for (const chunkKey of meta.chunkKeys || []) { const chunk = await getFromDb(chunkKey); if (chunk === null || chunk === undefined) return null; chunks.push(chunk); } const value = chunks.join(''); memoryCache[fullKey] = value; return value; } catch (e) { return metaRaw; } }
  async function deleteChunkedValue(fullKey){ const metaRaw = await getFromDb(fullKey); if (!metaRaw) return { key: fullKey, deleted:true, shared:false }; try { const meta = JSON.parse(metaRaw); if (meta && meta.kind === 'chunked') { for (const chunkKey of meta.chunkKeys || []) await deleteFromDb(chunkKey); } } catch (e) {} await deleteFromDb(fullKey); return { key: fullKey, deleted:true, shared:false }; }
  async function getStoredValue(key){ const cacheKey = PREFIX + key; if (memoryCache[cacheKey] !== undefined) return memoryCache[cacheKey]; const raw = await getChunkedValue(cacheKey); if (raw !== null) memoryCache[cacheKey] = raw; return raw; }
  async function setStoredValue(key, value){ const fullKey = PREFIX + key; if (typeof value === 'string' && value.length > CHUNK_SIZE) return setChunkedValue(fullKey, value); memoryCache[fullKey] = value; return setInDb(fullKey, value); }
  async function deleteStoredValue(key){ const fullKey = PREFIX + key; delete memoryCache[fullKey]; return deleteChunkedValue(fullKey); }
  async function listStoredKeys(prefix){ const result = await listFromDb(PREFIX + prefix); return result.keys; }
  function getUrlParam(name){ const params = new URLSearchParams(window.location.search); return params.get(name); }
  function escapeHtml(str){ return String(str).replace(/[&<>"']/g, (char) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char])); }
  function formatChapterNumber(num){ if (!num) return ''; return String(num).padStart(2,'0'); }
  function getReaderTheme(){ return document.body.getAttribute('data-theme') || 'light'; }
  function setReaderTheme(theme){ document.body.setAttribute('data-theme', theme); localStorage.setItem('reading-room-theme', theme); }
  function getDefaultProfiles(){ return [{ id:'izaiah', name:'Izaiah', theme:'light' }, { id:'andrew', name:'Andrew', theme:'dark' }]; }
  const state = { profiles: [], activeProfileId: null, library: [], chapters: [], currentChapterId: null, search: '', isReading: false, viewingLibrary: true, imported: false, currentTheme: 'light', currentFont: 'system', fontSize: 16, lineHeight: 1.6, chapterTitleInput: '' };
  function loadProfiles(){ try { const raw = localStorage.getItem('reading-room-profiles'); if (raw) { const parsed = JSON.parse(raw); if (Array.isArray(parsed) && parsed.length) return parsed; } } catch (e) {} return getDefaultProfiles(); }
  function persistProfiles(){ localStorage.setItem('reading-room-profiles', JSON.stringify(state.profiles)); }
  function getActiveProfile(){ return state.profiles.find(p => p.id === state.activeProfileId) || state.profiles[0] || null; }
  function ensureProfiles(){ if (!state.profiles.length) { state.profiles = loadProfiles(); if (!state.profiles.length) state.profiles = getDefaultProfiles(); state.activeProfileId = state.profiles[0].id; } }
  function applyProfilePrefs(){ const profile = getActiveProfile(); if (!profile) return; document.body.setAttribute('data-theme', profile.theme || 'light'); state.currentTheme = profile.theme || 'light'; state.currentFont = profile.font || 'system'; state.fontSize = profile.fontSize || 16; state.lineHeight = profile.lineHeight || 1.6; renderTopbar(); render(); }
  function saveActiveProfilePrefs(){ const profile = getActiveProfile(); if (!profile) return; profile.theme = state.currentTheme; profile.font = state.currentFont; profile.fontSize = state.fontSize; profile.lineHeight = state.lineHeight; persistProfiles(); }
  async function loadState(){ ensureProfiles(); const saved = await getStoredValue('state'); if (saved) { try { const parsed = JSON.parse(saved); if (parsed.library) state.library = parsed.library; if (parsed.chapters) state.chapters = parsed.chapters; if (parsed.currentChapterId) state.currentChapterId = parsed.currentChapterId; if (parsed.currentTheme) state.currentTheme = parsed.currentTheme; if (parsed.currentFont) state.currentFont = parsed.currentFont; if (parsed.fontSize) state.fontSize = parsed.fontSize; if (parsed.lineHeight) state.lineHeight = parsed.lineHeight; if (parsed.search) state.search = parsed.search; } catch (e) {} } const savedTheme = localStorage.getItem('reading-room-theme'); if (savedTheme) state.currentTheme = savedTheme; const profile = getActiveProfile(); if (profile) { state.currentTheme = profile.theme || state.currentTheme; state.currentFont = profile.font || state.currentFont; state.fontSize = profile.fontSize || state.fontSize; state.lineHeight = profile.lineHeight || state.lineHeight; }
  document.body.setAttribute('data-theme', state.currentTheme); renderTopbar(); render(); }
  async function persistState(){ const profile = getActiveProfile(); if (profile) { profile.theme = state.currentTheme; profile.font = state.currentFont; profile.fontSize = state.fontSize; profile.lineHeight = state.lineHeight; persistProfiles(); }
  await setStoredValue('state', JSON.stringify({ library: state.library, chapters: state.chapters, currentChapterId: state.currentChapterId, currentTheme: state.currentTheme, currentFont: state.currentFont, fontSize: state.fontSize, lineHeight: state.lineHeight, search: state.search })); }
  function buildChapterList(chapters){ return chapters.map((chapter) => ({ ...chapter, title: chapter.title || `Chapter ${chapter.number || ''}` })); }
  function renderTopbar(){ const actions = document.getElementById('topbarActions'); actions.innerHTML = ''; const profileWrap = document.createElement('div'); profileWrap.className = 'grp'; const profileButtons = state.profiles.map(profile => { const button = document.createElement('button'); button.textContent = profile.name; button.className = profile.id === state.activeProfileId ? 'primary' : 'subtle'; button.onclick = () => switchProfile(profile.id); return button; }); profileButtons.forEach(btn => profileWrap.appendChild(btn)); actions.appendChild(profileWrap); const darkButton = document.createElement('button'); darkButton.textContent = state.currentTheme === 'dark' ? 'Light' : 'Dark'; darkButton.onclick = () => { state.currentTheme = state.currentTheme === 'dark' ? 'light' : 'dark'; setReaderTheme(state.currentTheme); saveActiveProfilePrefs(); renderTopbar(); render(); }; actions.appendChild(darkButton); const syncButton = document.createElement('button'); syncButton.textContent = 'Sync'; syncButton.onclick = () => syncLibrary(); actions.appendChild(syncButton); const addButton = document.createElement('button'); addButton.textContent = '+ Add chapter'; addButton.className = 'primary'; addButton.onclick = () => startAddChapter(); actions.appendChild(addButton); }
  function render(){ const main = document.getElementById('main'); if (state.isReading && state.currentChapterId) { renderReader(main); return; }
  const library = state.library.filter((entry) => { const query = (state.search || '').toLowerCase(); if (!query) return true; return (entry.title || '').toLowerCase().includes(query) || (entry.chapters || []).some(ch => (ch.title || '').toLowerCase().includes(query)); });
  const totalChapters = state.chapters.length; const completed = state.chapters.filter(ch => ch.readProgress >= 100).length; const pct = totalChapters ? Math.round(completed / totalChapters * 100) : 0; main.innerHTML = `...`; }
  function renderReader(main){ const chapter = state.chapters.find(ch => ch.id === state.currentChapterId); if (!chapter) { state.isReading = false; render(); return; }
  main.innerHTML = `...`; }
  async function startAddChapter(){ const title = window.prompt('Chapter title'); if (!title) return; const chapter = { id: 'ch-' + Math.random().toString(36).slice(2, 9), title, number: state.chapters.length + 1, body: '', createdAt: Date.now(), readProgress: 0, volume: 'Volume 1' }; state.chapters.push(chapter); state.library = [{ title: 'Library', chapters: state.chapters }]; state.currentChapterId = chapter.id; state.isReading = true; await persistState(); render(); }
  async function switchProfile(profileId){ state.activeProfileId = profileId; const profile = getActiveProfile(); if (profile) { state.currentTheme = profile.theme || 'light'; state.currentFont = profile.font || 'system'; state.fontSize = profile.fontSize || 16; state.lineHeight = profile.lineHeight || 1.6; document.body.setAttribute('data-theme', state.currentTheme); }
  await persistState(); renderTopbar(); render(); }
  async function syncLibrary(){ const syncKey = getUrlParam('sync') || prompt('Enter sync key'); if (!syncKey) return; try { const res = await fetch('/api/library?key=' + encodeURIComponent(syncKey)); const data = await res.json(); if (res.ok && data.data) { state.library = data.data.library || []; state.chapters = data.data.chapters || []; await persistState(); render(); } } catch (e) { alert('Sync failed'); } }
  document.getElementById('fileInput').addEventListener('change', async (event) => { const files = Array.from(event.target.files || []); for (const file of files) { const text = await file.text(); const chapter = { id: 'ch-' + Math.random().toString(36).slice(2, 9), title: file.name.replace(/\.txt$/i, ''), number: state.chapters.length + 1, body: text, createdAt: Date.now(), readProgress: 0, volume: 'Volume 1' }; state.chapters.push(chapter); } state.library = [{ title: 'Library', chapters: state.chapters }]; state.currentChapterId = state.chapters[state.chapters.length - 1]?.id || null; state.isReading = state.chapters.length > 0; await persistState(); render(); });
  document.getElementById('folderInput').addEventListener('change', async (event) => { const files = Array.from(event.target.files || []); for (const file of files) { const text = await file.text(); const chapter = { id: 'ch-' + Math.random().toString(36).slice(2, 9), title: file.name.replace(/\.txt$/i, ''), number: state.chapters.length + 1, body: text, createdAt: Date.now(), readProgress: 0, volume: 'Volume 1' }; state.chapters.push(chapter); } state.library = [{ title: 'Library', chapters: state.chapters }]; await persistState(); render(); });
  document.getElementById('importInput').addEventListener('change', async (event) => { const [file] = Array.from(event.target.files || []); if (!file) return; const data = JSON.parse(await file.text()); state.library = data.library || []; state.chapters = data.chapters || []; await persistState(); render(); });
  loadState();
})();
</script>
</body>
</html>
