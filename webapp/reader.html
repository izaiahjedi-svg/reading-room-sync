<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Reading Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EFEAE0;
    --paper-raised:#F7F4EC;
    --ink:#26221D;
    --ink-soft:#6b6355;
    --line:#ddd6c5;
    --brass:#9C6B30;
    --brass-soft:#c69a5f;
    --danger:#a4453a;
    --shadow: 0 2px 10px rgba(38,34,29,0.08);
    --radius: 3px;
    --ribbon: var(--brass);
    --book-folder-bg:#e2dac8;
  }
  [data-theme="dark"]{
    --paper:#1B1B18;
    --paper-raised:#242420;
    --ink:#E8E3D8;
    --ink-soft:#9a9384;
    --line:#3a3833;
    --brass:#c69a5f;
    --brass-soft:#9C6B30;
    --shadow: 0 2px 14px rgba(0,0,0,0.4);
    --book-folder-bg:#2d2b25;
  }
  [data-theme="sepia"]{
    --paper:#E9DCC3;
    --paper-raised:#F1E6D0;
    --ink:#3b2f1e;
    --ink-soft:#7a6a4d;
    --line:#d3c19c;
    --brass:#8a5a2b;
    --book-folder-bg:#ddccaa;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    transition:background .25s ease, color .25s ease;
    overflow-x:hidden;
  }
  button, select, input{ font-family:inherit; }
  button{
    cursor:pointer;
    border:1px solid var(--line);
    background:var(--paper-raised);
    color:var(--ink);
    border-radius:var(--radius);
    padding:8px 12px;
    font-size:13px;
  }
  button:hover{ border-color:var(--brass); }
  button:focus-visible, select:focus-visible, input:focus-visible{
    outline:2px solid var(--brass);
    outline-offset:2px;
  }
  button.icon-btn{
    width:36px; height:36px; padding:0;
    display:flex; align-items:center; justify-content:center;
  }
  button.primary{
    background:var(--brass); color:#fff; border-color:var(--brass);
  }
  button.primary:hover{ background:var(--brass-soft); }
  button.subtle{ border-color:transparent; background:transparent; }
  button.subtle:hover{ background:var(--paper-raised); border-color:var(--line); }

  /* ---------- App shell ---------- */
  #app{ min-height:100%; display:flex; flex-direction:column; }

  .topbar{
    position:sticky; top:0; z-index:20;
    display:flex; align-items:center; justify-content:space-between;
    gap:10px;
    padding:12px 18px;
    background:var(--paper);
    border-bottom:1px solid var(--line);
  }
  .brand{
    display:flex; align-items:center; gap:10px;
    font-weight:600; letter-spacing:.02em;
  }
  .brand .mark{
    width:20px;height:20px; border-radius:2px;
    background:linear-gradient(160deg, var(--brass), var(--brass-soft));
    flex:none;
  }
  .topbar-actions{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .sync-chip{ font-size:12px; }
  .sync-chip.syncing{ color:var(--ink-soft); }
  .sync-chip.synced{ color:#2f8f4e; }
  .sync-chip.failed{ color:var(--danger); }
  .profile-switcher{ display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .profile-chip{ padding:6px 10px; border-radius:999px; font-size:12px; }
  .profile-chip.active{ background:var(--brass); color:#fff; border-color:var(--brass); }

  main{ flex:1; width:100%; }

  /* ---------- Library ---------- */
  .library-wrap{ max-width:760px; margin:0 auto; padding:20px 18px 60px; }

  .continue-card{
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:6px;
    padding:16px 18px;
    margin-bottom:22px;
    box-shadow:var(--shadow);
    display:flex; align-items:center; justify-content:space-between; gap:14px;
    flex-wrap:wrap;
  }
  .continue-card .label{ font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--ink-soft); margin-bottom:4px;}
  .continue-card .title{ font-size:17px; font-weight:600; }
  .continue-card .pct{ font-size:12px; color:var(--ink-soft); margin-top:2px; }

  .toolrow{
    display:flex; gap:10px; align-items:center; margin-bottom:18px; flex-wrap:wrap;
  }
  .toolrow .inline-actions{ display:flex; gap:8px; flex-wrap:wrap; }
  .search-input{
    flex:1; min-width:160px;
    padding:9px 12px; border:1px solid var(--line); border-radius:var(--radius);
    background:var(--paper-raised); color:var(--ink); font-size:14px;
  }
  #fileInput{ display:none; }
  #folderInput{ display:none; }
  #importInput{ display:none; }
  #coverInput{ display:none; }

  .add-modal-note{
    font-size:12px;
    color:var(--ink-soft);
    margin-top:4px;
  }

  .book-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:12px;
    margin-bottom:20px;
  }
  .book-card{
    border:1px solid var(--line);
    border-radius:6px;
    background:var(--paper-raised);
    overflow:hidden;
    box-shadow:var(--shadow);
    display:flex;
    flex-direction:column;
  }
  .book-cover{
    width:100%;
    aspect-ratio:3 / 4;
    object-fit:cover;
    background:linear-gradient(135deg, var(--paper), var(--paper-raised));
  }
  .book-cover-fallback{
    width:100%;
    aspect-ratio:3 / 4;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:32px;
    color:var(--ink-soft);
    background:linear-gradient(135deg, var(--paper), var(--paper-raised));
  }
  .book-meta{ padding:10px; }
  .book-title{
    font-size:13px;
    font-weight:600;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    margin-bottom:8px;
  }
  .book-sub{ font-size:11px; color:var(--ink-soft); margin-bottom:10px; }
  .book-actions{ display:flex; gap:6px; }
  .book-actions button{ flex:1; padding:6px 8px; font-size:12px; }

  .book-page-header{
    border:1px solid var(--line);
    border-radius:6px;
    background:var(--paper-raised);
    box-shadow:var(--shadow);
    padding:12px;
    margin-bottom:14px;
    display:flex;
    gap:12px;
    align-items:flex-start;
  }
  .book-page-cover,
  .book-page-cover-fallback{
    width:96px;
    aspect-ratio:3 / 4;
    border-radius:4px;
    border:1px solid var(--line);
    background:linear-gradient(135deg, var(--paper), var(--paper-raised));
    flex:none;
  }
  .book-page-cover{ object-fit:cover; }
  .book-page-cover-fallback{
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    color:var(--ink-soft);
  }
  .book-page-meta{ min-width:0; flex:1; }
  .book-page-title{ font-size:18px; font-weight:700; margin-bottom:4px; }
  .book-page-sub{ font-size:12px; color:var(--ink-soft); margin-bottom:10px; }
  .book-page-actions{ display:flex; gap:8px; flex-wrap:wrap; }

  .chapter-list{ list-style:none; margin:0; padding:0; border-top:1px solid var(--line); }
  .chapter-list.two-col{
    display:grid;
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:0 14px;
  }
  .chapter-list.nested{ border-top:none; }
  .volume-group{ border-top:1px solid var(--line); }
  .book-group{ border-top:none; margin-top:10px; }
  .book-group > summary{
    background:var(--book-folder-bg);
    color:var(--ink);
    border:1px solid var(--line);
    border-radius:4px;
    padding:10px 10px;
  }
  .volume-group summary{
    padding:12px 4px; cursor:pointer; font-size:12px; font-weight:600;
    text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft);
    list-style:none; display:flex; align-items:center; gap:8px;
  }
  .volume-group summary::-webkit-details-marker{ display:none; }
  .volume-group summary::before{ content:'▸'; font-size:10px; }
  .volume-group[open] summary::before{ content:'▾'; }
  .volume-group .chapter-list{ padding-left:6px; }
  .chapter-row{
    display:flex; align-items:center; gap:14px;
    padding:13px 4px;
    border-bottom:1px solid var(--line);
    cursor:pointer;
  }
  .chapter-row:hover{ background:var(--paper-raised); }
  .chapter-main{ flex:1; min-width:0; }
  .chapter-title{
    font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .chapter-progress-track{
    height:3px; background:var(--line); border-radius:2px; margin-top:6px; overflow:hidden;
  }
  .chapter-progress-fill{ height:100%; background:var(--brass); }
  .chapter-done{ color:var(--ink-soft); }
  .chapter-del{
    flex:none; opacity:0; transition:opacity .15s;
  }
  .chapter-row:hover .chapter-del{ opacity:1; }

  /* ---------- Edit Modal ---------- */
  .modal-backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:60; display:none;
  }
  .modal-backdrop.open{ display:block; }
  .modal-dialog{
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:70;
    background:var(--paper-raised); border:1px solid var(--line); border-radius:6px;
    padding:20px; max-width:420px; width:90%; box-shadow:var(--shadow);
    display:none;
  }
  .modal-dialog.open{ display:block; }
  .modal-dialog h3{ margin:0 0 14px; font-size:16px; }
  .modal-dialog .form-group{
    margin-bottom:12px; display:flex; flex-direction:column; gap:4px;
  }
  .modal-dialog label{ font-size:12px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.06em; }
  .modal-dialog input{
    padding:9px 12px; border:1px solid var(--line); border-radius:var(--radius);
    background:var(--paper); color:var(--ink); font-size:14px;
  }
  .modal-dialog select{
    padding:9px 12px; border:1px solid var(--line); border-radius:var(--radius);
    background:var(--paper); color:var(--ink); font-size:14px;
  }
  .cover-preview{
    width:100%;
    max-width:180px;
    aspect-ratio:3 / 4;
    object-fit:cover;
    border:1px solid var(--line);
    border-radius:6px;
    background:var(--paper);
  }
  .cover-placeholder{
    width:100%;
    max-width:180px;
    aspect-ratio:3 / 4;
    border:1px dashed var(--line);
    border-radius:6px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--ink-soft);
    font-size:12px;
    text-align:center;
    padding:12px;
  }
  .modal-dialog .button-group{
    display:flex; gap:8px; justify-content:flex-end; margin-top:16px;
  }
  .modal-dialog button{ margin:0; }

  .empty-state{
    text-align:center; padding:70px 20px; color:var(--ink-soft);
  }
  .empty-state .big{ font-size:16px; color:var(--ink); margin-bottom:8px; }

  /* ---------- Reader ---------- */
  .reader-shell{ max-width:760px; margin:0 auto; padding:0 18px 100px; position:relative; }

  .ribbon{
    position:fixed; top:0; right:26px; z-index:30;
    background:var(--ribbon); color:#fff;
    font-size:11px; font-weight:600; letter-spacing:.05em;
    padding:6px 10px 9px;
    border-radius:0 0 4px 4px;
    box-shadow:var(--shadow);
    clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 82%, 0 100%);
  }

  .reader-toolbar{
    position:sticky; top:0; z-index:20;
    background:var(--paper);
    border-bottom:1px solid var(--line);
    padding:10px 18px;
    display:flex; gap:14px; align-items:center; flex-wrap:wrap;
  }
  .reader-toolbar .grp{ display:flex; align-items:center; gap:6px; }
  .reader-toolbar label{ font-size:11px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.06em; }
  .reader-toolbar select{
    padding:6px 8px; border:1px solid var(--line); border-radius:var(--radius);
    background:var(--paper-raised); color:var(--ink); font-size:13px;
  }
  .stepper{ display:flex; align-items:center; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; }
  .stepper button{ border:none; border-radius:0; }
  .stepper span{ padding:0 10px; font-size:12px; min-width:26px; text-align:center; }
  .theme-swatches{ display:flex; gap:6px; }
  .swatch{
    width:26px;height:26px;border-radius:50%;border:2px solid var(--line);cursor:pointer;
  }
  .swatch.active{ border-color:var(--brass); }

  .chapter-heading{
    padding:34px 0 6px;
    font-size:12px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.1em;
  }
  .chapter-heading h1{
    font-size:26px; margin:6px 0 0; color:var(--ink); letter-spacing:-.01em;
  }

  .reader-content{ padding:14px 0 40px; }
  .reader-content p{ margin:0 0 1em; }

  .reader-nav{
    position:sticky; bottom:0; z-index:20;
    display:flex; justify-content:space-between; gap:10px;
    padding:12px 18px; background:var(--paper); border-top:1px solid var(--line);
  }
  .reader-nav button{ flex:1; max-width:200px; }
  .reader-nav .center-btn{ flex:none; }

  .side-drawer{
    position:fixed; top:0; left:0; bottom:0; width:280px; max-width:82vw; z-index:50;
    background:var(--paper-raised); border-right:1px solid var(--line);
    box-shadow:var(--shadow); overflow-y:auto; padding:14px;
    transform:translateX(-100%); transition:transform .2s ease;
  }
  .side-drawer.open{ transform:translateX(0); }
  .side-drawer-backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:45;
    display:none;
  }
  .side-drawer-backdrop.open{ display:block; }
  .side-drawer h2{ font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft); margin:0 0 10px; }
  .side-drawer .chapter-row{ padding:9px 4px; }
  .side-drawer .chapter-row.current{ background:var(--paper); border-left:2px solid var(--brass); }
  .side-drawer .volume-group summary{ padding:9px 4px; }

  .visually-hidden{
    position:absolute; width:1px;height:1px; overflow:hidden; clip:rect(0 0 0 0);
  }

  @media (max-width:520px){
    .topbar{
      padding:10px 12px;
      align-items:flex-start;
      flex-wrap:wrap;
    }
    .brand{ font-size:14px; }
    .topbar-actions{
      width:100%;
      gap:6px;
      overflow-x:auto;
      flex-wrap:nowrap;
      padding-bottom:2px;
    }
    .topbar-actions button{ white-space:nowrap; }
    .library-wrap{ padding:14px 12px 42px; }
    .continue-card{ padding:12px 14px; margin-bottom:16px; }
    .toolrow{ gap:8px; align-items:stretch; }
    .toolrow .inline-actions{ width:100%; }
    .toolrow .inline-actions button{ flex:1; }
    .book-grid{ grid-template-columns:repeat(2, minmax(0, 1fr)); gap:10px; }
    .book-title{ white-space:normal; }
    .book-page-header{ padding:10px; gap:10px; }
    .book-page-cover,
    .book-page-cover-fallback{ width:78px; }
    .book-page-title{ font-size:16px; }
    .chapter-row{ gap:10px; padding:10px 4px; }
    .chapter-del{ opacity:1; }
    .reader-shell{ padding:0 12px 84px; }
    .reader-toolbar{
      padding:8px 12px;
      gap:8px;
      align-items:stretch;
    }
    .reader-toolbar .grp{
      width:100%;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    .reader-toolbar select{ width:100%; }
    .stepper{ width:100%; justify-content:space-between; }
    .chapter-heading{ padding-top:24px; }
    .chapter-heading h1{ font-size:22px; }
    .ribbon{ right:14px; }
    .reader-nav .center-btn{ display:none; }
  }
  @media (max-width:760px){
    .chapter-list.two-col{ grid-template-columns:1fr; }
  }
</style>
</head>
<body data-theme="light">
<div id="app">

  <!-- ===================== TOPBAR ===================== -->
  <div class="topbar" id="topbar">
    <div class="brand"><span class="mark"></span><span id="brandTitle">Reading Room</span></div>
    <div class="topbar-actions" id="topbarActions"></div>
  </div>

  <main id="main"></main>

  <input type="file" id="fileInput" accept=".txt" multiple />
  <input type="file" id="folderInput" webkitdirectory directory multiple />
  <input type="file" id="importInput" accept=".json,application/json" />
  <input type="file" id="coverInput" accept="image/*" />

  <div class="modal-backdrop" id="editModalBackdrop"></div>
  <div class="modal-dialog" id="editModal">
    <h3>Edit Chapter</h3>
    <div class="form-group">
      <label for="editBook">Book</label>
      <input type="text" id="editBook" placeholder="e.g., Harry Potter" />
    </div>
    <div class="form-group">
      <label for="editVolume">Volume</label>
      <input type="text" id="editVolume" placeholder="e.g., Volume 1" />
    </div>
    <div class="form-group">
      <label for="editTitle">Chapter Title</label>
      <input type="text" id="editTitle" placeholder="e.g., The Boy Who Lived" />
    </div>
    <div class="button-group">
      <button id="editModalCancelBtn">Cancel</button>
      <button class="primary" id="editModalSaveBtn">Save</button>
    </div>
  </div>

  <div class="modal-backdrop" id="bookModalBackdrop"></div>
  <div class="modal-dialog" id="bookModal">
    <h3>Manage Book</h3>
    <div class="form-group">
      <label for="bookPicker">Book</label>
      <select id="bookPicker"></select>
    </div>
    <div class="form-group">
      <label for="bookTitleInput">Book Title</label>
      <input type="text" id="bookTitleInput" placeholder="e.g., My Book" />
    </div>
    <div class="form-group">
      <label>Cover</label>
      <div id="bookCoverPreviewWrap"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;">
        <button id="bookPickCoverBtn" type="button">Upload cover</button>
        <button id="bookClearCoverBtn" type="button">Remove cover</button>
      </div>
    </div>
    <div class="form-group">
      <label for="bookSortSelect">Chapter Sort</label>
      <select id="bookSortSelect">
        <option value="book-volume-added">Book/Volume/Added</option>
        <option value="book-volume-title">Book/Volume/Title</option>
        <option value="title">Title A-Z</option>
        <option value="recent">Recently Added</option>
      </select>
    </div>
    <div class="form-group">
      <label for="volumeRenameFromSelect">Rename Volume Folder</label>
      <select id="volumeRenameFromSelect"></select>
      <input type="text" id="volumeRenameToInput" placeholder="New volume name" />
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;">
        <button id="renameVolumeBtn" type="button">Rename volume</button>
      </div>
    </div>
    <div class="button-group" style="justify-content:space-between;">
      <button id="bookUploadChaptersBtn" type="button">+ Add Chapters</button>
      <div style="display:flex;gap:8px;">
        <button id="bookModalCancelBtn" type="button">Close</button>
        <button class="primary" id="bookModalSaveBtn" type="button">Save</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="addModalBackdrop"></div>
  <div class="modal-dialog" id="addModal">
    <h3>Add Chapters</h3>
    <div class="form-group">
      <label for="addBookSelect">Book Destination</label>
      <select id="addBookSelect"></select>
      <input type="text" id="addBookNewInput" placeholder="New book name" />
      <div class="add-modal-note">Pick an existing book or create a new one.</div>
    </div>
    <div class="form-group">
      <label for="addVolumeInput">Volume (optional)</label>
      <input type="text" id="addVolumeInput" placeholder="e.g., Volume 3" />
    </div>
    <div class="button-group" style="justify-content:space-between;">
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button id="addChooseFilesBtn" type="button">Choose files</button>
        <button id="addChooseFolderBtn" type="button">Choose folder</button>
      </div>
      <button id="addModalCloseBtn" type="button">Close</button>
    </div>
  </div>
</div>

<script>
(function(){

  // ---------------------------------------------------------------
  // Storage backend: use IndexedDB for larger payloads and chunk big
  // values so chapter uploads don't hit localStorage quota limits.
  // ---------------------------------------------------------------
  const PREFIX = 'reading-room:';
  const DB_NAME = 'reading-room-db';
  const STORE_NAME = 'items';
  const CHUNK_SIZE = 256 * 1024;
  let dbPromise = null;
  const memoryCache = {};

  function openDatabase(){
    if (!window.indexedDB) return Promise.reject(new Error('IndexedDB unavailable'));
    if (dbPromise) return dbPromise;

    dbPromise = new Promise((resolve, reject) => {
      const request = window.indexedDB.open(DB_NAME, 2);
      request.onupgradeneeded = (event) => {
        const db = event.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) {
          db.createObjectStore(STORE_NAME, { keyPath: 'key' });
        }
      };
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error || new Error('IndexedDB unavailable'));
    });

    return dbPromise;
  }

  async function getFromDb(key){
    const db = await openDatabase();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readonly');
      tx.onabort = () => reject(tx.error || new Error('Read aborted'));
      tx.onerror = () => reject(tx.error || new Error('Read failed'));
      const store = tx.objectStore(STORE_NAME);
      const request = store.get(key);
      request.onsuccess = () => resolve(request.result ? request.result.value : null);
      request.onerror = () => reject(request.error || new Error('Read failed'));
    });
  }

  async function setInDb(key, value){
    const db = await openDatabase();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.onabort = () => reject(tx.error || new Error('Write aborted'));
      tx.onerror = () => reject(tx.error || new Error('Write failed'));
      const store = tx.objectStore(STORE_NAME);
      const request = store.put({ key, value });
      request.onsuccess = () => resolve({ key, value, shared:false });
      request.onerror = () => reject(request.error || new Error('Write failed'));
    });
  }

  async function deleteFromDb(key){
    const db = await openDatabase();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.onabort = () => reject(tx.error || new Error('Delete aborted'));
      tx.onerror = () => reject(tx.error || new Error('Delete failed'));
      const store = tx.objectStore(STORE_NAME);
      const request = store.delete(key);
      request.onsuccess = () => resolve({ key, deleted:true, shared:false });
      request.onerror = () => reject(request.error || new Error('Delete failed'));
    });
  }

  async function listFromDb(prefix){
    const db = await openDatabase();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readonly');
      tx.onabort = () => reject(tx.error || new Error('List aborted'));
      tx.onerror = () => reject(tx.error || new Error('List failed'));
      const store = tx.objectStore(STORE_NAME);
      const request = store.openCursor();
      const keys = [];
      request.onsuccess = () => {
        const cursor = request.result;
        if (cursor) {
          const key = cursor.key;
          if (!prefix || key.startsWith(prefix)) keys.push(key.slice(PREFIX.length));
          cursor.continue();
        } else {
          resolve({ keys, prefix, shared:false });
        }
      };
      request.onerror = () => reject(request.error || new Error('List failed'));
    });
  }

  async function setChunkedValue(fullKey, value){
    const chunks = [];
    for (let offset = 0; offset < value.length; offset += CHUNK_SIZE) {
      chunks.push(value.slice(offset, offset + CHUNK_SIZE));
    }

    const meta = { kind: 'chunked', chunkCount: chunks.length, chunkKeys: chunks.map((_, index) => fullKey + ':chunk:' + index) };
    await setInDb(fullKey, JSON.stringify(meta));
    for (let i = 0; i < chunks.length; i++) {
      await setInDb(meta.chunkKeys[i], chunks[i]);
    }
    memoryCache[fullKey] = value;
    return { key: fullKey, value, shared:false };
  }

  async function getChunkedValue(fullKey){
    const metaRaw = await getFromDb(fullKey);
    if (!metaRaw) return null;
    try {
      const meta = JSON.parse(metaRaw);
      if (!meta || meta.kind !== 'chunked') return metaRaw;
      const chunks = [];
      for (const chunkKey of meta.chunkKeys || []) {
        const chunk = await getFromDb(chunkKey);
        if (chunk === null || chunk === undefined) return null;
        chunks.push(chunk);
      }
      const value = chunks.join('');
      memoryCache[fullKey] = value;
      return value;
    } catch (e) {
      return metaRaw;
    }
  }

  async function deleteChunkedValue(fullKey){
    const metaRaw = await getFromDb(fullKey);
    if (metaRaw) {
      try {
        const meta = JSON.parse(metaRaw);
        if (meta && meta.kind === 'chunked') {
          for (const chunkKey of meta.chunkKeys || []) {
            await deleteFromDb(chunkKey);
          }
        }
      } catch (e) {}
    }
    await deleteFromDb(fullKey);
    delete memoryCache[fullKey];
    return { key: fullKey, deleted:true, shared:false };
  }

  async function migrateLegacyStorage(){
    if (!window.localStorage) return;
    const legacyKeys = [];
    for (let i = 0; i < window.localStorage.length; i++) {
      const fullKey = window.localStorage.key(i);
      if (fullKey && fullKey.startsWith(PREFIX)) legacyKeys.push(fullKey);
    }
    for (const fullKey of legacyKeys) {
      try {
        const raw = window.localStorage.getItem(fullKey);
        if (raw != null) await setInDb(fullKey, raw);
      } catch (e) {
        console.warn('Could not migrate legacy storage entry', fullKey, e);
      }
    }
  }

  window.storage = {
    async get(key){
      const fullKey = PREFIX + key;
      if (memoryCache[fullKey] !== undefined) return { key, value: memoryCache[fullKey], shared:false };
      try {
        const raw = await getChunkedValue(fullKey);
        if (raw !== null) return { key, value: raw, shared:false };
      } catch (e) {
        console.warn('IndexedDB read failed, falling back to localStorage', e);
      }
      if (window.localStorage) {
        const raw = window.localStorage.getItem(fullKey);
        return raw === null ? null : { key, value: raw, shared:false };
      }
      return null;
    },
    async set(key, value){
      const fullKey = PREFIX + key;
      try {
        if (typeof value === 'string' && value.length > CHUNK_SIZE) {
          return await setChunkedValue(fullKey, value);
        }
        await setInDb(fullKey, value);
        memoryCache[fullKey] = value;
        return { key, value, shared:false };
      } catch (e) {
        console.warn('IndexedDB write failed, falling back to localStorage', e);
        if (window.localStorage && typeof value === 'string' && value.length < 5 * 1024 * 1024) {
          window.localStorage.setItem(fullKey, value);
          memoryCache[fullKey] = value;
          return { key, value, shared:false };
        }
        throw e;
      }
    },
    async delete(key){
      const fullKey = PREFIX + key;
      try {
        return await deleteChunkedValue(fullKey);
      } catch (e) {
        console.warn('IndexedDB delete failed, falling back to localStorage', e);
        if (window.localStorage) {
          window.localStorage.removeItem(fullKey);
          delete memoryCache[fullKey];
          return { key, deleted:true, shared:false };
        }
        throw e;
      }
    },
    async list(prefix){
      try {
        return await listFromDb(PREFIX + (prefix || ''));
      } catch (e) {
        console.warn('IndexedDB list failed, falling back to localStorage', e);
        const keys = [];
        if (window.localStorage) {
          for (let i = 0; i < window.localStorage.length; i++) {
            const k = window.localStorage.key(i);
            if (k && k.startsWith(PREFIX)) {
              const bare = k.slice(PREFIX.length);
              if (!prefix || bare.startsWith(prefix)) keys.push(bare);
            }
          }
        }
        return { keys, prefix, shared:false };
      }
    }
  };

  async function storageSet(key, value, attempts=3){

      return decodeURIComponent(parts[parts.length - 2] || '').trim().toLowerCase();
    }
    if (parts.length === 2 && parts[0] !== 'webapp') {

    }
    return '';

  async function loadRemoteLibrary(){
    if (!syncKey) return null;
    try {
      const url = new URL(SYNC_ENDPOINT, window.location.origin);
      url.searchParams.set('key', syncKey);
      if (routeBookSlug) url.searchParams.set('book', routeBookSlug);
      const res = await fetch(url.toString());
      if (!res.ok) return null;
      const payload = await res.json();
      return payload && payload.data ? payload.data : null;
    } catch (e) {
      console.warn('Remote sync load failed', e);
      return null;
    }
  }

  async function pushRemoteLibrary(){
    if (!syncKey) return false;
    syncStatus = { state:'syncing', at:Date.now(), message:'Sync in progress' };
    updateSyncStatusChip();
    try {
      const payload = await buildLibraryPayload();
      const res = await fetch(SYNC_ENDPOINT, {
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'x-sync-key': syncKey,
          ...(routeBookSlug ? { 'x-book-slug': routeBookSlug } : {}),
        },
        body: JSON.stringify(payload)
      });
      syncStatus = {
        state: res.ok ? 'synced' : 'failed',
        at: Date.now(),
        message: res.ok ? 'Last sync saved to server' : 'Server rejected sync',
      };
      updateSyncStatusChip();
      return res.ok;
    } catch (e) {
      console.warn('Remote sync save failed', e);
      syncStatus = { state:'failed', at:Date.now(), message:'Sync failed: ' + e.message };
      updateSyncStatusChip();
      return false;
    }
  }

  async function syncFromRemote(){
    if (!syncKey) return false;
    syncStatus = { state:'syncing', at:Date.now(), message:'Loading latest data from server' };
    updateSyncStatusChip();
    const remote = await loadRemoteLibrary();
    if (!remote || !Array.isArray(remote.index)) return false;
    index = remote.index || [];
    booksMeta = (remote.booksMeta && typeof remote.booksMeta === 'object') ? remote.booksMeta : {};
    // Merge remote progress into active profile
    const activeState = getActiveProfileState();
    if (remote.progress) activeState.progress = remote.progress;
    if (remote.settings) Object.assign(activeState.settings, remote.settings);
    for (const ch of index){
      const data = remote.chapters && remote.chapters[ch.id];
      if (data) await storageSet('chapter:' + ch.id, data);
    }
    await storageSet('chapters-index', index);
    await storageSet('books-meta', booksMeta);
    await storageSet('profile-state', profileState);
    syncStatus = { state:'synced', at:Date.now(), message:'Pulled latest library from server' };
    updateSyncStatusChip();
    applyTheme();
    render();
    return true;
  }

  async function handleUpload(fileList, inputEl){
    const files = Array.from(fileList || []).filter(f => /\.txt$/i.test(f.name));
    if (!files.length){ inputEl.value = ''; return; }

    const failed = [];
    let addedCount = 0;
    const progressLabel = view.mode === 'library' ? showUploadProgress(files.length) : null;

    for (let i=0; i<files.length; i++){
      const file = files[i];
      if (progressLabel) progressLabel(i+1, files.length, file.name);
      const text = await file.text();
      const stem = file.name.replace(/\.txt$/i, '');
      const requestedTitle = pendingChapterTitle && files.length === 1 ? pendingChapterTitle : '';
      const title = (requestedTitle || stem).trim() || stem;
      const detectedBook = detectBook(file);
      const book = detectedBook || pendingUploadBook || null;
      const volume = detectVolume(file) || pendingUploadVolume || null;
      const id = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()+Math.random()));
      const ok = await storageSet('chapter:' + id, { title, content: text });
      if (!ok){
        failed.push(file.name);
        continue;
      }
      index.push({ id, title, book, volume, addedAt: Date.now() });
      addedCount++;
      // small pacing gap helps avoid rate-limit errors on large batches
      if (files.length > 10) await new Promise(res => setTimeout(res, 120));
    }

    if (addedCount){
      index.sort(sortChapters);
      const indexOk = await storageSet('chapters-index', index);
      if (!indexOk){
        alert('Chapters were saved individually, but the library list failed to update. Try refreshing the page — your chapters should still be there — and if the list looks incomplete, add the missing ones again.');
      }
    }
    if (syncKey) {
      await pushRemoteLibrary();
    }
    if (progressLabel) progressLabel(null);
    pendingChapterTitle = '';
    pendingUploadBook = '';
    pendingUploadVolume = '';
    inputEl.value = '';
    render();

    if (failed.length){
      alert('Saved ' + addedCount + ' of ' + files.length + ' chapters.\n\n' +
        'These failed to save (likely a temporary connection issue) — try adding them again:\n' +
        failed.slice(0, 20).join('\n') + (failed.length > 20 ? '\n…and ' + (failed.length-20) + ' more' : ''));
    }
  }

  function readFileAsDataUrl(file){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = () => reject(reader.error);
      reader.readAsDataURL(file);
    });
  }

  function showUploadProgress(total){
    const el = document.createElement('div');
    el.style.cssText = 'position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:40;background:var(--paper-raised);border:1px solid var(--line);border-radius:6px;padding:10px 16px;font-size:13px;box-shadow:var(--shadow);color:var(--ink);';
    document.body.appendChild(el);
    return function(current, tot, name){
      if (current === null){ el.remove(); return; }
      el.textContent = 'Saving chapter ' + current + ' of ' + tot + '… (' + name + ')';
    };
  }

  function detectVolume(file){
    // webkitRelativePath looks like "MyNovel/Volume 1/003.txt" when picked via folder upload,
    // or "MyNovel/003.txt" for a flat folder. Only treat it as a volume if there's a real subfolder.
    const rel = file.webkitRelativePath;
    if (!rel) return null;
    const parts = rel.split('/');
    if (parts.length >= 3) return parts[1];
    return null;
  }

  function detectBook(file){
    // webkitRelativePath looks like "MyNovel/Volume 1/003.txt"
    // Extract the root folder as the book name
    const rel = file.webkitRelativePath;
    if (!rel) return null;
    const parts = rel.split('/');
    if (parts.length >= 1) return parts[0];
    return null;
  }

  function volumeSortNum(name){
    const m = (name || '').match(/(\d{1,4})/);
    return m ? parseInt(m[1], 10) : null;
  }

  function bookSortNum(name){
    const m = (name || '').match(/(\d{1,4})/);
    return m ? parseInt(m[1], 10) : null;
  }

  function sortChapters(a, b){
    // Sort by book, then volume, then chapter number
    const ab = a.book || '', bb = b.book || '';
    if (ab !== bb){
      const an = bookSortNum(ab), bn = bookSortNum(bb);
      if (an != null && bn != null && an !== bn) return an - bn;
      return ab.localeCompare(bb);
    }
    const av = a.volume || '', bv = b.volume || '';
    if (av !== bv){
      const an = volumeSortNum(av), bn = volumeSortNum(bv);
      if (an != null && bn != null && an !== bn) return an - bn;
      return av.localeCompare(bv);
    }
    return a.addedAt - b.addedAt;
  }

  async function deleteChapter(id, evt){
    if (evt) evt.stopPropagation();
    if (!confirm('Remove this chapter from your library? This cannot be undone.')) return;
    index = index.filter(c => c.id !== id);
    await storageSet('chapters-index', index);
    await storageDelete('chapter:' + id);
    const progress = getProgress();
    if (progress.percents[id] != null) delete progress.percents[id];
    if (progress.lastChapterId === id) progress.lastChapterId = null;
    await persistProfileState();
    if (syncKey) await pushRemoteLibrary();
    render();
  }

  async function renameChapter(id){
    const chapter = index.find(c => c.id === id);
    if (!chapter) return;
    const nextTitle = prompt('Edit chapter title', chapter.title);
    if (nextTitle === null) return;
    const title = (nextTitle || '').trim();
    if (!title) return;
    chapter.title = title;
    await storageSet('chapters-index', index);
    const data = await storageGet('chapter:' + id);
    if (data) {
      await storageSet('chapter:' + id, { ...data, title });
    }
    if (syncKey) await pushRemoteLibrary();
    render();
  }

  async function editChapter(id){
    const chapter = index.find(c => c.id === id);
    if (!chapter) return;
    
    const modal = document.getElementById('editModal');
    const backdrop = document.getElementById('editModalBackdrop');
    const bookInput = document.getElementById('editBook');
    const volumeInput = document.getElementById('editVolume');
    const titleInput = document.getElementById('editTitle');
    const cancelBtn = document.getElementById('editModalCancelBtn');
    const saveBtn = document.getElementById('editModalSaveBtn');
    
    bookInput.value = chapter.book || '';
    volumeInput.value = chapter.volume || '';
    titleInput.value = chapter.title || '';
    
    modal.classList.add('open');
    backdrop.classList.add('open');
    titleInput.focus();
    
    const closeModal = () => {
      modal.classList.remove('open');
      backdrop.classList.remove('open');
      cancelBtn.onclick = null;
      saveBtn.onclick = null;
      backdrop.onclick = null;
    };
    
    const handleSave = async () => {
      const book = (bookInput.value || '').trim() || null;
      const volume = (volumeInput.value || '').trim() || null;
      const title = (titleInput.value || '').trim();
      
      if (!title) {
        alert('Title cannot be empty');
        return;
      }
      
      chapter.book = book;
      chapter.volume = volume;
      chapter.title = title;
      
      index.sort(sortChapters);
      await storageSet('chapters-index', index);
      
      const data = await storageGet('chapter:' + id);
      if (data) {
        await storageSet('chapter:' + id, { ...data, title });
      }
      
      if (syncKey) await pushRemoteLibrary();
      
      closeModal();
      render();
    };
    
    cancelBtn.onclick = closeModal;
    saveBtn.onclick = handleSave;
    backdrop.onclick = closeModal;
    titleInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleSave();
      else if (e.key === 'Escape') closeModal();
    });
  }

  async function exportLibrary(){
    const btn = document.getElementById('exportBtn');
    if (btn){ btn.disabled = true; btn.textContent = 'Preparing…'; }
    try{
      const chapters = {};
      for (const ch of index){
        const data = await storageGet('chapter:' + ch.id);
        if (data) chapters[ch.id] = data;
      }
      const payload = {
        version:1,
        exportedAt: Date.now(),
        index,
        chapters,
        progress: getProgress(),
        settings: getSettings(),
        booksMeta,
      };
      const blob = new Blob([JSON.stringify(payload)], { type:'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'reading-room-library.json';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }catch(e){
      alert('Export failed: ' + e.message);
    }
    if (btn){ btn.disabled = false; btn.textContent = 'Export library'; }
  }

  importInput.addEventListener('change', async (e) => {
    const file = e.target.files && e.target.files[0];
    importInput.value = '';
    if (!file) return;
    let payload;
    try{
      payload = JSON.parse(await file.text());
    }catch(e){
      alert('That file doesn\'t look like a valid library export.');
      return;
    }
    if (!payload || !Array.isArray(payload.index) || !payload.chapters){
      alert('That file doesn\'t look like a valid library export.');
      return;
    }
    const mode = confirm(
      'Import ' + payload.index.length + ' chapter(s).\n\n' +
      'Press OK to MERGE with your current library (existing chapters kept, new ones added).\n' +
      'Press Cancel to REPLACE your current library entirely.'
    ) ? 'merge' : 'replace';

    const progress = getProgress();
    if (mode === 'replace') { index = []; progress.lastChapterId = null; progress.percents = {}; }
    if (mode === 'replace') booksMeta = {};

    const existingKey = (c) => (c.book || '') + '::' + (c.volume || '') + '::' + c.title;
    const existingTitles = new Set(index.map(existingKey));
    let added = 0;
    for (const entry of payload.index){
      const entryKey = (entry.book || '') + '::' + (entry.volume || '') + '::' + entry.title;
      if (mode === 'merge' && existingTitles.has(entryKey)) continue;
      const newId = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()+Math.random()));
      const data = payload.chapters[entry.id];
      if (!data) continue;
      await storageSet('chapter:' + newId, data);
      index.push({ id:newId, title:entry.title, book:entry.book||null, volume:entry.volume||null, addedAt:Date.now() });
      if (payload.progress && payload.progress.percents && payload.progress.percents[entry.id] != null){
        progress.percents[newId] = payload.progress.percents[entry.id];
        if (payload.progress.lastChapterId === entry.id) progress.lastChapterId = newId;
      }
      added++;
    }
    if (payload.booksMeta && typeof payload.booksMeta === 'object') {
      booksMeta = mode === 'merge' ? Object.assign({}, booksMeta, payload.booksMeta) : payload.booksMeta;
      await persistBooksMeta();
    }
    index.sort(sortChapters);
    await storageSet('chapters-index', index);
    if (payload.settings){
      const settings = getSettings();
      Object.assign(settings, payload.settings);
      applyTheme();
    }
    await persistProfileState();
    if (syncKey) await pushRemoteLibrary();
    view.transferOpen = false;
    render();
    alert('Imported ' + added + ' chapter(s).');
  });

  function getDisplaySortedChapters(items){
    const list = [...items];
    const mode = view.chapterSort || 'book-volume-added';
    if (mode === 'title'){
      list.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
      return list;
    }
    if (mode === 'recent'){
      list.sort((a, b) => (b.addedAt || 0) - (a.addedAt || 0));
      return list;
    }
    if (mode === 'book-volume-title'){
      list.sort((a, b) => {
        const byBook = sortChapters(a, b);
        if ((a.book || '') !== (b.book || '') || (a.volume || '') !== (b.volume || '')) return byBook;
        return (a.title || '').localeCompare(b.title || '');
      });
      return list;
    }
    list.sort(sortChapters);
    return list;
  }

      metaWrap.innerHTML = `

  function openBookManager(prefillBook){
    const modal = document.getElementById('bookModal');
    const backdrop = document.getElementById('bookModalBackdrop');
    const picker = document.getElementById('bookPicker');
    const titleInput = document.getElementById('bookTitleInput');
    const sortSelect = document.getElementById('bookSortSelect');
    const volumeFromSelect = document.getElementById('volumeRenameFromSelect');
    const volumeToInput = document.getElementById('volumeRenameToInput');
    const renameVolumeBtn = document.getElementById('renameVolumeBtn');
    const saveBtn = document.getElementById('bookModalSaveBtn');
    const cancelBtn = document.getElementById('bookModalCancelBtn');
    const pickCoverBtn = document.getElementById('bookPickCoverBtn');
    const clearCoverBtn = document.getElementById('bookClearCoverBtn');
    const uploadBtn = document.getElementById('bookUploadChaptersBtn');
    const books = getAllBookNames();
    pendingCoverDataUrl = null;

    picker.innerHTML = '';
    books.forEach((name) => {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = getBookLabel(name);
      picker.appendChild(opt);
    });
    const newOpt = document.createElement('option');
    newOpt.value = '__new__';
    newOpt.textContent = '+ New book';
    picker.appendChild(newOpt);

    picker.value = books.includes(prefillBook || '') ? (prefillBook || '') : books[0] || '__new__';
    sortSelect.value = view.chapterSort || 'book-volume-added';

    function getVolumesForBook(bookKey){
      return [...new Set(index
        .filter(ch => (ch.book || '').trim() === (bookKey || '').trim())
        .map(ch => (ch.volume || '').trim()))]
        .sort((a, b) => a.localeCompare(b));
    }

    function refreshVolumeRenameOptions(){
      const key = (picker.value || '').trim();
      volumeFromSelect.innerHTML = '';
      volumeToInput.value = '';
      if (!key || key === '__new__'){
        const opt = document.createElement('option');
        opt.value = '';
        opt.textContent = 'Select an existing book first';
        volumeFromSelect.appendChild(opt);
        volumeFromSelect.disabled = true;
        volumeToInput.disabled = true;
        renameVolumeBtn.disabled = true;
        return;
      }

      const volumes = getVolumesForBook(key);
      if (!volumes.length){
        const opt = document.createElement('option');
        opt.value = '';
        opt.textContent = 'No volumes in this book yet';
        volumeFromSelect.appendChild(opt);
        volumeFromSelect.disabled = true;
        volumeToInput.disabled = true;
        renameVolumeBtn.disabled = true;
        return;
      }

      const blank = document.createElement('option');
      blank.value = '';
      blank.textContent = 'Pick a volume';
      volumeFromSelect.appendChild(blank);
      volumes.forEach((vol) => {
        const opt = document.createElement('option');
        opt.value = vol;
        opt.textContent = vol || 'Unassigned';
        volumeFromSelect.appendChild(opt);
      });
      volumeFromSelect.disabled = false;
      volumeToInput.disabled = false;
      renameVolumeBtn.disabled = false;
    }

    function syncFormWithSelection(){
      const key = (picker.value || '').trim();
      if (key === '__new__'){
        titleInput.value = '';
      } else {
        titleInput.value = getBookLabel(key);
      }
      renderBookCoverPreview();
      refreshVolumeRenameOptions();
    }

    function close(){
      modal.classList.remove('open');
      backdrop.classList.remove('open');
      picker.onchange = null;
      saveBtn.onclick = null;
      cancelBtn.onclick = null;
      pickCoverBtn.onclick = null;
      clearCoverBtn.onclick = null;
      uploadBtn.onclick = null;
      renameVolumeBtn.onclick = null;
      backdrop.onclick = null;
      pendingCoverDataUrl = null;
    }

    picker.onchange = syncFormWithSelection;
    pickCoverBtn.onclick = () => coverInput.click();
    clearCoverBtn.onclick = () => { pendingCoverDataUrl = ''; renderBookCoverPreview(); };
    uploadBtn.onclick = () => {
      const key = picker.value === '__new__' ? (titleInput.value || '').trim() : picker.value;
      if (!key) { alert('Pick a book title first.'); return; }
      startAddChapterToBook(key);
      close();
    };

    renameVolumeBtn.onclick = async () => {
      const bookKey = (picker.value || '').trim();
      const fromVolume = (volumeFromSelect.value || '').trim();
      const toVolume = (volumeToInput.value || '').trim();
      if (!bookKey || bookKey === '__new__'){
        alert('Select an existing book first.');
        return;
      }
      if (!fromVolume){
        alert('Pick a volume to rename.');
        return;
      }
      if (!toVolume){
        alert('Enter the new volume name.');
        return;
      }
      if (fromVolume === toVolume){
        alert('New volume name is the same as the current one.');
        return;
      }

      let changed = 0;
      index.forEach((ch) => {
        if ((ch.book || '').trim() === bookKey && (ch.volume || '').trim() === fromVolume){
          ch.volume = toVolume;
          changed++;
        }
      });
      if (!changed){
        alert('No chapters found in that volume.');
        return;
      }

      index.sort(sortChapters);
      await storageSet('chapters-index', index);
      if (syncKey) await pushRemoteLibrary();
      volumeToInput.value = '';
      refreshVolumeRenameOptions();
      render();
      alert('Renamed volume for ' + changed + ' chapter(s).');
    };

    saveBtn.onclick = async () => {
      const selected = (picker.value || '').trim();
      const nextTitle = (titleInput.value || '').trim();
      if (!nextTitle) {
        alert('Book title cannot be empty.');
        return;
      }

      let targetKey = selected;
      if (selected === '__new__'){
        targetKey = nextTitle;
      }

      if (selected && selected !== '__new__' && selected !== nextTitle){
        index.forEach(ch => {
          if ((ch.book || '').trim() === selected) ch.book = nextTitle;
        });
        if (booksMeta[selected]) {
          booksMeta[nextTitle] = booksMeta[selected];
          delete booksMeta[selected];
        }
        targetKey = nextTitle;
      }

      if (!booksMeta[targetKey]) booksMeta[targetKey] = { title: targetKey, coverDataUrl: '' };
      booksMeta[targetKey].title = nextTitle;
      if (pendingCoverDataUrl !== null) booksMeta[targetKey].coverDataUrl = pendingCoverDataUrl;

      view.chapterSort = sortSelect.value || 'book-volume-added';
      index.sort(sortChapters);
      await storageSet('chapters-index', index);
      await persistBooksMeta();
      if (syncKey) await pushRemoteLibrary();
      close();
      render();
    };

    cancelBtn.onclick = close;
    backdrop.onclick = close;
    syncFormWithSelection();
    modal.classList.add('open');
    backdrop.classList.add('open');
  }

  function renderLibrary(){
    main.innerHTML = '';
    const wrap = document.createElement('div');
    wrap.className = 'library-wrap';

    const isBookPage = !!routeBookSlug;
    const routeBookName = getRouteBookName();

    if (!index.length){

            <button class="primary" id="emptyAddBtn">+ Add chapter</button>
            <button id="emptyBookBtn">${isBookPage ? 'Book settings' : '+ Create book'}</button>
            ${isBookPage ? '<button id="emptyBackBtn">All books</button>' : ''}
          </div>
        </div>`;
      main.appendChild(wrap);
      document.getElementById('emptyAddBtn').onclick = () => startAddChapterToBook(routeBookName || '');
      document.getElementById('emptyBookBtn').onclick = () => openBookManager(routeBookName || '__new__');
      if (isBookPage) {
        const backBtn = document.getElementById('emptyBackBtn');
        if (backBtn) backBtn.onclick = () => { window.location.href = getMainLibraryPath(); };
      }
      return;
    }

    if (!isBookPage){
      const toolrow = document.createElement('div');
      toolrow.className = 'toolrow';
      toolrow.innerHTML = `
        <div class="inline-actions">
          <button type="button" id="manageBooksRootBtn">Manage books</button>
        </div>`;
      toolrow.querySelector('#manageBooksRootBtn').onclick = () => openBookManager(view.bookFilter || '');
      wrap.appendChild(toolrow);

      renderBookGrid(wrap, index);
      if (view.transferOpen){
        const panel = document.createElement('div');
        panel.className = 'continue-card';
        panel.innerHTML = `
          <div>
            <div class="label">Move library to another device</div>
            <div style="font-size:13px;color:var(--ink-soft);max-width:46ch;">
              Export everything to one file here, then open this same reader on your other device and import it there.
            </div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button id="exportBtn">Export library</button>
            <button id="importBtn" class="primary">Import library</button>
          </div>`;
        wrap.appendChild(panel);
        panel.querySelector('#exportBtn').onclick = exportLibrary;
        panel.querySelector('#importBtn').onclick = () => importInput.click();
      }
      main.appendChild(wrap);
      return;
    }

    view.bookFilter = routeBookName || '';
    view.chapterSort = 'book-volume-added';

    const currentBook = routeBookName || (index[0] && index[0].book) || '';
    const currentMeta = booksMeta[currentBook] || {};
    const currentItems = index.filter(c => (c.book || '').trim() === currentBook);
    const progress = getProgress();
    const lastReadInBook = progress.lastChapterId
      ? currentItems.find(c => c.id === progress.lastChapterId)
      : null;
    const header = document.createElement('div');
    header.className = 'book-page-header';
    const coverHtml = currentMeta.coverDataUrl
      ? `<img class="book-page-cover" src="${currentMeta.coverDataUrl}" alt="${esc(getBookLabel(currentBook))} cover" />`
      : '<div class="book-page-cover-fallback">BOOK</div>';
    header.innerHTML = `
      ${coverHtml}
      <div class="book-page-meta">
        <div class="book-page-title">${esc(getBookLabel(currentBook))}</div>
        <div class="book-page-sub">${currentItems.length} chapter${currentItems.length === 1 ? '' : 's'} • sorted by volume</div>
        <div class="book-page-actions">
          <button type="button" id="bookPageSettingsBtn">Book settings</button>
          <button type="button" id="bookPageAddBtn" class="primary">+ Add chapters</button>
          <button type="button" id="bookPageBackBtn">All books</button>
        </div>
      </div>`;
    wrap.appendChild(header);
    header.querySelector('#bookPageSettingsBtn').onclick = () => openBookManager(currentBook || '__new__');
    header.querySelector('#bookPageAddBtn').onclick = () => startAddChapterToBook(currentBook || '');
    header.querySelector('#bookPageBackBtn').onclick = () => { window.location.href = getMainLibraryPath(); };

    if (lastReadInBook){
      const pct = Math.round(progress.percents[lastReadInBook.id] || 0);
      const card = document.createElement('div');
      card.className = 'continue-card';
      card.innerHTML = `
        <div>
          <div class="label">Continue reading</div>
          <div class="title">${esc(lastReadInBook.title)}</div>
          <div class="pct">${pct}% through this chapter</div>
        </div>
        <button class="primary">Resume →</button>`;
      card.querySelector('button').onclick = () => openChapter(lastReadInBook.id, true);
      wrap.appendChild(card);
    }

    const toolrow = document.createElement('div');
    toolrow.className = 'toolrow';
    toolrow.innerHTML = `<input class="search-input" placeholder="Filter chapters in this book…" value="${esc(view.search||'')}" />`;
    wrap.appendChild(toolrow);

    const list = document.createElement('div');
    list.id = 'chapterListContainer';
    wrap.appendChild(list);
    const searchInput = toolrow.querySelector('input');
    searchInput.oninput = (e) => { view.search = e.target.value; renderChapterList(list); };
    renderChapterList(list);

    main.appendChild(wrap);
  }

  function buildChapterRow(ch, opts){
    opts = opts || {};
    const progress = getProgress();
    const pct = Math.round(progress.percents[ch.id] || 0);
    const li = document.createElement('li');
    li.className = 'chapter-row' + (opts.current ? ' current' : '');
    li.innerHTML = `
      <div class="chapter-main">
        <div class="chapter-title ${pct>=98?'chapter-done':''}">${esc(ch.title)}</div>
        <div class="chapter-progress-track"><div class="chapter-progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div style="display:flex;gap:4px;">
        <button class="chapter-del icon-btn subtle" title="Edit chapter (book, volume, title)">⚙</button>
        ${opts.deletable !== false ? '<button class="chapter-del icon-btn subtle" title="Remove">✕</button>' : ''}
      </div>`;
    li.onclick = () => { if (opts.onClick) opts.onClick(ch); else openChapter(ch.id, false); };
    const editBtn = li.querySelectorAll('.chapter-del')[0];
    const delBtn = li.querySelectorAll('.chapter-del')[1];
    if (editBtn) editBtn.onclick = (e) => { e.stopPropagation(); editChapter(ch.id); };
    if (delBtn) delBtn.onclick = (e) => deleteChapter(ch.id, e);
    return li;
  }

  function renderChapterList(list){
    const q = (view.search || '').toLowerCase().trim();
    const filtered = index.filter(c => {
      if (view.bookFilter && (c.book || '').trim() !== view.bookFilter) return false;
      return !q || c.title.toLowerCase().includes(q);
    });
    const items = getDisplaySortedChapters(filtered);
    list.innerHTML = '';
    if (!items.length){
      const label = view.bookFilter ? (' in ' + getBookLabel(view.bookFilter)) : '';
      list.innerHTML = `<div style="padding:24px 4px;color:var(--ink-soft);">No chapters match "${esc(view.search)}"${esc(label)}.</div>`;
      return;
    }

    if (routeBookSlug){
      const volumes = [...new Set(items.map(c => c.volume || ''))];
      if (volumes.length <= 1){
        const ul = document.createElement('ul');
        ul.className = 'chapter-list two-col';
        items.forEach(ch => ul.appendChild(buildChapterRow(ch)));
        list.appendChild(ul);
        return;
      }
      volumes.forEach((vol) => {
        const groupItems = items.filter(c => (c.volume || '') === vol);
        const volDetails = document.createElement('details');
        volDetails.className = 'volume-group';
        volDetails.open = true;
        const volSummary = document.createElement('summary');
        volSummary.textContent = vol || 'Chapters';
        volDetails.appendChild(volSummary);
        const ul = document.createElement('ul');
        ul.className = 'chapter-list nested two-col';
        groupItems.forEach(ch => ul.appendChild(buildChapterRow(ch)));
        volDetails.appendChild(ul);
        list.appendChild(volDetails);
      });
      return;
    }

    const books = [...new Set(items.map(c => c.book || ''))];
    
    // Always show book-level grouping, even if only one book

    // Multiple books: group by book, then volume
    books.forEach(book => {
      const bookItems = items.filter(c => (c.book || '') === book);
      const bookDetails = document.createElement('details');
      bookDetails.className = 'volume-group book-group';
      bookDetails.open = true;
      const bookSummary = document.createElement('summary');
      bookSummary.textContent = getBookLabel(book);
      bookDetails.appendChild(bookSummary);
      
      const volumes = [...new Set(bookItems.map(c => c.volume || ''))];
      
      if (volumes.length <= 1){
        const ul = document.createElement('ul');
        ul.className = 'chapter-list nested two-col';
        bookItems.forEach(ch => ul.appendChild(buildChapterRow(ch)));
        bookDetails.appendChild(ul);
      } else {
        volumes.forEach(vol => {
          const groupItems = bookItems.filter(c => (c.volume || '') === vol);
          const volDetails = document.createElement('details');
          volDetails.className = 'volume-group';
          volDetails.open = false;
          const volSummary = document.createElement('summary');
          volSummary.textContent = vol || 'Chapters';
          volDetails.appendChild(volSummary);
          const ul = document.createElement('ul');
          ul.className = 'chapter-list nested two-col';
          groupItems.forEach(ch => ul.appendChild(buildChapterRow(ch)));
          volDetails.appendChild(ul);
          bookDetails.appendChild(volDetails);
        });
      }
      list.appendChild(bookDetails);
    });
  }

  function renderSidebar(){
    const bd = document.querySelector('.side-drawer-backdrop');
    const dr = document.getElementById('sideDrawer');
    if (!bd || !dr) return;
    bd.classList.toggle('open', !!view.sidebarOpen);
    dr.classList.toggle('open', !!view.sidebarOpen);
    dr.innerHTML = '<h2>Chapters</h2>';
    const currentId = view.chapterId;
    
    const wrapList = (items) => {
      const ul = document.createElement('ul');
      ul.className = 'chapter-list';
      items.forEach(ch => ul.appendChild(buildChapterRow(ch, {
        current: ch.id === currentId,
        deletable: false,
        onClick: (c) => { view.sidebarOpen = false; openChapter(c.id, false); }
      })));
      return ul;
    };

    const books = [...new Set(index.map(c => c.book || ''))];
    
    // Always show book-level grouping, even if only one book
    books.forEach(book => {
      const bookItems = index.filter(c => (c.book || '') === book);
      const bookDetails = document.createElement('details');
      bookDetails.className = 'volume-group book-group';
      bookDetails.open = bookItems.some(c => c.id === currentId);
      const bookSummary = document.createElement('summary');
      bookSummary.textContent = getBookLabel(book);
      bookDetails.appendChild(bookSummary);
      
      const volumes = [...new Set(bookItems.map(c => c.volume || ''))];
      
      if (volumes.length <= 1){
        bookDetails.appendChild(wrapList(bookItems));
      } else {
        volumes.forEach(vol => {
          const groupItems = bookItems.filter(c => (c.volume || '') === vol);
          const volDetails = document.createElement('details');
          volDetails.className = 'volume-group';
          volDetails.open = groupItems.some(c => c.id === currentId) || volumes.length < 4;
          const volSummary = document.createElement('summary');
          volSummary.textContent = vol || 'Chapters';
          volDetails.appendChild(volSummary);
          volDetails.appendChild(wrapList(groupItems));
          bookDetails.appendChild(volDetails);
        });
      }
      dr.appendChild(bookDetails);
    });
  }

  // ---------------------------------------------------------------
  // Reader view
  // ---------------------------------------------------------------
  async function openChapter(id, resume){
    view.mode = 'reader';
    view.chapterId = id;
    view.resume = !!resume;
    view.sidebarOpen = false;
    render();
  }

  async function renderReader(){
    if (typeof view._cleanupScroll === 'function'){
      view._cleanupScroll();
      view._cleanupScroll = null;
    }
    const meta = index.find(c => c.id === view.chapterId);
    main.innerHTML = '<div style="padding:40px;color:var(--ink-soft);">Loading…</div>';
    if (!meta) { view.mode='library'; render(); return; }

    const data = await storageGet('chapter:' + meta.id) || { title: meta.title, content: '(missing content)' };
    const progress = getProgress();

    const wrap = document.createElement('div');
    wrap.className = 'reader-shell';

    const pct = Math.round(progress.percents[meta.id] || 0);
    const ribbon = document.createElement('div');
    ribbon.className = 'ribbon';
    ribbon.textContent = pct + '%';

    const heading = document.createElement('div');
    heading.className = 'chapter-heading';
    const idx = index.findIndex(c => c.id === meta.id);
    heading.innerHTML = `<div>Chapter ${meta.num != null ? meta.num : (idx+1)}</div><h1>${esc(data.title)}</h1>`;

    const content = document.createElement('div');
    content.className = 'reader-content';
    applyReaderStyles(content);
    const toolbar = buildToolbar(meta, content);
    const paras = (data.content || '').split(/\n\s*\n/).map(p => p.trim()).filter(Boolean);
    (paras.length ? paras : [data.content || '']).forEach(p => {
      const pEl = document.createElement('p');
      pEl.textContent = p;
      content.appendChild(pEl);
    });

    const nav = document.createElement('div');
    nav.className = 'reader-nav';
    const prevMeta = index[idx-1];
    const nextMeta = index[idx+1];
    const prevBtn = document.createElement('button');
    prevBtn.textContent = '← Previous';
    prevBtn.disabled = !prevMeta;
    prevBtn.onclick = () => openChapter(prevMeta.id, false);
    const centerBtn = document.createElement('button');
    centerBtn.className = 'center-btn subtle';
    centerBtn.textContent = 'Library';
    centerBtn.onclick = () => { view.mode='library'; render(); };
    const nextBtn = document.createElement('button');
    nextBtn.textContent = 'Next →';
    nextBtn.className = 'primary';
    nextBtn.disabled = !nextMeta;
    nextBtn.onclick = () => openChapter(nextMeta.id, false);
    nav.append(prevBtn, centerBtn, nextBtn);

    wrap.append(ribbon, toolbar, heading, content, nav);
    main.innerHTML = '';
    main.appendChild(wrap);

    // sidebar drawer for quick chapter jumping
    const backdrop = document.createElement('div');
    backdrop.className = 'side-drawer-backdrop';
    backdrop.onclick = () => { view.sidebarOpen = false; renderSidebar(); };
    const drawer = document.createElement('div');
    drawer.className = 'side-drawer';
    drawer.id = 'sideDrawer';
    document.body.append(backdrop, drawer);
    view._cleanupDrawer = () => { backdrop.remove(); drawer.remove(); };
    renderSidebar();

    // keyboard navigation (left/right arrows), ignored while typing in a control
    function onKeydown(e){
      const tag = (document.activeElement && document.activeElement.tagName) || '';
      if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
      if (e.key === 'ArrowRight' && !nextBtn.disabled) nextBtn.click();
      else if (e.key === 'ArrowLeft' && !prevBtn.disabled) prevBtn.click();
      else if (e.key === 'Escape' && view.sidebarOpen){ view.sidebarOpen = false; renderSidebar(); }
    }
    document.addEventListener('keydown', onKeydown);

    // scroll tracking
    const scroller = window;
    function computePct(){
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      if (docHeight <= 0) return 100;
      return Math.min(100, Math.max(0, (window.scrollY / docHeight) * 100));
    }
    function onScroll(){
      const p = computePct();
      ribbon.textContent = Math.round(p) + '%';
      clearTimeout(saveTimer);
      saveTimer = setTimeout(async () => {
        progress.lastChapterId = meta.id;
        progress.percents[meta.id] = p;
        await persistProfileState();
        if (syncKey) await pushRemoteLibrary();
      }, 700);
    }
    window.addEventListener('scroll', onScroll, { passive:true });
    view._cleanupScroll = () => {
      window.removeEventListener('scroll', onScroll);
      document.removeEventListener('keydown', onKeydown);
      if (typeof view._cleanupDrawer === 'function'){ view._cleanupDrawer(); view._cleanupDrawer = null; }
    };

    // restore scroll position on resume or normal open
    requestAnimationFrame(() => {
      const savedPct = progress.percents[meta.id];
      if (savedPct){
        const docHeight = document.documentElement.scrollHeight - window.innerHeight;
        window.scrollTo(0, (savedPct/100) * docHeight);
      } else {
        window.scrollTo(0,0);
      }
    });
  }

  function applyReaderStyles(el){
    const settings = getSettings();
    el.style.fontFamily = settings.font;
    el.style.fontSize = settings.fontSize + 'px';
    el.style.lineHeight = settings.lineHeight;
    el.style.maxWidth = '66ch';
    el.style.margin = '0 auto';
  }

  function buildToolbar(meta, contentEl){
    const bar = document.createElement('div');
    bar.className = 'reader-toolbar';
    if (!view.settingsOpen) { bar.style.display = 'none'; return bar; }

    const settings = getSettings();
    const progress = getProgress();

    // font family
    const fontGrp = document.createElement('div');
    fontGrp.className = 'grp';
    fontGrp.innerHTML = '<label for="fontSel">Font</label>';
    const sel = document.createElement('select');
    sel.id = 'fontSel';
    FONT_OPTIONS.forEach(f => {
      const o = document.createElement('option');
      o.value = f.value; o.textContent = f.label;
      if (f.value === settings.font) o.selected = true;
      sel.appendChild(o);
    });
    sel.onchange = () => {
      settings.font = sel.value;
      if (contentEl) applyReaderStyles(contentEl);
      scheduleSettingsPersist();
    };
    fontGrp.appendChild(sel);

    // font size
    const sizeGrp = document.createElement('div');
    sizeGrp.className = 'grp';
    sizeGrp.innerHTML = '<label>Size</label>';
    const sizeStep = document.createElement('div');
    sizeStep.className = 'stepper';
    sizeStep.innerHTML = `<button aria-label="Decrease font size">−</button><span>${settings.fontSize}</span><button aria-label="Increase font size">+</button>`;
    const sizeValue = sizeStep.children[1];
    sizeStep.children[0].onclick = () => {
      settings.fontSize = Math.max(13, settings.fontSize-1);
      sizeValue.textContent = settings.fontSize;
      if (contentEl) applyReaderStyles(contentEl);
      scheduleSettingsPersist();
    };
    sizeStep.children[2].onclick = () => {
      settings.fontSize = Math.min(30, settings.fontSize+1);
      sizeValue.textContent = settings.fontSize;
      if (contentEl) applyReaderStyles(contentEl);
      scheduleSettingsPersist();
    };
    sizeGrp.appendChild(sizeStep);

    // line height
    const lineGrp = document.createElement('div');
    lineGrp.className = 'grp';
    lineGrp.innerHTML = '<label>Line spacing</label>';
    const lineStep = document.createElement('div');
    lineStep.className = 'stepper';
    lineStep.innerHTML = `<button aria-label="Decrease line spacing">−</button><span>${settings.lineHeight.toFixed(1)}</span><button aria-label="Increase line spacing">+</button>`;
    const lineValue = lineStep.children[1];
    lineStep.children[0].onclick = () => {
      settings.lineHeight = Math.max(1.2, +(settings.lineHeight-0.1).toFixed(1));
      lineValue.textContent = settings.lineHeight.toFixed(1);
      if (contentEl) applyReaderStyles(contentEl);
      scheduleSettingsPersist();
    };
    lineStep.children[2].onclick = () => {
      settings.lineHeight = Math.min(2.4, +(settings.lineHeight+0.1).toFixed(1));
      lineValue.textContent = settings.lineHeight.toFixed(1);
      if (contentEl) applyReaderStyles(contentEl);
      scheduleSettingsPersist();
    };
    lineGrp.appendChild(lineStep);

    const progressGrp = document.createElement('div');
    progressGrp.className = 'grp';
    progressGrp.innerHTML = '<label>Progress</label>';
    const resetBtn = document.createElement('button');
    resetBtn.textContent = 'Reset chapter';
    const currentPct = Math.round(progress.percents[meta.id] || 0);
    resetBtn.disabled = currentPct <= 0;
    resetBtn.title = currentPct > 0 ? ('Currently ' + currentPct + '% read') : 'No saved progress for this chapter';
    resetBtn.onclick = async () => {
      if (!confirm('Reset progress for this chapter?')) return;
      delete progress.percents[meta.id];
      if (progress.lastChapterId === meta.id) progress.lastChapterId = null;
      await persistProfileState();
      if (syncKey) await pushRemoteLibrary();
      window.scrollTo(0, 0);
      render();
    };
    progressGrp.appendChild(resetBtn);

    bar.append(fontGrp, sizeGrp, lineGrp, progressGrp);
    return bar;
  }

  init();
})();
</script>
